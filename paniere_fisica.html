<!DOCTYPE html>

<title>Paniere Fisica eCampus &#8212; 215 Domande</title>
<style>

:root{--bg:#0f0e0c;--surf:#1a1814;--surf2:#212019;--border:#2e2b24;--border2:#3d3a30;
--accent:#c8a96e;--adim:rgba(200,169,110,0.12);--green:#27ae60;--gdim:rgba(39,174,96,0.1);
--blue:#5dade2;--bdim:rgba(93,173,226,0.10);--text:#e8e0d0;--muted:#9a9080;--dim:#5a5248;--r:10px;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;min-height:100vh;line-height:1.65}
header{background:rgba(15,14,12,.97);border-bottom:1px solid var(--border);padding:14px 24px;
  position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.logo{font-family:Palatino,serif;font-size:17px;font-weight:700;color:var(--accent);white-space:nowrap}
.logo span{font-size:10px;color:var(--dim);display:block;font-weight:normal;font-family:monospace;letter-spacing:1px}
.sw{flex:1;position:relative;min-width:180px}
#search{width:100%;background:var(--surf2);border:1.5px solid var(--border);border-radius:8px;
  color:var(--text);font-size:14px;font-family:Georgia,serif;padding:8px 12px 8px 36px;outline:none;transition:border-color .15s;}
#search:focus{border-color:var(--accent)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;pointer-events:none}
.stats{font-family:monospace;font-size:11px;color:var(--dim);white-space:nowrap}
.stats b{color:var(--accent)}
.layout{display:flex;min-height:calc(100vh - 59px)}
aside{width:210px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--border);
  padding:10px 0;overflow-y:auto;position:sticky;top:59px;height:calc(100vh - 59px);}
.lb{display:flex;align-items:center;gap:7px;width:100%;padding:7px 14px;background:none;border:none;
  cursor:pointer;color:var(--muted);font-size:11px;font-family:monospace;text-align:left;
  transition:all .15s;border-left:3px solid transparent;}
.lb:hover{background:var(--surf2);color:var(--text)}
.lb.active{background:var(--adim);color:var(--accent);border-left-color:var(--accent)}
.lb .ln{font-size:12px;font-weight:700;min-width:28px}
.lb .lname{font-size:9px;opacity:.7;line-height:1.3}
.lb .lc{margin-left:auto;font-size:9px;background:var(--border);padding:1px 5px;border-radius:8px;flex-shrink:0}
main{flex:1;padding:22px;max-width:880px}
.filters{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.pill{font-family:monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;
  padding:4px 13px;border-radius:20px;cursor:pointer;border:1.5px solid var(--border);
  background:transparent;color:var(--dim);transition:all .15s;}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--adim);border-color:var(--accent);color:var(--accent)}
.pill.mc-pill.active{background:var(--gdim);border-color:var(--green);color:var(--green)}
.pill.op-pill.active{background:var(--bdim);border-color:var(--blue);color:var(--blue)}
.qcard{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px;overflow:hidden;cursor:pointer;}
.qhead{display:flex;align-items:flex-start;gap:11px;padding:13px 17px;}
.qhead:hover{background:rgba(255,255,255,.02)}
.qbadge{font-family:monospace;font-size:9px;padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:3px;white-space:nowrap;}
.qbadge.mc{background:var(--gdim);color:var(--green);border:1px solid rgba(39,174,96,.2)}
.qbadge.op{background:var(--bdim);color:var(--blue);border:1px solid rgba(93,173,226,.2)}
.qt{font-size:13.5px;line-height:1.6;color:var(--text);flex:1}
.qarrow{color:var(--dim);font-size:10px;margin-top:4px;flex-shrink:0;transition:transform .2s}
.qcard.open .qarrow{transform:rotate(180deg);color:var(--accent)}
.qans{display:none;padding:0 17px 15px 48px}
.qcard.open .qans{display:block}
.opts{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.opt{font-size:12.5px;padding:7px 11px;border-radius:6px;border:1px solid var(--border);color:var(--muted);background:var(--surf2);}
.opt.correct{background:var(--gdim);border-color:rgba(39,174,96,.35);color:var(--green);font-weight:600;}
.opt.correct::before{content:"\2713  "}
.open-ans{background:var(--bdim);border:1px solid rgba(93,173,226,.2);border-radius:7px;
  padding:11px 15px;font-size:12.5px;color:#7fb3d3;line-height:1.65;}
.open-ans strong{display:block;font-family:monospace;font-size:8px;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--blue);margin-bottom:5px}
.no-ans{font-family:monospace;font-size:11px;color:var(--dim);padding:7px 11px;
  border:1px dashed var(--border);border-radius:6px;}
.sec{font-family:monospace;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);
  margin:22px 0 11px;display:flex;align-items:center;gap:10px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.empty{text-align:center;padding:60px 20px;color:var(--dim);font-family:monospace}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@media(max-width:640px){aside{display:none}main{padding:12px}}

</style>

","5 cm","80 cm","40 cm"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":50,"n":8,"t":"Due cariche A e B poste a una distanza d tra loro risentono di una forza attrattiva di intensit\u00e0 F. Dopo aver dimezzato la carica di A e raddoppiato la distanza","o":["tra le cariche, l'intensit\u00e0 della forza sar\u00e0","F/4","2F","F/2","F/8"],"is_open":false,"ans_idx":4,"ans_text":null,"no_ans":false},{"l":50,"n":9,"t":"Si enunci e discuta la legge di Coulomb","o":[],"is_open":true,"ans_idx":null,"ans_text":"La legge di Coulomb: F=(1/4\u03c0\u03b5\u2080)\u00b7q\u2081q\u2082/r\u00b2. Repulsiva per stesso segno, attrattiva per segni opposti. F\u221dq\u2081q\u2082 e F\u221d1/r\u00b2. Per il III principio di Newton le forze su q\u2081 e q\u2082 sono uguali in modulo e opposte in verso.","no_ans":false},{"l":51,"n":1,"t":"Le linee di campo nel caso di una carica isolata puntiforme sono:","o":["entranti nella carica sia se essa \u00e8 positiva, sia se \u00e8 negativa","uscenti dalla carica se essa \u00e8 negativa, entranti se \u00e8 positiva","uscenti dalla carica se essa \u00e8 positiva, entranti se \u00e8 negativa.","uscenti dalla carica sia se essa \u00e8 positiva, sia se \u00e8 negativa"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":51,"n":2,"t":"Una carica elettrica puntiforme di 0.2 mC ha massa 5 g. Quale dovrebbe essere l'intensit\u00e0 del campo elettrico verticale che dovremmo applicare per tenerla","o":["ferma e sospesa nel vuoto?","120 N/C","2 N/C","0.2 N/C","245 N/C"],"is_open":false,"ans_idx":4,"ans_text":null,"no_ans":false},{"l":51,"n":3,"t":"Si dice che in un punto P dello spazio \u00e8 presente un campo elettrico se:","o":["in P, o nelle sue immediate vicinanze, \u00e8 presente una carica elettrica","un corpo di prova carico, se posto in P, sperimenta una forza di origine elettrica","in P, o nelle sue immediate vicinanze, \u00e8 presente un corpo di prova","una carica magnetica posta in P subisce una forza sul piano ortogo var filter='all',lesson=null;
var lc={};Q.forEach(function(q){lc[q.l]=(lc[q.l]||0)+1;});

function buildSB(){
  var sb=document.getElementById('sb');
  var h='<button class="lb active" id="lb-all" onclick="setL(null)"><span class="ln">&#128218;</span><span class="lname">Tutte le lezioni</span><span class="lc">215</span></button>';
  var lessons=[]; Q.forEach(function(q){if(lessons.indexOf(q.l)<0)lessons.push(q.l);});
  lessons.sort(function(a,b){return a-b;});
  lessons.forEach(function(l){
    var num = l<10 ? '00'+l : (l<100 ? '0'+l : l);
    h+='<button class="lb" id="lb-'+l+'" onclick="setL('+l+')"><span class="ln">L'+num+'</span><span class="lname">'+(LN[l]||l)+'</span><span class="lc">'+(lc[l]||0)+'</span></button>';
  });
  sb.innerHTML=h;
}

function setL(l){
  lesson=l;
  var btns=document.querySelectorAll('.lb');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  var target=document.getElementById(l?'lb-'+l:'lb-all');
  if(target)target.classList.add('active');
  render();
}

function setF(f,btn){
  filter=f;
  var pills=document.querySelectorAll('.pill');
  for(var i=0;i<pills.length;i++)pills[i].classList.remove('active');
  btn.classList.add('active');
  render();
}

function getFilt(){
  var t=document.getElementById('search').value.toLowerCase().trim();
  return Q.filter(function(q){
    if(lesson&&q.l!==lesson)return false;
    if(filter==='mc'&&q.is_open)return false;
    if(filter==='open'&&!q.is_open)return false;
    if(t){
      var h=(q.t+' '+(q.o||[]).join(' ')).toLowerCase();
      var words=t.split(/\s+/).filter(Boolean);
      return words.every(function(w){return h.indexOf(w)>=0;});
    }
    return true;
  });
}

function esc(s){
  if(!s)return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildAns(q){
  if(q.no_ans)return'<div class="no-ans">&#9888; Opzioni non estratte dal PDF.</div>';
  if(q.is_open&&q.ans_text)return'<div class="open-ans"><strong>&#128214; Risposta</strong>'+esc(q.ans_text)+'</div>';
  if(!q.o||!q.o.length)return'<div class="no-ans">Opzioni non disponibili.</div>';
  var h='<div class="opts">';
  for(var i=0;i<q.o.length;i++){
    var cls=(i===q.ans_idx)?'opt correct':'opt';
    h+='<div class="'+cls+'">'+esc(q.o[i])+'</div>';
  }
  h+='</div>';
  return h;
}

function render(){
  var f=getFilt();
  document.getElementById('vc').textContent=f.length;
  var c=document.getElementById('qc');
  if(!f.length){c.innerHTML='<div class="empty"><p style="font-size:2em">&#128269;</p>Nessuna domanda trovata</div>';return;}
  var h='',last=null;
  f.forEach(function(q){
    if(q.l!==last){
      h+='<div class="sec">L'+q.l+' \u2014 '+(LN[q.l]||q.l)+'</div>';
      last=q.l;
    }
    var num = q.n<10 ? '0'+q.n : q.n;
    var id='q'+q.l+'-'+q.n;
    var badge=q.is_open?'<span class="qbadge op">APERTA</span>':'<span class="qbadge mc">CHIUSA</span>';
    h+='<div class="qcard" id="'+id+'" onclick="tog(this)">';
    h+='<div class="qhead">'+badge+'<span class="qt"><b>Q'+num+'</b> \u2014 '+esc(q.t)+'</span><span class="qarrow">&#9660;</span></div>';
    h+='<div class="qans">'+buildAns(q)+'</div>';
    h+='</div>';
  });
  c.innerHTML=h;
}

function tog(el){el.classList.toggle('open');}

document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='f'){
    e.preventDefault();
    var s=document.getElementById('search');s.focus();s.select();
  }
});

buildSB();
render();

</script>
</body>
</html>
