ta passante per l'origine.","no_ans":false},{"l":63,"n":16,"t":"Si enunci la legge di Ohm generalizzata per la conduzione elettrica e se ne descriva poi la forma specifica nel caso di conduttori metallici.","o":[],"is_open":true,"ans_idx":null,"ans_text":"La legge di Ohm nella sua formulazione microscopica (generalizzata) afferma che in un mezzo conduttore la densit\u00e0 di corrente j \u00e8 proporzionale al campo elettrico E applicato: j = \u03c3E, dove \u03c3 \u00e8 la conduttivit\u00e0 elettrica del materiale, misurata in Siemens per metro [S/m = \u03a9\u207b\u00b9m\u207b\u00b9]. Questa relazione \u00e8 valida per i materiali ohmici, cio\u00e8 quelli per i quali \u03c3 \u00e8 indipendente da E. L'inverso della conduttivit\u00e0 \u00e8 la resistivit\u00e0 \u03c1 = 1/\u03c3 [\u03a9\u00b7m], che nei metalli cresce con la temperatura secondo \u03c1(T) = \u03c1\u2080[1 + \u03b1(T\u2212T\u2080)], mentre nei semiconduttori decresce. Nel caso specifico dei conduttori metallici, la conduttivit\u00e0 si spiega con il modello classico di Drude: gli elettroni di conduzione, accelerati dal campo, subiscono urti con gli ioni del reticolo cristallino con tempo medio di rilassamento \u03c4, ottenendo una velocit\u00e0 di deriva media v_d = eE\u03c4/m; si ricava \u03c3 = ne\u00b2\u03c4/m, dove n \u00e8 la densit\u00e0 degli elettroni di conduzione. Integrando su un conduttore di lunghezza L e sezione S, la legge microscopica si riduce alla forma macroscopica V = Ri, dove R = \u03c1L/S = L/(\u03c3S) \u00e8 la resistenza del conduttore.","no_ans":false},{"l":63,"n":17,"t":"Si definisca la resistenza elettrica di un conduttore e si discutano le resistenze equivalenti di una serie di resistori e di un sistema di resistori in parallelo.","o":[],"is_open":true,"ans_idx":null,"ans_text":"La resistenza elettrica R di un conduttore \u00e8 la costante di proporzionalit\u00e0 tra la differenza di potenziale V applicata ai suoi capi e la corrente i che lo percorre (prima legge di Ohm: V = Ri), con unit\u00e0 di misura l'Ohm [\u03a9 = V/A]. La resistenza dipende dal materiale (tramite la resistivit\u00e0 \u03c1), dalla lunghezza L del conduttore e dalla sezione trasversale S: R = \u03c1L/S. Per un sistema di pi\u00f9 resistori, la resistenza equivalente si calcola in due configurazioni tipiche. In serie (stessa corrente in tutti i resistori): le differenze di potenziale si sommano, quindi V_tot = V\u2081 + V\u2082 + ... = iR\u2081 + iR\u2082 + ..., da cui R_eq = R\u2081 + R\u2082 + ... + R\u2099; la resistenza equivalente \u00e8 maggiore della massima tra le singole resistenze. In parallelo (stessa differenza di potenziale su tutti i resistori): le correnti si sommano, quindi i_tot = i\u2081 + i\u2082 + ... = V/R\u2081 + V/R\u2082 + ..., da cui 1/R_eq = 1/R\u2081 + 1/R\u2082 + ... + 1/R\u2099; la resistenza equivalente \u00e8 minore della minima tra le singole resistenze.","no_ans":false},{"l":63,"n":18,"t":"Come si trovano le resistenze equivalenti in caso di resistenze in serie e parallelo?","o":[],"is_open":true,"ans_idx":null,"ans_text":"Per trovare la resistenza equivalente di sistemi di resistori si applicano due regole fondamentali. Resistori in serie: sono attraversati dalla stessa corrente i, e le differenze di potenziale si sommano algebricamente: V_tot = \u03a3V\u2096 = \u03a3(R\u2096\u00b7i); dividendo per i si ottiene R_eq = \u03a3R\u2096 = R\u2081 + R\u2082 + ... + R\u2099. La resistenza equivalente \u00e8 sempre maggiore di qualsiasi resistenza del gruppo. Resistori in parallelo: hanno la stessa differenza di potenziale V, e le correnti si sommano: i_tot = \u03a3i\u2096 = \u03a3(V/R\u2096); dividendo per V si ottiene 1/R_eq = \u03a3(1/R\u2096). La resistenza equivalente \u00e8 sempre minore di qualsiasi resistenza del gruppo. Per circuiti complessi (reti miste) si procede per semplificazione progressiva, identificando prima i sottogruppi in serie o parallelo e sostituendoli con la loro equivalente, ripetendo l'operazione finch\u00e9 non si ottiene un'unica resistenza equivalente.","no_ans":false},{"l":63,"n":19,"t":"Esporre la prima legge di ohm","o":[],"is_open":true,"ans_idx":null,"ans_text":"La prima legge di Ohm descrive il comportamento dei cosiddetti conduttori ohmici, per i quali esiste una relazione lineare tra la differenza di potenziale V ai capi del conduttore e la corrente i che lo attraversa: V = R\u00b7i. La costante di proporzionalit\u00e0 R \u00e8 la resistenza elettrica del conduttore, misurata in Ohm [\u03a9 = V/A]. La legge \u00e8 valida per conduttori metallici a temperatura costante, poich\u00e9 la resistivit\u00e0 aumenta con la temperatura. La linearit\u00e0 implica che: raddoppiando la corrente si raddoppia la tensione; il rapporto V/i \u00e8 costante per qualsiasi valore della corrente. I dispositivi che rispettano questa relazione lineare si dicono ohmici (resistori ideali); esistono invece dispositivi non ohmici (diodi, transistor) per i quali il rapporto V/i dipende dalla corrente e la curva caratteristica V-i non \u00e8 una retta. La prima legge di Ohm in forma locale (densit\u00e0 di corrente) diventa j = \u03c3E, dove \u03c3 \u00e8 la conduttivit\u00e0 del materiale.","no_ans":false},{"l":64,"n":1,"t":"Una tensione di 220V viene applicata a una stufa elettrica che durante il suo funzionamento dissipa 500W. Qual \u00e8 la sua resistenza della stufa?","o":["circa 100 ohm","circa 1 ohm","circa 10 ohm","circa 1000 ohm"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":64,"n":2,"t":"Una lampada ad incandescenza da 120 watt ed uno scaldabagno elettrico da 1500 watt sono alimentati dalla stessa tensione. Segue che:","o":["non si pu\u00f2 rispondere senza conoscere le correnti","\u00e8 pi\u00f9 elevata la resistenza della lampada ad incandescenza","le resistenze elettriche dei due apparecchi sono le stesse","\u00e8 pi\u00f9 elevata la resistenza dello scaldabagno elettrico"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":64,"n":3,"t":"Qualunque conduttore ohmico percorso da corrente dissipa energia per effetto Joule","o":["\u00e8 vero solo se la corrente \u00e8 costante nel tempo","\u00e8 sempre falso","\u00e8 sempre vero","qualche volta \u00e8 falso"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":64,"n":4,"t":"Per scaldare di 1 \u00b0C un litro di acqua sono necessari 4180 J di calore. Una corrente di 2 A che passa dentro una resistenza di 10 OHM per due minuti riesce a","o":["produrre questo calore?","No.","Dipende dalla temperatura iniziale dell'acqua.","Non ci sono elementi sufficienti per rispondere.","S\u00ec."],"is_open":false,"ans_idx":4,"ans_text":null,"no_ans":false},{"l":64,"n":5,"t":"Calcolate la resistenza di un faro d'automobile da 40 W se la batteria \u00e8 da 12 V.","o":["R = 3.6 ohm","R = 4.8 ohm","R = 1.2 ohm","R = 2.4 ohm"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":64,"n":6,"t":"Una resistenza da 10 ohm di potenza massima pari a 5 W \u00e8 collegata a una pila da 9 V.","o":["La resistenza riesce a dissipare la potenza","La resistenza brucia","Non ho elementi sufficienti per rispondere","La resistenza si espande"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":64,"n":7,"t":"Una serpentina di 30 Ohm \u00e8 immersa in 40 l di acqua a temperatura di 15 \u00b0C. Si vuole scaldare l'acqua a 45 \u00b0C in 30 minuti. Sapendo che il calore specifico","o":["dell'acqua \u00e8 4186 J/(kg\u00b7K), quale tensione bisogna applicare alla serpentina?","4.5 V","12 V","420 V","290 V"],"is_open":false,"ans_idx":4,"ans_text":null,"no_ans":false},{"l":64,"n":8,"t":"Agli estremi di due conduttori ohmici di resistenza R1 = 1000 OHM e R2 = 2000 OHM, \u00e8 applicata la stessa d.d.p. Quale dei due assorbe una potenza","o":["maggiore?","R2, perch\u00e9 \u00e8 pi\u00f9 grande di R1.","La potenza \u00e8 la stessa perch\u00e9 la d.d.p. \u00e8 uguale.","R1, perch\u00e9 \u00e8 attraversato da una corrente maggiore.","Dipende dal valore della d.d.p."],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":64,"n":9,"t":"Una centrale elettrica sviluppa una potenza di 5 MW. Che cosa significa?","o":["Pu\u00f2 compiere un lavoro di 5 milioni di joule in unsecondo.","Pu\u00f2 compiere un lavoro di 5 milioni di joule inun'ora.","Pu\u00f2 compiere un lavoro di 1000 J in 5000 s.","Pu\u00f2 compiere un lavoro di 5000 J in 1000 s."],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":64,"n":10,"t":"Su un trapano elettrico c'\u00e8 scritto 500 W. Che cosa significa?","o":["Riceve dagli elettroni che l'attraversano 500 J di energia ogni secondo.","La corrente massima che pu\u00f2 sopportare \u00e8 500 A.","Per farlo funzionare, sono necessari 500 J.","Pu\u00f2 essere collegato a una pila che fornisce 500 V."],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":64,"n":11,"t":"Quanto tempo impiega una lampadina da 100 W a dissipare 30 kJ?","o":["cinque minuti","dieci minuti","un'ora","un minuto"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":64,"n":12,"t":"Quanto calore eroga una sorgente da 500 W in 10 minuti?","o":["500 kJ","5000 kJ","300 kJ","1,3 kJ"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":64,"n":13,"t":"Quale potenza \u00e8 erogata da una resistenza di 1 kohm alimentata da una tensione di 50 V?","o":["25 W","2,5 W","25 J","2,5 J"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":64,"n":14,"t":"La potenza elettrica P \u00e8 data dall'espressione:","o":["P=i\u00b7V","P=i/R","P=iR","P=i/V"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":64,"n":15,"t":"La potenza disponibile in un circuito domestico \u00e8 3 kW, la tensione 220 V. Che cosa significa?","o":["Nel circuito possono passare 3000 C in un'ora.","Non possono funzionare contemporaneamente 3 elettrodomestici da 1 kW.","Nel circuito pu\u00f2 passare al massimo una corrente di circa 13,6 A.","Nel circuito passano 3 A in 1000 ore."],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":64,"n":16,"t":"Una resistenza da 22 ohm \u00e8 attaccata alla rete elettrica a 220 V; la corrente che percorre la resistenza \u00e8:","o":["2200 A","220 A","110 A","10 A"],"is_open":true,"ans_idx":null,"ans_text":"L'effetto Joule \u00e8 il processo irreversibile di conversione dell'energia elettrica in energia termica che avviene in qualsiasi conduttore percorso da corrente. Il meccanismo microscopico consiste negli urti degli elettroni di conduzione (accelerati dal campo elettrico) con gli ioni del reticolo cristallino, cedendo ad essi l'energia acquisita sotto forma di vibrazione termica. La potenza dissipata per effetto Joule in un resistore di resistenza R percorso da corrente i con differenza di potenziale V \u00e8 P = V\u00b7i = R\u00b7i\u00b2 = V\u00b2/R [W = J/s]. In forma locale, la potenza dissipata per unit\u00e0 di volume \u00e8 p = j\u00b7E = \u03c3E\u00b2 = j\u00b2/\u03c3 [W/m\u00b3]. L'effetto \u00e8 irreversibile: l'energia termica generata non si riconverte spontaneamente in energia elettrica. L'effetto Joule \u00e8 la base di numerose applicazioni tecnologiche: resistenze di riscaldamento (stufe, scalda-acqua, forni), lampadine a incandescenza, fusibili (che sfruttano la fusione del filamento al superamento di una soglia di corrente), saldatori. In trasmissione di energia elettrica, l'effetto Joule causa perdite di potenza P_loss = Ri\u00b2, minimizzate usando alta tensione e bassa corrente.","no_ans":false},{"l":64,"n":17,"t":"Ho a disposizione un generatore da 24 V e una bobina di filo in bronzo fosforoso (resistivit\u00e0 = 0.12 mOhm\u00b7cm) di diametro 0.24 mm. Quanto filo devo","o":["avvolgere attorno ad un dispositivo che voglio tenere caldo fornendogli 60W?","1.15 cm","8m","36.2 cm","44.2 cm"],"is_open":true,"ans_idx":null,"ans_text":"La potenza elettrica P \u00e8 la grandezza fisica che quantifica la velocit\u00e0 con cui un dispositivo elettrico assorbe o fornisce energia: P = dW/dt = V\u00b7i [W = J/s]. Per un resistore ohmico (che obbedisce alla legge V = Ri), la potenza dissipata si pu\u00f2 esprimere in tre forme equivalenti: P = V\u00b7i = R\u00b7i\u00b2 = V\u00b2/R. L'energia elettrica fornita (o assorbita) in un intervallo di tempo t \u00e8 W = P\u00b7t = V\u00b7i\u00b7t [J]. Per un generatore, la potenza erogata al circuito esterno \u00e8 P = \u03b5\u00b7i \u2212 r\u00b7i\u00b2 = (\u03b5 \u2212 ri)\u00b7i = V_morsetti\u00b7i, dove r \u00e8 la resistenza interna; la parte r\u00b7i\u00b2 \u00e8 dissipata internamente per effetto Joule. La potenza si misura con un wattmetro (o indirettamente con un voltmetro e un amperometro). L'unit\u00e0 pratica di energia elettrica \u00e8 il kilowattora (kWh = 3.6\u00d710\u2076 J), usata per la misurazione dei consumi domestici.","no_ans":false},{"l":64,"n":18,"t":"Un dispositivo elettrico produce calore con una potenza di 2,5 W per 10 minuti. Quanto calore viene prodotto?","o":["25 J","1500 cal","1500 J","25 cal"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":64,"n":19,"t":"Una resistenza da 10 ohm \u00e8 collegata a una pila da 9 V. La potenza dissipata dalla resistenza \u00e8:","o":["8.1 W","81 J","81 W","8,1 J"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":64,"n":20,"t":"In un filo di resistenza pari a 5 ohm scorre una corrente di 16 A. La potenza erogata \u00e8:","o":["1560 W","1280 W","160 W","80 W"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":64,"n":21,"t":"Quale tensione massima posso applicare a una resistenza da 10 ohm con potenza massima di 10 W?","o":["3,3 V","100 V","1V","10 V"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":64,"n":22,"t":"Una serpentina di 30 Ohm \u00e8 immersa in 40 l di acqua a temperatura di 15 \u00b0C. Si vuole scaldare l'acqua a 45 \u00b0C in 30 minuti. Sapendo che il calore specifico","o":["dell'acqua \u00e8 4186 J/(kg\u00b7K), quale tensione bisogna applicare alla serpentina?","290 V","12 V","4.5 V","420 V"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":64,"n":23,"t":"In un resistore attraversato dalla corrente i si produce una quantit\u00e0 di calore Q. Quanto calore si produce nello stesso intervallo di tempo se la corrente \u00e8","o":["0.5\u00b7i?","0.5\u00b7Q","Non si pu\u00f2 rispondere.","2\u00b7Q","0.25\u00b7Q"],"is_open":false,"ans_idx":4,"ans_text":null,"no_ans":false},{"l":64,"n":24,"t":"Una resistenza alimentata da una batteria da 12V eroga 40 W di potenza, quanto vale la resistenza?","o":["0,8 ohm","3,3 ohm","36 ohm","3,6 ohm"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":64,"n":25,"t":"Cos'\u00e8 l'effetto Joule?","o":[],"is_open":true,"ans_idx":null,"ans_text":"L'effetto Joule \u00e8 il fenomeno fisico per cui un conduttore percorso da corrente elettrica si scalda, convertendo irreversibilmente energia elettrica in energia termica (calore). Fisicamente, il campo elettrico accelera gli elettroni di conduzione; questi, attraverso urti con gli ioni del reticolo cristallino, cedono l'energia acquisita come agitazione termica del reticolo. Il calore prodotto in un tempo t in una resistenza R percorsa da corrente i vale Q = Ri\u00b2t = Pt, dove P = Ri\u00b2 \u00e8 la potenza dissipata. L'effetto Joule \u00e8 sempre presente in qualsiasi resistenza reale ed \u00e8 intrinsecamente irreversibile (secondo principio della termodinamica): il calore non si riconverte spontaneamente in energia elettrica. Applicazioni importanti: riscaldamento elettrico (stufe, ferri da stiro, scalda-acqua), lampadine a incandescenza, fusibili di protezione, forni industriali. L'effetto \u00e8 un fattore limitante nella progettazione di circuiti elettronici ad alta densit\u00e0, dove il calore generato deve essere smaltito con adeguati sistemi di raffreddamento.","no_ans":false},{"l":64,"n":26,"t":"In cosa consiste l'effetto Joule in un conduttore e che forma assume l'effetto Joule se lo si considera localmente?","o":[],"is_open":true,"ans_idx":null,"ans_text":"L'effetto Joule in un conduttore consiste nella dissipazione irreversibile di energia elettrica in calore, dovuta agli urti degli elettroni di conduzione con il reticolo cristallino. In forma integrale, la potenza dissipata in un resistore di resistenza R percorso da corrente i \u00e8 P = Ri\u00b2 = V\u00b2/R = Vi. In forma locale (forma differenziale), valida in ogni punto del mezzo conduttore, la potenza dissipata per unit\u00e0 di volume \u00e8: p = j\u00b7E [W/m\u00b3], dove j \u00e8 il vettore densit\u00e0 di corrente ed E il campo elettrico locale. Poich\u00e9 per la legge di Ohm microscopica j = \u03c3E, si ricavano le forme equivalenti: p = \u03c3E\u00b2 = j\u00b2/\u03c3. Integrando su tutto il volume del conduttore si ottiene la potenza totale: P = \u222b_V p dV = \u222b_V j\u00b7E dV = Ri\u00b2. La forma locale \u00e8 particolarmente importante in elettrotecnica per individuare le zone di maggiore dissipazione, come nei trasformatori, nei cablaggi ad alta corrente e nei dispositivi a semiconduttore.","no_ans":false},{"l":64,"n":27,"t":"Definire la potenza elettrica","o":[],"is_open":true,"ans_idx":null,"ans_text":"La potenza elettrica P \u00e8 la grandezza che misura l'energia trasferita per unit\u00e0 di tempo tra i componenti di un circuito elettrico: P = dW/dt. Per un bipolo qualunque ai cui capi vi \u00e8 una differenza di potenziale V e che \u00e8 attraversato da una corrente i, la potenza \u00e8 P = V\u00b7i [W = J/s = V\u00b7A]. Il segno di P indica la direzione del trasferimento energetico: P > 0 indica che il bipolo assorbe energia (resistore, motore), P < 0 indica che la fornisce (generatore). Per un resistore ohmico (V = Ri) si ha P = Ri\u00b2 = V\u00b2/R. Per un generatore di forza elettromotrice \u03b5 con resistenza interna r, la potenza erogata al circuito esterno \u00e8 P_ext = \u03b5i \u2212 ri\u00b2 = (\u03b5 \u2212 ri)i, mentre la potenza dissipata internamente \u00e8 P_int = ri\u00b2. La conservazione dell'energia impone che P_generata = P_dissipata in ogni circuito in regime stazionario.","no_ans":false},{"l":65,"n":1,"t":"Due lampade hanno resistenza rispettivamente di 100 e 200 ohm, e vengono connesse ad un generatore di forza elettromotrice di 100 V. Calcolare la corrente","o":["che circola nel generatore quando le due resistenze sono connesse in serie.","I = 0.22 A","I = 0.11 A","I = 0.33 A","I = 0.44 A"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":65,"n":2,"t":"Due lampade hanno resistenza rispettivamente di 100 e 200 ohm, e vengono connesse ad un generatore di forza elettromotrice di 100 V. Calcolare la corrente","o":["che circola nel generatore quando le due resistenze sono connesse in parallelo","I = 1.0 A","I = 2.0 A","I = 0.5 A","I = 1.5 A"],"is_open":false,"ans_idx":4,"ans_text":null,"no_ans":false},{"l":65,"n":3,"t":"Sulla batteria di un veicolo c'\u00e8 scritto 12 V e 50 Ah (si legge ampere-ora). Il primo dato \u00e8 la d.d.p. che la batteria fornisce. Che cosa rappresenta il secondo","o":["dato?","La possibile durata della batteria.","La corrente massima che la batteria fa circolare.","La quantit\u00e0 di carica che la batteria pu\u00f2 fornire.","La capacit\u00e0 termica della batteria."],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":65,"n":4,"t":"Ad una batteria ideale di 1.5 V sono collegate in parallelo due resistenze. La batteria eroga una corrente di 50 mA. Se una delle resistenze \u00e8 di 60 OHM, qual'\u00e8","o":["il valore dell'altra?","R = 100 ohm","R = 80 ohm","R = 20 ohm","R = 60 ohm"],"is_open":false,"ans_idx":4,"ans_text":null,"no_ans":false},{"l":65,"n":5,"t":"Se avete a disposizione un generatore di tensione di 120 V e tante lampadine da 6V, come fate per accenderle senza bruciarle? Colleghiamo 10 lampadine in serie","o":["Colleghiamo 10 lampadine in parallelo","Colleghiamo 20 lampadine in serie","Colleghiamo 20 lampadine in parallelo"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":65,"n":6,"t":"Una piccola lampadina assorbe 300 mA da una batteria di 1.5 V. Qual \u00e8 la resistenza della lampadina?","o":["R = 0.45 ohm","R = 4.0 ohm","R = 5.0 ohm","R = 4.5 ohm"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":65,"n":7,"t":"Si definisca la forza elettromotrice di un generatore elettrico e si descriva il circuito equivalente che schematizza un generatore reale connesso ad un carico","o":["esterno."],"is_open":true,"ans_idx":null,"ans_text":"La forza elettromotrice (f.e.m.) \u03b5 di un generatore \u00e8 il lavoro compiuto dal campo elettromotore (di natura non elettrostatica: chimica nelle pile, meccanica nelle dinamo, luminosa nelle celle fotovoltaiche) per unit\u00e0 di carica positiva lungo un percorso chiuso all'interno del generatore: \u03b5 = \u222eE_em\u00b7ds. La f.e.m. si misura in Volt ed \u00e8 numericamente uguale alla differenza di potenziale ai morsetti del generatore a circuito aperto (corrente nulla). Un generatore reale \u00e8 modellizzato dal circuito equivalente di Th\u00e9venin: un generatore ideale di f.e.m. \u03b5 in serie con una resistenza interna r (che rappresenta la resistenza degli elementi interni del generatore). Quando il generatore eroga una corrente i al circuito esterno, la differenza di potenziale ai morsetti vale V = \u03b5 \u2212 ri (equazione del generatore reale sotto carico): la tensione ai morsetti \u00e8 minore della f.e.m. per la caduta di tensione ri sulla resistenza interna. A circuito aperto (i = 0) si ha V = \u03b5; in cortocircuito (R_est = 0) la corrente massima \u00e8 i_cc = \u03b5/r.","no_ans":false},{"l":66,"n":1,"t":"Si enuncino le leggi di Kirchhoff per i circuiti elettrici lineari","o":[],"is_open":true,"ans_idx":null,"ans_text":"Le leggi di Kirchhoff sono due principi fondamentali che governano il comportamento dei circuiti elettrici lineari in regime stazionario. La prima legge di Kirchhoff (legge dei nodi o KCL: Kirchhoff's Current Law) afferma che la somma algebrica delle correnti che confluiscono in un nodo di un circuito \u00e8 nulla: \u03a3i\u2096 = 0, dove le correnti entranti sono positive e quelle uscenti negative (o viceversa). Questa legge deriva direttamente dal principio di conservazione della carica: in regime stazionario non si accumula carica nei nodi. La seconda legge di Kirchhoff (legge delle maglie o KVL: Kirchhoff's Voltage Law) afferma che la somma algebrica delle forze elettromotrici presenti in una maglia \u00e8 uguale alla somma algebrica delle cadute di tensione sui resistori della stessa maglia: \u03a3\u03b5\u2096 = \u03a3R\u2c7ci\u2c7c. Questa legge deriva dalla conservativit\u00e0 del campo elettrostatico: la circuitazione di E lungo un percorso chiuso \u00e8 nulla. Le due leggi, applicate a una rete con N nodi e L rami, forniscono un sistema lineare di N\u22121 equazioni ai nodi e M = L\u2212(N\u22121) equazioni alle maglie, sufficiente a determinare univocamente tutte le L correnti di ramo.","no_ans":false},{"l":66,"n":2,"t":"Esporre le leggi dei circuiti elettrici","o":[],"is_open":true,"ans_idx":null,"ans_text":"I circuiti elettrici sono retti da due leggi fondamentali, note come leggi di Kirchhoff. La legge dei nodi (I legge) stabilisce che in ogni nodo della rete \u2014 punto in cui si incontrano tre o pi\u00f9 rami \u2014 la somma algebrica delle correnti \u00e8 nulla: le correnti che entrano nel nodo sono uguali a quelle che ne escono. Questa legge \u00e8 la diretta espressione della conservazione della carica in regime stazionario: la carica non si pu\u00f2 accumulare nei nodi. La legge delle maglie (II legge) stabilisce che, percorrendo una maglia chiusa in un senso arbitrariamente scelto, la somma algebrica di tutte le forze elettromotrici incontrate \u00e8 uguale alla somma algebrica delle cadute di tensione sui resistori: \u03a3\u03b5 = \u03a3iR. Questa legge deriva dalla conservativit\u00e0 del campo elettrico: il lavoro compiuto lungo un percorso chiuso \u00e8 nullo. Le due leggi, integrate con la legge di Ohm (V = Ri), permettono di scrivere e risolvere un sistema di equazioni lineari che determina completamente tutte le correnti e le tensioni in qualsiasi rete elettrica lineare.","no_ans":false},{"l":67,"n":1,"t":"Un condensatore dimezza la sua carica iniziale scaricando in 20 ms attraverso una resistenza da 40 Ohm. Quale \u00e8 la sua capacit\u00e0?","o":["0.14 mF","0.08 mF","1 mF","0.72 mF"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":67,"n":2,"t":"Una pila da f = 12 V \u00e8 connessa ad una serie formata da una resistenza R = 1.4 MOhm e un condensatore con C = 1.8 microF. Collegando al tempo t0 = 0s il","o":["circuito, dopo quanto tempo la carica accumulata sul condensatore sar\u00e0 pari a 16 microC?","6.2 s","13 ms","3.4 s","2.1 s"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":67,"n":3,"t":"Si descriva il processo di carica in un circuito RC","o":[],"is_open":true,"ans_idx":null,"ans_text":"Il circuito RC \u00e8 il circuito pi\u00f9 semplice che descrive il comportamento dinamico dei condensatori. \u00c8 formato da un generatore di f.e.m. \u03b5, una resistenza R e un condensatore C collegati in serie. Partendo dal condensatore scarico (t = 0), alla chiusura del circuito si applica la seconda legge di Kirchhoff: \u03b5 = Ri + V_C = R(dq/dt) + q/C. Questa equazione differenziale del primo ordine ha soluzione q(t) = C\u03b5(1 \u2212 e^(\u2212t/\u03c4)), dove \u03c4 = RC \u00e8 la costante di tempo del circuito. La corrente \u00e8 i(t) = (\u03b5/R)\u00b7e^(\u2212t/\u03c4) e la tensione ai capi del condensatore \u00e8 V_C(t) = \u03b5(1 \u2212 e^(\u2212t/\u03c4)). Inizialmente la corrente \u00e8 massima (\u03b5/R) come se il condensatore fosse un cortocircuito, mentre a regime (t \u226b \u03c4) la corrente si annulla e il condensatore \u00e8 completamente carico con V_C = \u03b5. La costante di tempo \u03c4 = RC [s] determina la rapidit\u00e0 del processo: dopo \u03c4 la carica ha raggiunto il 63% del valore finale, dopo 5\u03c4 \u00e8 praticamente a regime (99%). Fisicamente, \u03c4 rappresenta il compromesso tra la resistenza (che limita la corrente) e la capacit\u00e0 (che accumula carica).","no_ans":false},{"l":67,"n":4,"t":"Si discuta il bilancio energetico del processo di scarica in un circuito RC","o":[],"is_open":true,"ans_idx":null,"ans_text":"Il bilancio energetico nella scarica di un circuito RC si ricava dalla conservazione dell'energia. Si consideri un condensatore inizialmente carico con carica q\u2080 e tensione V\u2080 = q\u2080/C che si scarica su una resistenza R (generatore assente). Le equazioni del circuito danno q(t) = q\u2080\u00b7e^(\u2212t/\u03c4) con \u03c4 = RC, e la corrente i(t) = (V\u2080/R)\u00b7e^(\u2212t/\u03c4). L'energia inizialmente immagazzinata nel condensatore \u00e8 U\u2080 = \u00bdCV\u2080\u00b2 = q\u2080\u00b2/(2C). Calcolando l'energia dissipata per effetto Joule sulla resistenza: W_R = \u222b\u2080^\u221e Ri\u00b2dt = \u222b\u2080^\u221e R(V\u2080/R)\u00b2e^(\u22122t/\u03c4)dt = (V\u2080\u00b2/R)\u00b7(\u03c4/2) = (V\u2080\u00b2/R)\u00b7(RC/2) = \u00bdCV\u2080\u00b2 = U\u2080. Tutta l'energia inizialmente immagazzinata nel condensatore viene dissipata nella resistenza, indipendentemente dal valore di R. Nel processo di carica di un condensatore con una batteria, met\u00e0 dell'energia fornita dalla batteria (\u00bdC\u03b5\u00b2) viene immagazzinata nel condensatore e met\u00e0 \u00e8 dissipata sulla resistenza, anch'essa indipendentemente da R: questo risultato, apparentemente paradossale, \u00e8 una conseguenza del transiente esponenziale.","no_ans":false},{"l":67,"n":5,"t":"Si verifichi tramite analisi dimensionale che il prodotto RC rappresenti effettivamente un tempo","o":[],"is_open":true,"ans_idx":null,"ans_text":"Verifica dimensionale che il prodotto RC abbia le dimensioni di un tempo. La resistenza R si misura in Ohm: [R] = [\u03a9] = [V/A] = [V\u00b7s/C], poich\u00e9 1A = 1C/s implica 1\u03a9 = 1V/(C/s) = 1V\u00b7s/C. La capacit\u00e0 C si misura in Farad: [C] = [F] = [C/V], poich\u00e9 C = Q/V. Il prodotto ha quindi dimensioni: [RC] = [V\u00b7s/C]\u00b7[C/V] = [s]. Il prodotto RC \u00e8 dunque effettivamente un tempo, detto costante di tempo del circuito RC e indicato con \u03c4 = RC. Fisicamente, \u03c4 rappresenta il tempo caratteristico del processo di carica o scarica: dopo un intervallo \u03c4 la carica ha raggiunto circa il 63% (1 \u2212 1/e \u2248 0.632) del valore finale in fase di carica, oppure \u00e8 scesa al 37% (1/e \u2248 0.368) del valore iniziale in fase di scarica. Dopo 5\u03c4 il processo \u00e8 praticamente completato (errore < 1%).","no_ans":false},{"l":68,"n":1,"t":"Quando un ago magnetico si trova in una zona in cui \u00e8 presente un campo magnetico, risulta sottoposto:","o":["a una forza che agisce sul polo nord;","a una coppia di forze;","a una forza e a una coppia di forze.","a una forza che agisce sul polo sud;"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":68,"n":2,"t":"Perch\u00e9 il polo Nord della bussola \u00e8 attratto dal polo Nord magnetico della Terra? Due poli magnetici dello stesso nome non dovrebbero respingersi? Se si considerasse la Terra come una grande calamita, il polo Nord geografico sarebbe in realt\u00e0 un polo Sud magnetico Il polo Nord della bussola \u00e8 attratto dal polo Sud del sole La ragione sta nel fatto che l'intensit\u00e0 del campo magnetico terrestre \u00e8 molto debole","o":["Se si considerasse la Terra come una grande calamita, il polo Nord geografico sarebbe in realt\u00e0 un polo Sud magnetico","Il polo Nord della bussola \u00e8 attratto dal polo Sud del sole","La ragione sta nel fatto che l'intensit\u00e0 del campo magnetico terrestre \u00e8 molto debole","Non \u00e8 sempre vero che due poli omologhi si respingono"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":68,"n":3,"t":"Quante calamite \u00e8 possibile creare, in linea di principio, frammentando un magnete? Infinite","o":["Nessuna, perch\u00e9 se si spezza un magnete esso perde la sua magnetizzazione.","Finch\u00e8 la magnetizzazione non si esaurisce","Un numero qualsiasi, purch\u00e9 sia pari"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":68,"n":4,"t":"Del campo magnetico e del campo elettrostatico si pu\u00f2 dire che:","o":["il primo non \u00e8 conservativo, mentre il secondo lo \u00e8","il primo \u00e8 conservativo, mentre il secondo non lo \u00e8","entrambi sono conservativi","entrambi non sono conservativi"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":68,"n":5,"t":"Si descriva la forza di Lorentz e si discuta qualche esempio applicativo","o":[],"is_open":true,"ans_idx":null,"ans_text":"La forza di Lorentz \u00e8 la forza che un campo magnetico B esercita su una carica elettrica q in moto con velocit\u00e0 v: F = q\u00b7(v \u00d7 B). Il modulo \u00e8 F = qvB sin\u03b8, dove \u03b8 \u00e8 l'angolo tra v e B. La direzione della forza \u00e8 perpendicolare al piano definito da v e B, con verso determinato dalla regola della mano destra (per q > 0). Propriet\u00e0 fondamentali: la forza \u00e8 sempre ortogonale alla velocit\u00e0 (F\u00b7v = 0), quindi non compie lavoro sul la carica e non ne modifica il modulo della velocit\u00e0, ma solo la direzione. In un campo magnetico uniforme con v \u22a5 B, la forza di Lorentz fornisce la forza centripeta del moto circolare uniforme: qvB = mv\u00b2/r, da cui r = mv/(qB). La frequenza ciclotr\u00f3nica f = qB/(2\u03c0m) \u00e8 indipendente dalla velocit\u00e0. Applicazioni: spettrometro di massa (isotopi separati per raggio r diverso a seconda della massa), ciclotrone (acceleratore di particelle), selettore di velocit\u00e0 (v = E/B quando F_E = F_B), tubo catodico.","no_ans":false},{"l":69,"n":1,"t":"In quale delle seguenti situazioni fisiche un campo magnetico uniforme esercita una forza su una carica puntiforme?","o":["la carica si muove con velocit\u00e0 ortogonale al campo","la carica \u00e8 ferma","Nessuna delle precedenti","la carica si muove con velocit\u00e0 parallela al campo"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":69,"n":2,"t":"Quando un ago magnetico si trova in una zona in cui \u00e8 presente un campo magnetico, risulta sottoposto:","o":["a una coppia di forze;","a una forza che agisce sul polo nord;","a una forza e a una coppia di forze.","a una forza che agisce sul polo sud;"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":69,"n":3,"t":"Una particella carica si muove lungo una retta attraverso una particolare regione dello spazio. Vi pu\u00f2 essere un campo magnetico non nullo in questa regione?","o":["Assolutamente no, altrimenti la particella verrebbe deviata","Si, ma il campo deve essere parallelo alla direzione della velocit\u00e0","Si, ma il campo deve essere ortogonale alla direzione della velocit\u00e0","Si, ma deve anche esserci un campo elettrico parallelo al campo magnetico"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":69,"n":4,"t":"Un protone ed una particella alpha (nucleo di elio, m_al = 4\u00b7m_P q_al = 2\u00b7q_P) hanno la stessa energia cinetica quando entrano in una regione dove \u00e8 presente un campo magnetico ortogonale alla loro velocit\u00e0. Qual'\u00e8 il rapporto dei raggi dei loro cammini circolari espresso come Rp/Ra?","o":["Rp/Ra = 2","Rp/Ra = 1/2","Rp/Ra = 1/4","Rp/Ra = 1"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":69,"n":5,"t":"Un protone con una velocit\u00e0 di 5.0\u00b710^6 m/s avverte, attraversando un campo magnetico, una forza massima di 8.0\u00b710^(-14) N. Quanto vale il modulo del","o":["campo magnetico?","B = 0.50 T","B = 0.30 T","B = 0.20 T","B = 0.10 T"],"is_open":false,"ans_idx":4,"ans_text":null,"no_ans":false},{"l":69,"n":6,"t":"Un protone con una velocit\u00e0 di 5.0\u00b710^6 m/s avverte, attraversando un campo magnetico le cui linee di forza formano un angolo di 30\u00b0 con la direzione della velocit\u00e0, una forza di 8\u00b710^(-14) N. Quanto vale il modulo del campo magnetico? (La carica del protone \u00e8 1.6\u00b710^(-19) C).","o":["B = 0.2 T","B = 0.3 T","B = 0.4 T","B = 0.1 T"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":69,"n":7,"t":"La forza magnetica che agisce su una carica elettrica","o":["E' parallela alla velocit\u00e0 della carica","\u00c8 parallela alla direzione del campo magnetico","Pu\u00f2 modificarne l'energia cinetica","Non pu\u00f2 modificarne il modulo della velocit\u00e0"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":69,"n":8,"t":"Una particella carica attraversa una regione dello spazio, senza subire deviazione. Possiamo affermare che in quella regione non \u00e8 presente un campo","o":["magnetico?","Non si pu\u00f2 rispondere, perch\u00e9 non \u00e8 noto il segno della carica.","S\u00ec, perch\u00e9, se ci fosse un qualunque campo magne-tico, la particella cambierebbe direzione.","No, perch\u00e9 ci potrebbe essere un campo parallelo alla direzione della velocit\u00e0.","S\u00ec, perch\u00e9 non agisce nessuna forza sulla carica."],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":69,"n":9,"t":"Una particella, con rapporto carica su massa q/m = 2\u00b710^5 C/kg, entra in una regione di campo magnetico omogeneo di modulo B = 0.5 T, con velocit\u00e0 iniziale v0= 1\u00b710^6m/s diretta ortogonalmente al campo stesso. Quale sar\u00e0 il raggio della sua traiettoria?","o":["10 cm","10 m","4m","1m"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":69,"n":10,"t":"Un protone si muove con velocit\u00e0 di 5\u00b710^6 m/s nella stessa direzione di un campo magnetico B di modulo 1.5 T. Quanto vale la forza di Lorentz che subisce il","o":["protone?","F = 2\u00b710^(-13) N","F = 12\u00b710^(-11) N","F=0N","F = 12\u00b710^(-13) N"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":69,"n":11,"t":"Una carica percorre una traiettoria circolare di raggio 0.024 mm sotto l'effetto di un campo magnetico diretto ortogonalmente al piano della traiettoria. Il campo esercita una forza di modulo 3\u00b710^(-6) N sulla carica. Quanto vale l'energia cinetica della carica?","o":["3.6\u00b710^(-11) J","7.2\u00b710^(-11) J","1.4\u00b710^(-10) J","6.5\u00b710^(-12) J"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":69,"n":12,"t":"Nell'espressione della forza di Lorentz sono presenti tre vettori: forza, velocit\u00e0, campo. Quali sono sempre perpendicolari fra loro?","o":["Ogni vettore \u00e8 sempre perpendicolare agli altri due.","La velocit\u00e0 \u00e8 perpendicolare al campo.","La forza \u00e8 perpendicolare alla velocit\u00e0.","Non ci sono due vettori sempre perpendicolari."],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":69,"n":13,"t":"In quale delle seguenti situazioni fisiche un campo magnetico uniforme esercita una forza su una carica puntiforme?","o":["la carica si muove con velocit\u00e0 parallela al campo","la carica \u00e8 ferma","Nessuna delle precedenti","la carica si muove con velocit\u00e0 ortogonale al campo"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":69,"n":14,"t":"Due cariche elettriche q1 e q2 = 4q1, aventi velocit\u00e0 di modulo v1 e v2 = 2 v1, entrano in un campo magnetico omogeneo con velocit\u00e0 perpendicolare al campo stesso. Calcolare il rapporto F1/F2 dei moduli delle forze agenti sulle due cariche","o":["2","1/2","4","1/8"],"is_open":true,"ans_idx":null,"ans_text":"Lo spettrometro di massa \u00e8 uno strumento che sfrutta il moto circolare delle cariche in campo magnetico per misurare il rapporto massa/carica di ioni e separare isotopi. Il funzionamento si articola in due fasi. Prima fase (accelerazione): gli ioni di carica q e massa m partono da fermi e vengono accelerati attraverso una differenza di potenziale \u0394V; per conservazione dell'energia: \u00bdmv\u00b2 = q\u0394V, quindi v = \u221a(2q\u0394V/m). Seconda fase (deflessione magnetica): gli ioni entrano con velocit\u00e0 v in una regione con campo magnetico uniforme B perpendicolare a v; la forza di Lorentz fornisce la forza centripeta: qvB = mv\u00b2/r, da cui il raggio della traiettoria circolare \u00e8 r = mv/(qB). Sostituendo l'espressione di v si ottiene r = (1/B)\u221a(2m\u0394V/q), ovvero m/q = r\u00b2B\u00b2/(2\u0394V). Misurando r (la posizione di arrivo sul rivelatore) con B e \u0394V noti, si ricava il rapporto m/q. Ioni con la stessa carica q ma massa diversa (isotopi) descrivono cerchi di raggio diverso e atterrano in posizioni diverse sul rivelatore, permettendo la separazione e l'identificazione degli isotopi.","no_ans":false},{"l":69,"n":15,"t":"Un campo elettrico di 1.5 kV/m ed un campo magnetico di 0.30 T, ortogonale al campo elettrico, agiscono su un elettrone in moto lungo una retta ortogonale sia al campo elettrico che al campo magnetico, in modo che sull'elettrone agisca una forza risultante nulla. Qual'\u00e8 la velocit\u00e0 dell'elettrone?","o":["v = 8000 m/s","v = 5000 m/s","v = 2000 m/s","v = 11000 m/s"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":69,"n":16,"t":"Una particella carica in un campo magnetico uniforme una particella carica in un campo magnetico uniforme Non subisce forze","o":["Si mette in movimento per effetto del campo","Se era ferma inizia a ruotare","Subisce una forza se \u00e8 in movimento"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":69,"n":17,"t":"Cosa succede se si posiziona una carica elettrica ferma in un campo elettrico? E in un campo magnetico?","o":[],"is_open":true,"ans_idx":null,"ans_text":"Una carica elettrica ferma in un campo elettrico E subisce la forza F = qE (forza di Coulomb): se q > 0 la forza \u00e8 nella direzione del campo, se q < 0 \u00e8 in verso opposto. Questa forza compie lavoro sulla carica e ne modifica l'energia cinetica (e quindi la velocit\u00e0). Una carica ferma in un campo magnetico B, invece, non subisce alcuna forza: la forza di Lorentz \u00e8 F = q(v \u00d7 B) = 0 se v = 0. Il campo magnetico agisce solo sulle cariche in moto. Se la stessa carica \u00e8 in moto in un campo magnetico, subisce la forza F = qv\u00d7B perpendicolare alla velocit\u00e0: il campo magnetico curva la traiettoria ma non cambia il modulo della velocit\u00e0 (non compie lavoro). In presenza di entrambi i campi, la forza totale \u00e8 la forza di Lorentz generalizzata: F = q(E + v\u00d7B). Questa distinzione fondamentale tra campo elettrico e campo magnetico riflette la loro diversa natura fisica: il campo elettrico \u00e8 un campo conservativo (rotE = 0 in elettrostatica), il campo magnetico non \u00e8 conservativo (rotB = \u03bc\u2080j \u2260 0 in generale).","no_ans":false},{"l":69,"n":18,"t":"Si discuta il principio di funzionamento di uno spettrometro di massa.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Lo spettrometro di massa sfrutta il principio che ioni con lo stesso rapporto carica/massa ma diversa massa descrivono traiettorie circolari di raggio diverso in un campo magnetico. Il dispositivo \u00e8 composto da: (1) una sorgente ionica che produce ioni di massa m e carica q; (2) un acceleratore che li porta a velocit\u00e0 v = \u221a(2q\u0394V/m) tramite una differenza di potenziale \u0394V; (3) una camera di separazione con campo magnetico uniforme B perpendicolare a v; (4) un rivelatore (lastra fotografica o detector). Nel campo magnetico, la forza di Lorentz qvB = mv\u00b2/r fornisce la forza centripeta, da cui r = mv/(qB) = (1/B)\u221a(2m\u0394V/q). Ioni di masse diverse m\u2081 e m\u2082 (stesso q) descrivono semicerchi di raggi r\u2081 e r\u2082 proporzionali a \u221am e arrivano in punti diversi del rivelatore. Dalla misura di r si ricava m = qr\u00b2B\u00b2/(2\u0394V). Applicazioni: misura precisa delle masse atomiche, separazione di isotopi (uranio arricchito per reattori nucleari), analisi di sostanze organiche in chimica (spettrometria di massa per molecole organiche).","no_ans":false},{"l":69,"n":19,"t":"Cosa succede a una carica elettrica in movimento in un campo magnetico?","o":[],"is_open":true,"ans_idx":null,"ans_text":"Una carica elettrica q di massa m in moto con velocit\u00e0 v in un campo magnetico uniforme B subisce la forza di Lorentz F = qv\u00d7B. Questa forza \u00e8 sempre perpendicolare alla velocit\u00e0, quindi non compie lavoro e non modifica il modulo di v; modifica solo la direzione. Se la velocit\u00e0 \u00e8 perpendicolare al campo (v \u22a5 B), la forza \u00e8 costante in modulo e funge da forza centripeta: qvB = mv\u00b2/r, da cui r = mv/(qB). La carica descrive una traiettoria circolare di raggio r nel piano perpendicolare a B, con frequenza ciclotr\u00f3nica f_c = qB/(2\u03c0m), indipendente dalla velocit\u00e0 (principio del ciclotrone). Se v ha una componente parallela a B (v_\u2225), questa non viene deflessa (F_\u2225 = 0); la componente perpendicolare v_\u22a5 produce il moto circolare descritto prima. La combinazione di moto circolare (nel piano \u22a5B) e moto rettilineo uniforme (lungo B) produce una traiettoria elicoidale, con passo p = v_\u2225\u00b7T = 2\u03c0mv_\u2225/(qB). Se v \u00e8 parallela a B, F = 0 e la carica prosegue senza deflessione.","no_ans":false},{"l":69,"n":20,"t":"Si descriva il moto di una carica che entra con velocit\u00e0 orientata in direzione generica all'interno di una regione di campo magnetico uniforme.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Quando una carica q di massa m entra in un campo magnetico uniforme B con velocit\u00e0 v orientata in direzione generica (angolo \u03b8 rispetto a B), il moto risultante si ottiene decomponeendo v in due componenti: v_\u2225 = v cos\u03b8 (parallela a B) e v_\u22a5 = v sin\u03b8 (perpendicolare a B). La componente v_\u2225 non \u00e8 influenzata dal campo magnetico (F = qv_\u2225\u00d7B = 0 perch\u00e9 parallele) e d\u00e0 luogo a un moto rettilineo uniforme lungo la direzione di B. La componente v_\u22a5 subisce la forza di Lorentz F = qv_\u22a5\u00d7B, perpendicolare a v_\u22a5 e a B, che genera un moto circolare uniforme nel piano perpendicolare a B con raggio r = mv_\u22a5/(qB) = mv sin\u03b8/(qB) e periodo T = 2\u03c0m/(qB). La sovrapposizione dei due moti produce una traiettoria elicoidale (a spirale) attorno alla direzione di B, con asse parallelo a B, raggio r = mv sin\u03b8/(qB) e passo (avanzamento per giro) p = v_\u2225\u00b7T = 2\u03c0mv cos\u03b8/(qB). Questo tipo di moto \u00e8 alla base del confinamento del plasma nei reattori a fusione (tokamak) tramite campi magnetici intensi.","no_ans":false},{"l":69,"n":21,"t":"Si discuta il principio di funzionamento di uno spettrometro di massa.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Lo spettrometro di massa \u00e8 un dispositivo che permette di misurare con grande precisione le masse di ioni e di separare isotopi di uno stesso elemento. Il principio fisico si basa sul diverso raggio di curvatura che ioni di diversa massa descrivono in un campo magnetico uniforme. Processo: ioni di carica q vengono prima accelerati da una differenza di potenziale \u0394V, acquisendo energia cinetica \u00bdmv\u00b2 = q\u0394V, quindi velocit\u00e0 v = \u221a(2q\u0394V/m). Entrando nella camera di deflessione dove \u00e8 presente un campo magnetico uniforme B perpendicolare alla velocit\u00e0, descrivono una traiettoria circolare di raggio r = mv/(qB). Sostituendo v si ottiene r = \u221a(2m\u0394V/q)/B, da cui m/q = r\u00b2B\u00b2/(2\u0394V). Ioni con massa diversa ma stessa carica (isotopi) hanno raggio diverso e vengono rivelati in posizioni diverse. Applicazioni: determinazione delle masse atomiche, analisi isotopica dei materiali geologici e biologici (datazione con C\u00b9\u2074), separazione di isotopi per uso medico e nucleare, analisi di sostanze organiche complesse (spettrometria di massa accoppiata alla cromatografia).","no_ans":false},{"l":70,"n":1,"t":"Due fili indefiniti paralleli, distanti 1 mm sono attraversati dalla stessa corrente I con stesso verso. Tra di essi si misura una forza attrattiva per unit\u00e0 di","o":["lunghezza pari a 0.5 N/m. Quanto vale I?","25 A","50 A","10 A","80 A"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":70,"n":2,"t":"Una spira quadrata di lato L = 20 cm \u00e8 percorsa da una corrente di 2 mA. Essa \u00e8 immersa in un campo magnetico uniforme di 0.5 T diretto ortogonalmente alla superficie della spira. Quale \u00e8 il valore del momento della forza applicata sulla spira?","o":["6\u00b710^(-5) N\u00b7m","0 N\u00b7m","2*10^(-4) N*m","4\u00b710^(-4) N\u00b7m"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":70,"n":3,"t":"La forza che si esercita tra due fili conduttori rettilinei e paralleli percorsi da correnti uguali ed equiverse:","o":["\u00e8 ortogonale ai fili e repulsiva","\u00e8 nulla","\u00e8 ortogonale ai fili e attrattiva","\u00e8 parallela ai fili"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":70,"n":4,"t":"Una spira quadrata di lato L = 20 cm \u00e8 immersa in una regione di campo magnetico B = 4 T diretto ortogonalmente alla superficie della spira stessa. Quanto vale il momento della forza magnetica agente sulla spira quando in essa circola una corrente pari a 2 A","o":["0.32 N\u00b7m","0 N\u00b7m","160 N\u00b7m","16 N\u00b7m"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":70,"n":5,"t":"Un filo rettilineo \u00e8 percorso da corrente. Possiamo accorgercene con","o":["una cellula fotoelettrica","una bussola","un metronomo","uno stetoscopio"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":70,"n":6,"t":"Il momento torcente su una spira percorsa da corrente, immersa dentro un campo magnetico, dipende: dalla corrente, dalla superficie della spira, dal campo e da come la spira \u00e8 orientata nel campo.","o":["dalla corrente, dalla superficie della spira, dal campo e da come la spira \u00e8 orientata nel campo.","solo dalla corrente e dall'angolo che la spira forma con la direzione del campo;","solo dall'area della spira e dal campo;","solo dalla corrente e dal campo;"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":70,"n":7,"t":"Una spira quadrata di lato L = 20 cm \u00e8 percorsa da una corrente di 2 mA. Essa \u00e8 immersa in un campo magnetico uniforme di 0.5 T diretto ortogonalmente alla superficie della spira. Quale \u00e8 il valore del momento della forza applicata sulla spira?","o":["4*10^(-4) N*m","6*10^(-5) N*m","0 N*m","2*10^(-4) N*m"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":70,"n":8,"t":"Si definisca il momento magnetico di una spira piana e l'azione di un campo magnetico su di essa.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Il momento magnetico di una spira piana \u00e8 un vettore m definito come m = i\u00b7A\u00b7n\u0302, dove i \u00e8 la corrente che percorre la spira, A \u00e8 l'area della spira e n\u0302 \u00e8 il versore normale al piano della spira (la direzione di n\u0302 \u00e8 determinata dalla regola della mano destra rispetto al verso della corrente). Il modulo \u00e8 m = iA, con unit\u00e0 di misura A\u00b7m\u00b2. Il momento magnetico caratterizza completamente la spira come sorgente di campo magnetico a grande distanza (dipolo magnetico). Quando la spira \u00e8 immersa in un campo magnetico esterno B, la forza risultante sulla spira \u00e8 nulla in campo uniforme (le forze sui vari tratti si compensano), ma il campo esercita un momento torcente (torque) M = m \u00d7 B, di modulo M = iAB sin\u03b8, dove \u03b8 \u00e8 l'angolo tra m e B. Il momento torcente tende ad allineare m con B (posizione di equilibrio stabile: \u03b8 = 0, M = 0). L'energia potenziale associata \u00e8 U = \u2212m\u00b7B = \u2212iAB cos\u03b8, minima quando m \u00e8 parallelo a B. Questo \u00e8 il principio di funzionamento del galvanometro (misura la corrente dall'angolo di rotazione della spira), del motore elettrico e della bussola magnetica.","no_ans":false},{"l":70,"n":9,"t":"Si descriva la forza che un campo magnetico esercita su un tratto di filo rettilineo e su un circuito chiuso percorsi da corrente.","o":[],"is_open":true,"ans_idx":null,"ans_text":"La forza che un campo magnetico B esercita su un tratto di conduttore rettilineo di lunghezza L percorso da corrente i \u00e8 data dalla seconda legge di Laplace: F = i\u00b7L \u00d7 B, dove L \u00e8 il vettore lunghezza nella direzione della corrente. Il modulo \u00e8 F = iLB sin\u03b8, con \u03b8 angolo tra L e B. Per un tratto infinitesimo ds la forza elementare \u00e8 dF = i\u00b7ds \u00d7 B. Su un circuito chiuso piano in un campo magnetico uniforme, la forza risultante totale \u00e8 nulla (per il principio di sovrapposizione, i contributi si cancellano), ma pu\u00f2 esistere un momento torcente M = iA \u00d7 B = m \u00d7 B dove A \u00e8 l'area del circuito. Per un circuito non piano in campo non uniforme, la forza totale pu\u00f2 essere diversa da zero. La forza tra due fili rettilinei paralleli di lunghezza L, percorsi da correnti i\u2081 e i\u2082 e distanti d, \u00e8 F = \u03bc\u2080i\u2081i\u2082L/(2\u03c0d), attrattiva se le correnti sono nello stesso verso (correnti concordi), repulsiva se hanno verso opposto. Questa forza \u00e8 alla base della definizione storica dell'Ampere come unit\u00e0 fondamentale del SI.","no_ans":false},{"l":71,"n":1,"t":"Un filo indefinitamente lungo \u00e8 percorso da una corrente i, in un punto distante r dal filo, il campo magnetico \u00e8","o":["diretto sullo stesso piano individuato dal filo e dal punto e proporzionale a i/r^2","diretto ortogonalemnte al piano individuato dal filo e dal punto e proporzionale a i/r","nullo","diretto sullo stesso piano individuato dal filo e dal punto e proporzionale a i/r"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":71,"n":2,"t":"Una carica puntiforme positiva, viaggia a velocit\u00e0 costante parallelamente a un filo infinitamente lungo a distanza d da esso. Ad un certo istante nel filo \u00e8 attivata una corrente stazionaria i con verso concorde a quello della carica, che a questo punto","o":["Viene deflessa verso il filo","Permane nel suo stato di moto rettilineo uniforme","Viene deflessa ortogonalmente al piano sotteso dal filo e dalla sua traiettoria iniziale","Viene deflessa lontano dal filo"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":71,"n":3,"t":"Il campo magnetico lungo l'asse di una spira circolare percorsa da corrente","o":["E' diretto come la corrente nella spira","E' minimo al centro della spira","E' proporzionale al quadrato della corrente","\u00c8 massimo al centro della spira"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":71,"n":4,"t":"Le linee di forza del campo magnetico intorno ad un filo rettilineo molto lungo percorso da una corrente I sono:","o":["delle circonferenze parallele al filo","delle circonferenze concentriche con il filo","delle rette parallele al filo","delle rette uscenti dal filo"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":71,"n":5,"t":"Ad una distanza di 2.4 cm da un filo conduttore rettilineo molto lungo, il campo magnetico ha modulo 16 microT. Quanto vale l'intensit\u00e0 di corrente nel filo?","o":["B = 2.82 A","B = 4.07 A","B = 1.92 A","B = 1.64 A"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":71,"n":6,"t":"Si enunci e descriva la legge di Biot-Savart","o":[],"is_open":true,"ans_idx":null,"ans_text":"La legge di Biot-Savart descrive il campo magnetico generato da qualsiasi distribuzione di corrente stazionaria. Nella sua forma elementare (prima legge di Laplace), il contributo dB al campo magnetico in un punto P generato da un tratto infinitesimo ds di conduttore percorso da corrente i \u00e8: dB = (\u03bc\u2080/4\u03c0)\u00b7(i\u00b7ds \u00d7 r\u0302)/r\u00b2, dove r \u00e8 la distanza dal tratto ds al punto P, r\u0302 \u00e8 il versore da ds verso P, e \u03bc\u2080 = 4\u03c0\u00d710\u207b\u2077 T\u00b7m/A \u00e8 la permeabilit\u00e0 magnetica del vuoto. Il campo totale si ottiene integrando su tutto il circuito: B = \u222bdB. La direzione di dB \u00e8 perpendicolare sia a ds che a r\u0302 (prodotto vettoriale), mentre il verso segue la regola della mano destra. Applicazione al filo rettilineo infinito: integrando lungo un filo infinito che porta corrente i, si ottiene il campo in un punto a distanza r: B = \u03bc\u2080i/(2\u03c0r), con linee di campo che sono circonferenze concentriche attorno al filo (nel piano perpendicolare al filo), con verso dato dalla regola della mano destra rispetto alla corrente. Il campo decresce come 1/r (pi\u00f9 lentamente di una carica puntiforme, che decade come 1/r\u00b2).","no_ans":false},{"l":72,"n":1,"t":"Il campo magnetico presente in un solenoide ideale di lunghezza infinita non dipende da dal materiale all'interno del solenoide dal raggio del solenoide dalla corrente che scorre nel solenoide","o":["dal materiale all'interno del solenoide","dal raggio del solenoide","dalla corrente che scorre nel solenoide","dal numero delle spire per unit\u00e0 di lunghezza"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":72,"n":2,"t":"Il campo magnetico generato dalla corrente che scorre in un filo rettilineo indefinito \u00e8 diretto","o":["Su un piano parallelo al filo","Su una superficie sferica concatenata col filo","Su un piano ortogonale al filo","Parallelamente al filo"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":72,"n":3,"t":"Cosa afferma il teorema di Ampere? La corrente che circola in una resistenza \u00e8 pari al rapporto tra la differenza di potenziale ai capi delle resistenza diviso la resistenza stessa Due fili paralleli indefinitamente lunghi, attraversati da una corrente di 1 A, esercitano tra loro una forza per unit\u00e0 di lunghezza pari a mu_0/(2*PI_greco) la circuitazione del campo magnetico lungo una linea chiusa \u00e8 uguale alla somma algebrica delle correnti, con segno opportunamente definito, concatenate alla linea chiusa","o":["La corrente che circola in una resistenza \u00e8 pari al rapporto tra la differenza di potenziale ai capi della resistenza diviso la resistenza stessa (Legge di Ohm)","La circuitazione del campo magnetico su una linea chiusa \u00e8 uguale alla somma algebrica delle correnti concatenate, moltiplicata per la permeabilit\u00e0 magnetica del vuoto","La forza esercitata da un campo magnetico B su una carica q che si muove a velocit\u00e0 v \u00e8 data da q\u00b7(v\u00d7B)","Due fili paralleli percorsi da correnti uguali si attraggono con forza F/L = \u03bc\u2080I\u00b2/(2\u03c0d)"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":72,"n":4,"t":"La legge di Amp\u00e8re afferma che:","o":["La circuitazione del campo elettrostatico \u00e8 sempre nulla","La circuitazione del campo magnetico \u00e8 sempre nulla","Nessuna delle altre risposte","La circuitazione del campo elettrico \u00e8 nulla"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":72,"n":5,"t":"Una carica con q/m = 1.27\u00b710^6 C/kg, si muove di moto circolare uniforme con una velocit\u00e0 di 400 m/s, all'interno e intorno all'asse di un lungo solenoide rettilineo, in cui circola una corrente di 0.25 A. Il raggio della traiettoria della carica \u00e8 10 cm. Il solenoide avr\u00e0 quindi","o":["Circa 100 spire/cm","Circa 1000 spire/cm","Circa 20000 spire/cm","Circa 10000 spire/cm"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":72,"n":6,"t":"Un solenoide lungo 10 cm, con 600 spire, \u00e8 percorso da una corrente di 20 A. Quanto vale il campo magnetico al suo interno?","o":["B = 6 microT","B = 23 mT","B = 151 mT","B = 226 mT"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":72,"n":7,"t":"Si descriva il campo magnetico all'interno di un solenoide rettilineo percorso da corrente.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Il campo magnetico all'interno di un solenoide rettilineo ideale (lunghezza >> diametro) percorso da corrente i \u00e8 uniforme, parallelo all'asse del solenoide e ha intensit\u00e0 B = \u03bc\u2080ni, dove n \u00e8 il numero di spire per unit\u00e0 di lunghezza e \u03bc\u2080 = 4\u03c0\u00d710\u207b\u2077 T\u00b7m/A. All'esterno del solenoide ideale il campo \u00e8 nullo. Questa soluzione si ricava applicando il teorema di Ampere a un percorso rettangolare ABCDA, con il lato AB di lunghezza L all'interno del solenoide (parallelo all'asse) e il lato CD corrispondente all'esterno: \u222eB\u00b7dl = B\u00b7L + 0 + 0 + 0 = \u03bc\u2080\u00b7(nL)\u00b7i (le correnti concatenate sono le nL spire intersecate), da cui B = \u03bc\u2080ni. Il campo non dipende dalla sezione del solenoide n\u00e9 dalla posizione radiale del punto interno, ma solo da n e i. In pratica, un solenoide reale produce un campo molto uniforme nella parte centrale, che degenera agli estremi; per minimizzare questo effetto si usano toroidi (solenoidi avvolti ad anello), nei quali il campo \u00e8 confinato all'interno del toro con B = \u03bc\u2080ni/(2\u03c0r) e B = 0 all'esterno.","no_ans":false},{"l":72,"n":8,"t":"Si enunci e si descriva il teorema di Ampere","o":[],"is_open":true,"ans_idx":null,"ans_text":"Il teorema di Ampere \u00e8 uno dei risultati fondamentali del magnetostatico e afferma che la circuitazione del vettore campo magnetico B lungo una qualsiasi curva chiusa l \u00e8 uguale alla somma algebrica delle correnti che attraversano qualsiasi superficie avente l come contorno, moltiplicata per la permeabilit\u00e0 magnetica del vuoto: \u222e_l B\u00b7dl = \u03bc\u2080\u00b7\u03a3i_concatenate. Le correnti sono algebriche: positive o negative a seconda del verso (regola della vite destra rispetto al verso di percorrenza di l). Il teorema deriva dall'integrazione della prima legge di Laplace. Una conseguenza immediata \u00e8 che il campo magnetico non \u00e8 conservativo (la circuitazione non \u00e8 nulla in generale), a differenza del campo elettrostatico. In forma locale (applicando il teorema di Stokes alla circuitazione): rot B = \u2207\u00d7B = \u03bc\u2080j, dove j \u00e8 la densit\u00e0 di corrente; questa \u00e8 la terza equazione di Maxwell (in regime stazionario). Applicazioni: campo di un filo rettilineo infinito (scegliendo una circonferenza di raggio r: B\u00b72\u03c0r = \u03bc\u2080i \u2192 B = \u03bc\u2080i/(2\u03c0r)), campo di un solenoide (B = \u03bc\u2080ni), campo di un toroide (B = \u03bc\u2080ni/(2\u03c0r) interno, B = 0 esterno).","no_ans":false}];

var filter='all',lesson=null;
var lc={};Q.forEach(function(q){lc[q.l]=(lc[q.l]||0)+1;});

function buildSB(){
  var sb=document.getElementById('sb');
  var h='<button class="lb active" id="lb-all" onclick="setL(null)"><span class="ln">&#128218;</span><span class="lname">Tutte le lezioni</span><span class="lc">215</span></button>';
  var lessons=[]; Q.forEach(function(q){if(lessons.indexOf(q.l)<0)lessons.push(q.l);});
  lessons.sort(function(a,b){return a-b;});
  lessons.forEach(function(l){
    var num = l<10 ? '00'+l : (l<100 ? '0'+l : l);
    h+='<button class="lb" id="lb-'+l+'" onclick="setL('+l+')"><span class="ln">L'+num+'</span><span class="lname">'+(LN[l]||l)+'</span><span class="lc">'+(lc[l]||0)+'</span></button>';
  });
  sb.innerHTML=h;
}

function setL(l){
  lesson=l;
  var btns=document.querySelectorAll('.lb');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  var target=document.getElementById(l?'lb-'+l:'lb-all');
  if(target)target.classList.add('active');
  render();
}

function setF(f,btn){
  filter=f;
  var pills=document.querySelectorAll('.pill');
  for(var i=0;i<pills.length;i++)pills[i].classList.remove('active');
  btn.classList.add('active');
  render();
}

function getFilt(){
  var t=document.getElementById('search').value.toLowerCase().trim();
  return Q.filter(function(q){
    if(lesson&&q.l!==lesson)return false;
    if(filter==='mc'&&q.is_open)return false;
    if(filter==='open'&&!q.is_open)return false;
    if(t){
      var h=(q.t+' '+(q.o||[]).join(' ')).toLowerCase();
      var words=t.split(/\s+/).filter(Boolean);
      return words.every(function(w){return h.indexOf(w)>=0;});
    }
    return true;
  });
}

function esc(s){
  if(!s)return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildAns(q){
  if(q.no_ans)return'<div class="no-ans">&#9888; Opzioni non estratte dal PDF.</div>';
  if(q.is_open&&q.ans_text)return'<div class="open-ans"><strong>&#128214; Risposta tipo</strong>'+esc(q.ans_text)+'</div>';
  if(!q.o||!q.o.length)return'<div class="no-ans">Opzioni non disponibili.</div>';
  var h='<div class="opts">';
  for(var i=0;i<q.o.length;i++){
    var cls=(i===q.ans_idx)?'opt correct':'opt';
    h+='<div class="'+cls+'">'+esc(q.o[i])+'</div>';
  }
  h+='</div>';
  return h;
}

function render(){
  var f=getFilt();
  document.getElementById('vc').textContent=f.length;
  var c=document.getElementById('qc');
  if(!f.length){c.innerHTML='<div class="empty"><p style="font-size:2em">&#128269;</p>Nessuna domanda trovata</div>';return;}
  var h='',last=null;
  f.forEach(function(q){
    if(q.l!==last){
      h+='<div class="sec">L'+q.l+' \u2014 '+(LN[q.l]||q.l)+'</div>';
      last=q.l;
    }
    var num = q.n<10 ? '0'+q.n : q.n;
    var id='q'+q.l+'-'+q.n;
    var badge=q.is_open?'<span class="qbadge op">APERTA</span>':'<span class="qbadge mc">CHIUSA</span>';
    h+='<div class="qcard" id="'+id+'" onclick="tog(this)">';
    h+='<div class="qhead">'+badge+'<span class="qt"><b>Q'+num+'</b> \u2014 '+esc(q.t)+'</span><span class="qarrow">&#9660;</span></div>';
    h+='<div class="qans">'+buildAns(q)+'</div>';
    h+='</div>';
  });
  c.innerHTML=h;
}

function tog(el){el.classList.toggle('open');}

document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='f'){
    e.preventDefault();
    var s=document.getElementById('search');s.focus();s.select();
  }
});

buildSB();
render();

</script>
</body>
</html>
