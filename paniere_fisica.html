<style>:root{--bg:#0f0e0c;--surf:#1a1814;--surf2:#212019;--border:#2e2b24;--border2:#3d3a30;
--accent:#c8a96e;--adim:rgba(200,169,110,0.12);--green:#27ae60;--gdim:rgba(39,174,96,0.1);
--blue:#5dade2;--bdim:rgba(93,173,226,0.10);--text:#e8e0d0;--muted:#9a9080;--dim:#5a5248;--r:10px;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;min-height:100vh;line-height:1.65}
header{background:rgba(15,14,12,.97);border-bottom:1px solid var(--border);padding:14px 24px;
  position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.logo{font-family:Palatino,serif;font-size:17px;font-weight:700;color:var(--accent);white-space:nowrap}
.logo span{font-size:10px;color:var(--dim);display:block;font-weight:normal;font-family:monospace;letter-spacing:1px}
.sw{flex:1;position:relative;min-width:180px}
#search{width:100%;background:var(--surf2);border:1.5px solid var(--border);border-radius:8px;
  color:var(--text);font-size:14px;font-family:Georgia,serif;padding:8px 12px 8px 36px;outline:none;transition:border-color .15s;}
#search:focus{border-color:var(--accent)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;pointer-events:none}
.stats{font-family:monospace;font-size:11px;color:var(--dim);white-space:nowrap}
.stats b{color:var(--accent)}
.layout{display:flex;min-height:calc(100vh - 59px)}
aside{width:210px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--border);
  padding:10px 0;overflow-y:auto;position:sticky;top:59px;height:calc(100vh - 59px);}
.lb{display:flex;align-items:center;gap:7px;width:100%;padding:7px 14px;background:none;border:none;
  cursor:pointer;color:var(--muted);font-size:11px;font-family:monospace;text-align:left;
  transition:all .15s;border-left:3px solid transparent;}
.lb:hover{background:var(--surf2);color:var(--text)}
.lb.active{background:var(--adim);color:var(--accent);border-left-color:var(--accent)}
.lb .ln{font-size:12px;font-weight:700;min-width:28px}
.lb .lname{font-size:9px;opacity:.7;line-height:1.3}
.lb .lc{margin-left:auto;font-size:9px;background:var(--border);padding:1px 5px;border-radius:8px;flex-shrink:0}
main{flex:1;padding:22px;max-width:880px}
.filters{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.pill{font-family:monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;
  padding:4px 13px;border-radius:20px;cursor:pointer;border:1.5px solid var(--border);
  background:transparent;color:var(--dim);transition:all .15s;}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--adim);border-color:var(--accent);color:var(--accent)}
.pill.mc-pill.active{background:var(--gdim);border-color:var(--green);color:var(--green)}
.pill.op-pill.active{background:var(--bdim);border-color:var(--blue);color:var(--blue)}
.qcard{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px;overflow:hidden;cursor:pointer;}
.qhead{display:flex;align-items:flex-start;gap:11px;padding:13px 17px;}
.qhead:hover{background:rgba(255,255,255,.02)}
.qbadge{font-family:monospace;font-size:9px;padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:3px;white-space:nowrap;}
.qbadge.mc{background:var(--gdim);color:var(--green);border:1px solid rgba(39,174,96,.2)}
.qbadge.op{background:var(--bdim);color:var(--blue);border:1px solid rgba(93,173,226,.2)}
.qt{font-size:13.5px;line-height:1.6;color:var(--text);flex:1}
.qarrow{color:var(--dim);font-size:10px;margin-top:4px;flex-shrink:0;transition:transform .2s}
.qcard.open .qarrow{transform:rotate(180deg);color:var(--accent)}
.qans{display:none;padding:0 17px 15px 48px}
.qcard.open .qans{display:block}
.opts{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.opt{font-size:12.5px;padding:7px 11px;border-radius:6px;border:1px solid var(--border);color:var(--muted);background:var(--surf2);}
.opt.correct{background:var(--gdim);border-color:rgba(39,174,96,.35);color:var(--green);font-weight:600;}
.opt.correct::before{content:"\2713  "}
.open-ans{background:var(--bdim);border:1px solid rgba(93,173,226,.2);border-radius:7px;
  padding:12px 16px;font-size:13px;color:#cde4f5;line-height:1.8;}
.open-ans strong{display:block;font-family:monospace;font-size:8px;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--blue);margin-bottom:8px}
.no-ans{font-family:monospace;font-size:11px;color:var(--dim);padding:7px 11px;
  border:1px dashed var(--border);border-radius:6px;}
.sec{font-family:monospace;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);
  margin:22px 0 11px;display:flex;align-items:center;gap:10px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.empty{text-align:center;padding:60px 20px;color:var(--dim);font-family:monospace}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@media(max-width:640px){aside{display:none}main{padding:12px}}</style>

var Q=[{"l":49,"n":1,"t":"Due particelle di carica positiva q e 4q sono separate da una distanza d. Determinare la posizione x di un punto compreso tra le due cariche, misurato da q,","o":["presso il quale la forza netta su una terza carica sarebbe zero.","x = d/2","x = d/3","x = 2d","x = d/4"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":49,"n":2,"t":"In un campo elettrico uniforme vicino alla superficie della Terra, una particella avente una carica di -2.0\u00b710^(-9) C \u00e8 soggetta ad una forza elettrica di","o":["3.0\u00b710^(-6) N verso il basso. Calcolare l'intensit\u00e0 ed il verso del campo elettrico.","E = 500 V /m verso l'alto","E = 1.5 kV /m verso l'alto","E = 750 kN/C verso il basso","E = 1500 N/C verso il basso"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":49,"n":3,"t":"Se la distanza tra due cariche elettriche di segno opposto viene raddoppiata, la forza di attrazione:","o":["aumenta di un fattore 2","aumenta di un fattore 4","non varia","diminuisce di un fattore 4"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":49,"n":4,"t":"Due cariche puntiformi, Q1 = 50 mC e Q2 = 1 mC, sono separate da una distanza r. Qual'\u00e8 la forza pi\u00f9 intensa, quella che Q1 esercita su Q2 o viceversa? Q1 crea un campo elettrico maggiore, quindi la forza che essa esercita su Q2 sar\u00e0 maggiore Dato che la forza di Coulomb \u00e8 conservativa, le due forze devono essere inversamente proporzionali alla carica, quindi la forza su Q2 \u00e8 maggiore","o":["Per il principio di azione e reazione le due forze in modulo devono essere uguali","La forza \u00e8 proporzionale alla carica, quindi Q1 avvertir\u00e0 una forza maggiore"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":50,"n":1,"t":"Quattro cariche della stessa intensit\u00e0 sono poste nei vertici di un quadrato. La forza che si esercita su una delle cariche pu\u00f2 essere nulla?","o":["S\u00ec, se le altre tre cariche hanno lo stesso segno.","No, in nessun caso.","S\u00ec, se le cariche sui vertici opposti hanno lo stesso segno.","S\u00ec, se le cariche hanno lo stesso segno."],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":50,"n":2,"t":"Tre cariche A, B, C sono disposte su un piano. La carica C \u00e8 sottoposta a una forza di 3 N dalla carica A e una forza di 4 N dalla carica B. La forza totale a cui","o":["\u00e8 sottoposta la carica C risulta","5N","1N","Non ho elementi sufficienti per rispondere","7N"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":50,"n":3,"t":"Agli estremi di un'asta orizzontale sono fissate due cariche positive uguali, e al centro \u00e8 disposta una carica negativa in grado di scorrere lungo l'asta. La","o":["carica negativa si trova","in uno stato di equilibrio instabile","Non ho elementi sufficienti per rispondere","in uno stato di equilibrio stabile","in uno stato di non equilibrio"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":50,"n":4,"t":"La forza tra due cariche elettriche puntiformi poste a una distanza r dipende dalla distanza secondo una proporzionalit\u00e0:","o":["quadratica","diretta","quadratica inversa","inversa"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":50,"n":5,"t":"Una carica elettrica negativa \u00e8 attratta da una positiva. Se la distanza tra le cariche raddoppia la forza tra le cariche","o":["raddoppia","quadruplica","diventa la met\u00e0","diventa un quarto"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":50,"n":6,"t":"Una carica elettrica negativa \u00e8 attratta da una positiva. Se la distanza tra le cariche viene dimezzata la forza tra le cariche","o":["diventa la met\u00e0","diventa un quarto","quadruplica","raddoppia"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":50,"n":7,"t":"Due palline cariche sono ad una distanza di 20 cm l'una dall'altra. Vengono spostate, e la forza tra esse quadruplica. Quanto distano ora?","o":["10 cm","5 cm","80 cm","40 cm"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":50,"n":8,"t":"Due cariche A e B poste a una distanza d tra loro risentono di una forza attrattiva di intensit\u00e0 F. Dopo aver dimezzato la carica di A e raddoppiato la distanza","o":["tra le cariche, l'intensit\u00e0 della forza sar\u00e0","F/4","2F","F/2","F/8"],"is_open":false,"ans_idx":4,"ans_text":null,"no_ans":false},{"l":50,"n":9,"t":"Si enunci e discuta la legge di Coulomb","o":[],"is_open":true,"ans_idx":null,"ans_text":"La legge di Coulomb afferma che la forza elettrostatica tra due cariche puntiformi q\u2081 e q\u2082, poste a distanza r nel vuoto, \u00e8 proporzionale al prodotto delle due cariche e inversamente proporzionale al quadrato della loro distanza: F = (1/4\u03c0\u03b5\u2080)\u00b7|q\u2081q\u2082|/r\u00b2, dove \u03b5\u2080 = 8.85\u00d710\u207b\u00b9\u00b2 C\u00b2/(N\u00b7m\u00b2) \u00e8 la costante dielettrica del vuoto. La forza \u00e8 di natura repulsiva se le cariche hanno lo stesso segno, attrattiva se hanno segno opposto. La direzione della forza \u00e8 quella della retta congiungente le due cariche. Per il terzo principio della dinamica (azione e reazione), le forze che q\u2081 esercita su q\u2082 e viceversa sono uguali in modulo e opposte in verso. La legge \u00e8 analoga alla legge di gravitazione universale di Newton, con la differenza fondamentale che la forza elettrica pu\u00f2 essere sia attrattiva sia repulsiva, mentre la gravit\u00e0 \u00e8 sempre attrattiva. Il principio di sovrapposizione permette di estendere il risultato a sistemi di N cariche: la forza su una carica \u00e8 la somma vettoriale dei contributi di ciascuna delle altre cariche.","no_ans":false},{"l":51,"n":1,"t":"Le linee di campo nel caso di una carica isolata puntiforme sono:","o":["entranti nella carica sia se essa \u00e8 positiva, sia se \u00e8 negativa","uscenti dalla carica se essa \u00e8 negativa, entranti se \u00e8 positiva","uscenti dalla carica se essa \u00e8 positiva, entranti se \u00e8 negativa.","uscenti dalla carica sia se essa \u00e8 positiva, sia se \u00e8 negativa"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":51,"n":2,"t":"Una carica elettrica puntiforme di 0.2 mC ha massa 5 g. Quale dovrebbe essere l'intensit\u00e0 del campo elettrico verticale che dovremmo applicare per tenerla","o":["ferma e sospesa nel vuoto?","120 N/C","2 N/C","0.2 N/C","245 N/C"],"is_open":false,"ans_idx":4,"ans_text":null,"no_ans":false},{"l":51,"n":3,"t":"Si dice che in un punto P dello spazio \u00e8 presente un campo elettrico se:","o":["in P, o nelle sue immediate vicinanze, \u00e8 presente una carica elettrica","un corpo di prova carico, se posto in P, sperimenta una forza di origine elettrica","in P, o nelle sue immediate vicinanze, \u00e8 presente un corpo di prova","una carica magnetica posta in P subisce una forza sul piano ortogonale"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":51,"n":4,"t":"Tre cariche puntiformi da 0.012 mC sono distribuite lungo una retta r, ciascuna distante 50 cm dalla successiva. Quanto vale il campo elettrico in un punto P, posto su una retta ortogonale ad r e passante per la carica centrale, distante 20 cm dalla carica centrale stessa?","o":["Circa 2\u00b710^6 V/m","Circa 4\u00b710^6 V/m","Circa 1\u00b710^6 V/m","Circa 3\u00b710^6 V/m"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":51,"n":5,"t":"Per scoprire se una regione dello spazio \u00e8 sede di un campo elettrico basta mettervi una carica q e vedere se su di essa si esercita una forza elettrica. Da che","o":["cosa dipende il vettore campo elettrico?","Dal valore di q.","N\u00e9 dal valore, n\u00e9 dal segno di q.","Dal segno di q.","Dal valore e dal segno di q."],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":51,"n":6,"t":"L'accelerazione con cui si muove una particella carica dentro un campo \u00e8:","o":["variabile;","costante;","dipende dal tipo di carica.","costante se il campo \u00e8 uniforme;"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":51,"n":7,"t":"Definire il campo elettrico.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Il campo elettrico E in un punto P dello spazio \u00e8 una grandezza vettoriale definita come il limite del rapporto tra la forza F esercitata su una carica di prova q\u2080 posta in P e il valore di quella carica, per q\u2080 che tende a zero: E = lim(q\u2080\u21920) F/q\u2080. Il limite \u00e8 necessario affinch\u00e9 la carica di prova non perturbi la distribuzione di cariche sorgente che genera il campo. Il campo elettrico ha le dimensioni di Newton per Coulomb [N/C], equivalenti a Volt per metro [V/m]. Il campo \u00e8 una propriet\u00e0 intrinseca dello spazio generata dalle cariche sorgente, indipendente dalla carica di prova. La direzione del campo coincide con quella della forza su una carica positiva. Una volta noto il campo, la forza su qualsiasi carica q posta in quel punto si ottiene semplicemente come F = qE.","no_ans":false},{"l":51,"n":8,"t":"Come viene definito il campo elettrico? Si discuta il campo elettrico generato da una carica puntiforme.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Il campo elettrico si definisce a partire dal concetto operativo di carica di prova: E = lim(q\u2080\u21920) F/q\u2080, dove F \u00e8 la forza su una carica di prova infinitesima q\u2080. Per una carica puntiforme Q isolata nel vuoto, applicando la legge di Coulomb si ottiene che il campo in un punto a distanza r da Q vale E = (1/4\u03c0\u03b5\u2080)\u00b7Q/r\u00b2, con direzione radiale rispetto alla carica sorgente. Se Q \u00e8 positiva il campo \u00e8 diretto verso l'esterno (direzione centrifuga), se Q \u00e8 negativa \u00e8 diretto verso la carica (direzione centripeta). Il modulo del campo decresce con il quadrato della distanza, come per la forza gravitazionale. Per un sistema di pi\u00f9 cariche vale il principio di sovrapposizione: il campo totale \u00e8 la somma vettoriale dei campi generati da ciascuna carica singolarmente, E_tot = \u03a3E\u1d62. Le linee di campo sono curve il cui vettore tangente in ogni punto coincide con la direzione del campo: escono dalle cariche positive, entrano in quelle negative, e non si intersecano mai tra loro.","no_ans":false},{"l":51,"n":9,"t":"Si definiscano il dipolo elettrico e il momento di un dipolo elettrico e si discuta il campo elettrico generato da tale sistema.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Il dipolo elettrico \u00e8 un sistema fisico costituito da due cariche uguali e opposte +q e \u2212q, separate da una distanza d. Il momento di dipolo \u00e8 un vettore p di modulo p = qd, diretto dalla carica negativa verso quella positiva. Il momento di dipolo caratterizza completamente le propriet\u00e0 elettriche del sistema a distanze grandi rispetto a d. Il campo elettrostatico generato dal dipolo in un punto P sull'asse perpendicolare al dipolo, a distanza r molto maggiore di d, vale in modulo E \u2248 p/(4\u03c0\u03b5\u2080r\u00b3) ed \u00e8 antiparallelo al momento di dipolo. Il campo decade come 1/r\u00b3, pi\u00f9 rapidamente che per una carica singola (1/r\u00b2), perch\u00e9 i contributi delle due cariche tendono a cancellarsi. Il concetto di dipolo \u00e8 fondamentale in fisica perch\u00e9 molte molecole (come H\u2082O) hanno un momento di dipolo permanente, che ne determina le propriet\u00e0 chimiche e fisiche; in altri casi il dipolo \u00e8 indotto dall'applicazione di un campo elettrico esterno.","no_ans":false},{"l":52,"n":1,"t":"La forza che agisce su una particella che ha una data carica elettrica \u00e8 determinata","o":["dal potenziale elettrico.","dalla somma del campo elettrico e del potenziale elettrico","dal vettore campo elettrico.","da nessuno di questi"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":52,"n":2,"t":"Una particella, con rapporto carica su massa q/m = 2\u00b710^5 C/kg, entra all'istante t = 0 s, all'interno di un condensatore piano, con velocit\u00e0 iniziale v0 = 1\u00b710^6 m/s diretta parallelamente alle armature del condensatore stesso, in un punto equidistante dalle armature. La distanza tra le armature del condensatore \u00e8 pari a 50 cm e la differenza di potenziale \u00e8 DV = 1 V. Dopo quanto tempo la particella impatta sull'armatura inferiore (a carica negativa) del condensatore?","o":["4.8 ms","1.1 ms","4.3 micros","2.4 ms"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":52,"n":3,"t":"Un dipolo elettrico \u00e8 immerso in una campo uniforme di modulo E = 40 N/C; il momento torcente che agisce sul dipolo passa da 0 a 10^(-26) N\u00b7m, a seconda dell'angolo theta che il dipolo forma con il campo. Quanto vale il modulo del momento di dipolo ?","o":["2.5\u00b710^(-28) C\u00b7m","6.2\u00b710^(-28) C\u00b7m","1\u00b710^(-26) C\u00b7m","4.1\u00b710^(-27) C\u00b7m"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":52,"n":4,"t":"Un elettrone viene posto lungo l'asse di un disco uniformemente carico di raggio R. Se la densit\u00e0 di carica superficiale del disco \u00e8 4.0\u00b710^(-6) C/m^2, quanto vale in modulo l'accelerazione iniziale dell'elettrone se \u00e8 posizionato ad una distanza R, R/100 o R/1000 dal centro del disco?","o":["2.61\u00b710^15 m/s^2, 6.13\u00b710^15 m/s^2, 6.15\u00b710^15 m/s^2","7.93\u00b710^16 m/s^2, 7.93\u00b710^16 m/s^2, 7.93\u00b710^16 m/s^2","8.23\u00b710^16 m/s^2, 1.45\u00b710^17 m/s^2, 3.97\u00b710^17 m/s^2","1.16\u00b710^16 m/s^2, 3.93\u00b710^16 m/s^2, 3.97\u00b710^16 m/s^2"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":52,"n":5,"t":"Fare un esempio di disposizione delle linee di forza del campo elettrico in una distribuzione di cariche","o":[],"is_open":true,"ans_idx":null,"ans_text":"La rappresentazione delle linee di forza del campo elettrico fornisce una visualizzazione intuitiva della distribuzione del campo nello spazio. Per una carica puntiforme positiva isolata, le linee di forza sono rette che si dipartono radialmente dalla carica verso l'infinito, con densit\u00e0 uniforme in tutte le direzioni. Per un dipolo elettrico (cariche +q e \u2212q), le linee partono dalla carica positiva e terminano nella carica negativa, descrivendo curve chiuse nella regione di spazio circostante: quelle sull'asse del dipolo sono rette, quelle laterali sono archi di curva. In un condensatore piano (due lastre cariche \u00b1\u03c3 parallele), le linee di campo sono parallele, perpendicolari alle armature e uniformemente distanziate, rappresentando un campo uniforme. La densit\u00e0 locale delle linee \u00e8 proporzionale all'intensit\u00e0 del campo: dove le linee sono pi\u00f9 fitte il campo \u00e8 pi\u00f9 intenso.","no_ans":false},{"l":52,"n":6,"t":"Si discuta l'interazione tra una carica elettrica e un campo elettrico.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Quando una carica elettrica q \u00e8 posta in una regione di spazio sede di un campo elettrico E, essa \u00e8 soggetta a una forza F = qE. Questa forza \u00e8 parallela al campo se q \u00e8 positiva, antiparallela se q \u00e8 negativa. Se la carica \u00e8 libera di muoversi, il campo le imprime un'accelerazione a = qE/m. In un campo uniforme (costante in modulo e direzione), una carica con velocit\u00e0 iniziale parallela al campo esegue un moto rettilineo uniformemente accelerato, analogo al moto di caduta libera. Se invece la velocit\u00e0 iniziale \u00e8 perpendicolare al campo, la traiettoria \u00e8 una parabola: il moto \u00e8 uniforme nella direzione perpendicolare al campo e uniformemente accelerato in quella parallela, esattamente come il moto di un proiettile in un campo gravitazionale. Il campo elettrico compie lavoro sulla carica, modificandone l'energia cinetica: il lavoro della forza elettrica per uno spostamento da A a B \u00e8 L_AB = q(V_A \u2212 V_B), dove V \u00e8 il potenziale elettrico.","no_ans":false},{"l":52,"n":7,"t":"Si discuta l'interazione di un dipolo elettrico con un campo elettrico uniforme in cui sia immerso.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Un dipolo elettrico con momento p = qd immerso in un campo elettrico uniforme E \u00e8 soggetto a una coppia di forze: le forze +qE e \u2212qE, uguali in modulo e opposte in verso, si applicano alle due cariche del dipolo e la loro risultante \u00e8 nulla. Tuttavia, esse non sono collineari (a meno che p sia parallelo a E), quindi generano un momento torcente M = p \u00d7 E, di modulo M = pE sin\u03b8, dove \u03b8 \u00e8 l'angolo tra p ed E. Il momento torcente tende ad allineare il dipolo con il campo, portandolo alla posizione di equilibrio stabile \u03b8 = 0 (p parallelo a E). La posizione \u03b8 = 180\u00b0 \u00e8 di equilibrio instabile. Il lavoro compiuto dal momento torcente per ruotare il dipolo da \u03b8 a \u03b8=0 \u00e8 W = pE(1 \u2212 cos\u03b8); la corrispondente energia potenziale \u00e8 U = \u2212p\u00b7E = \u2212pE cos\u03b8, minima quando il dipolo \u00e8 allineato col campo. Questo meccanismo governa l'orientamento delle molecole polari (come H\u2082O) nei campi elettrici applicati.","no_ans":false},{"l":53,"n":1,"t":"Una regione di spazio di forma sferica \u00e8 soggetta a un campo elettrico, ma non contiene alcuna carica elettrica al proprio interno. Il flusso attraverso la","o":["superficie \u00e8:","Il flusso \u00e8 certamente positivo","Le informazioni date non sono sufficienti per rispondere","Il flusso \u00e8 certamente nullo","Se c'\u00e8 un campo elettrico c'\u00e8 un flusso che pu\u00f2 essere positivo o negativo"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":53,"n":2,"t":"In quali condizioni vale il teorema di Gauss","o":["Soltanto se la somma delle cariche \u00e8 diversa da zero","Soltanto se la superficie considerata \u00e8 chiusa","Per qualsiasi superficie nello spazio","Soltanto se la superficie considerata \u00e8 sferica"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":53,"n":3,"t":"Il campo elettrostatico generato da una carica positiva distribuita uniformemente in un guscio sferico di raggio R e spessore infinitesimo, per una distanza","o":["dal centro del guscio r minore di R","diminuisce come il quadrato della distanza dal centro del guscio","diminuisce come l'inverso della distanza dal centro della sfera","aumenta proporzionalmente alla distanza dal centro del guscio","\u00e8 nullo"],"is_open":false,"ans_idx":4,"ans_text":null,"no_ans":false},{"l":53,"n":4,"t":"Un cubo contiene carica uniformemente distribuita nel volume. Si pu\u00f2 calcolare il campo elettrostatico generato da tale distribuzione di carica utilizzando la","o":["legge di Gauss?","No: in simmetria cubica la legge di Gauss \u00e8 falsa","S\u00ec, ma solo all'interno del cubo","S\u00ec, ma solo approssimativamente e a grandi distanze","Si, ovunque"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":53,"n":5,"t":"Una sfera di raggio R = 30 cm ha una carica di 0.8 microC distribuita uniformemente al suo interno. Quanto vale il campo elettrico in un punto distante r =","o":["25 cm dal centro della sfera?","315 V/m","66.6 kV/m","12.4 kV/m","666 V/m"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":53,"n":6,"t":"Si enunci il teorema di Gauss, fornendo un esempio esplicativo.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Il teorema di Gauss \u00e8 uno dei risultati fondamentali dell'elettrostatica: esso afferma che il flusso del vettore campo elettrostatico E attraverso una qualsiasi superficie chiusa S \u00e8 uguale alla somma algebrica delle cariche elettriche contenute all'interno di S, divisa per la costante dielettrica del vuoto \u03b5\u2080: \u03a6_S(E) = \u222e_S E\u00b7dA = Q_int/\u03b5\u2080. Le cariche esterne alla superficie non contribuiscono al flusso netto, poich\u00e9 il loro campo entra ed esce dalla superficie in egual misura. Il teorema deriva direttamente dalla legge di Coulomb e dalla propriet\u00e0 radiale del campo. Come esempio applicativo, si consideri una sfera conduttrice carica con carica totale Q e raggio R: scegliendo come superficie gaussiana una sfera concentrica di raggio r > R, per simmetria sferica E \u00e8 costante e perpendicolare in ogni punto della superficie, quindi \u03a6 = E\u00b74\u03c0r\u00b2 = Q/\u03b5\u2080, da cui E = Q/(4\u03c0\u03b5\u2080r\u00b2), identico al campo di una carica puntiforme. Il teorema di Gauss \u00e8 particolarmente utile per calcolare il campo in situazioni ad alta simmetria (sferica, cilindrica, planare).","no_ans":false},{"l":54,"n":1,"t":"Due cariche puntiformi Q1 = 6 nC e Q2 = -3 nC, distano 80 cm tra esse. Quanto vale il potenziale elettrostatico nel punto P, posto lungo la loro congiungente","o":["a un a distanza di 20 cm da Q1?","354.0 V","622.4 V","224.8 V","161.6 V"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":54,"n":2,"t":"Una carica puntiforme Q = 0.1 C viene lasciata libera di muoversi dal suo stato di quiete nell'origine di un sistema di riferimento, sotto l'azione di un campo elettrico uniforme diretto come l'asse x, con modulo E = 75 N/C. Quanto \u00e8 variata l'energia potenziale elettrostatica della carica quando essa si trova nella","o":["posizione x = 2 m?","-15 J","15 J","-1.5 J","1.5 J"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":54,"n":3,"t":"Quanto lavoro \u00e8 necessario per spostare una carica di 8 microC da un punto a potenziale zero ad un punto a potenziale 75 V?","o":["L = 600 microJ","L = 400 microJ","L = 0.8 mJ","L = 300 microJ"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":54,"n":4,"t":"Un elettrone viene accelerato da una differenza di potenziale V. Quanto pi\u00f9 grande sarebbe la sua velocit\u00e0 finale se fosse accelerato da una differenza di","o":["potenziale quattro volte pi\u00f9 grande?","1 volta","2 volte","4 volte","8 volte"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":54,"n":5,"t":"Una superficie gaussiana sferica di raggio r = 4 cm \u00e8 concentrica a una sfera carica con densit\u00e0 uniforme di raggio r0 = 1 cm. Il flusso del campo elettrico attraverso la superficie gaussiana vale 5.6\u00b710^4 N\u00b7m^2/C. Quale \u00e8 il potenziale a d = 12 cm di distanza dal centro della sfera carica ?","o":["1.74\u00b710^4 V","7.42\u00b710^4 V","3.71\u00b710^4 V","9.2\u00b710^3 V"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":54,"n":6,"t":"Calcolare la velocit\u00e0 di fuga di un elettrone che si trova inizialmente sulla superficie di una sfera di raggio r0 = 1 cm di carica pari a 1.6\u00b710^(-15) C distribuita","o":["uniformemente.","1.12\u00b710^4 m/s","2.25\u00b710^4 m/s","9.22\u00b7104","4.5\u00b7\u00b710^4 m/s"],"is_open":true,"ans_idx":null,"ans_text":"La velocit\u00e0 di fuga di un elettrone (m = 9.11\u00d710\u207b\u00b3\u00b9 kg, q = e = 1.6\u00d710\u207b\u00b9\u2079 C) dalla superficie di una sfera di raggio R = 1 cm = 0.01 m con carica Q = 10\u207b\u00b9\u2075 C si ricava dalla conservazione dell'energia. Il potenziale sulla superficie \u00e8 V = kQ/R = 9\u00d710\u2079\u00d710\u207b\u00b9\u2075/0.01 = 9\u00d710\u207b\u2074 V. Poich\u00e9 l'elettrone ha carica negativa, il potenziale crea un'energia potenziale U = \u2212eV < 0 (il campo \u00e8 attrattivo per una sfera carica positivamente). Per sfuggire, l'elettrone deve avere energia cinetica sufficiente a raggiungere l'infinito (dove V = 0 e U = 0): \u00bdmv\u00b2_fuga = eV (modulo), da cui v_fuga = \u221a(2eV/m) = \u221a(2\u00d71.6\u00d710\u207b\u00b9\u2079\u00d79\u00d710\u207b\u2074/9.11\u00d710\u207b\u00b3\u00b9) = \u221a(3.16\u00d710\u2078) \u2248 1.78\u00d710\u2074 m/s. Questo valore \u00e8 molto inferiore alla velocit\u00e0 della luce (0.006% di c), quindi il trattamento classico \u00e8 valido.","no_ans":false},{"l":54,"n":7,"t":"Dopo aver introdotto il concetto di differenza di potenziale tra due punti di una regione in cui sia attivo un campo elettrico, si descriva il potenziale","o":["elettrostatico generato da una carica elettrica puntiforme."],"is_open":true,"ans_idx":null,"ans_text":"La differenza di potenziale elettrostatico tra due punti A e B di una regione in cui \u00e8 presente un campo elettrostatico E \u00e8 definita come il lavoro che la forza elettrica compie per unit\u00e0 di carica positiva per spostare la carica da A a B: V_A \u2212 V_B = \u222b_A^B E\u00b7ds = L_AB/q. Tale definizione \u00e8 coerente con la conservativit\u00e0 del campo elettrostatico, che garantisce l'indipendenza del risultato dalla traiettoria seguita. Fissando convenzionalmente il potenziale nullo all'infinito (V(\u221e) = 0), il potenziale elettrostatico generato da una carica puntiforme Q in un punto a distanza r da essa \u00e8 V(r) = (1/4\u03c0\u03b5\u2080)\u00b7Q/r. Il potenziale \u00e8 una grandezza scalare: positivo per cariche positive, negativo per cariche negative. La sua unit\u00e0 di misura \u00e8 il Volt (V = J/C). Per sistemi di pi\u00f9 cariche vale il principio di sovrapposizione in forma scalare: V_tot = \u03a3V\u1d62 = \u03a3(kQ\u1d62/r\u1d62), operazione molto pi\u00f9 semplice della sovrapposizione vettoriale del campo.","no_ans":false},{"l":54,"n":8,"t":"Cos'\u00e8 il potenziale elettrico?","o":[],"is_open":true,"ans_idx":null,"ans_text":"Il potenziale elettrico V in un punto P dello spazio \u00e8 definito come l'energia potenziale elettrostatica per unit\u00e0 di carica positiva: V = U/q. Esso misura il lavoro che la forza elettrica \u00e8 in grado di compiere per unit\u00e0 di carica nel portare una carica di prova da quel punto all'infinito (dove il potenziale \u00e8 convenzionalmente zero). La grandezza \u00e8 scalare e si misura in Volt (V = J/C). Fisicamente, il potenziale descrive la \"pressione elettrica\" in un punto dello spazio: in punti a potenziale pi\u00f9 elevato le cariche positive tendono a muoversi verso zone a potenziale inferiore, esattamente come l'acqua scende da quote maggiori a quote minori. Il campo elettrico si ricava dal potenziale come suo gradiente con segno cambiato: E = \u2212\u2207V, quindi il campo \u00e8 diretto dal potenziale pi\u00f9 alto verso quello pi\u00f9 basso, perpendicolare alle superfici equipotenziali. Due punti a potenziale diverso definiscono una differenza di potenziale (tensione) \u0394V = V_A \u2212 V_B, grandezza direttamente misurabile con un voltmetro.","no_ans":false},{"l":54,"n":9,"t":"Si discuta la conservazione dell'energia di una carica elettrica in moto all'interno di un campo elettrico.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Una carica elettrica q di massa m che si muove in una regione di spazio sotto la sola azione del campo elettrostatico (campo conservativo) \u00e8 soggetta al principio di conservazione dell'energia meccanica totale. L'energia totale, somma dell'energia cinetica e dell'energia potenziale elettrostatica, rimane costante lungo tutta la traiettoria: E_tot = \u00bdmv\u00b2 + qV = costante. Questa relazione implica che se la carica si sposta da un punto A a un punto B, la variazione di energia cinetica \u00e8 uguale al lavoro compiuto dalla forza elettrica: \u0394EK = EK_B \u2212 EK_A = q(V_A \u2212 V_B). Se una carica positiva si sposta da un punto a potenziale pi\u00f9 alto verso uno a potenziale pi\u00f9 basso, il campo compie lavoro positivo e la carica accelera; il contrario vale per una carica negativa. Questa legge \u00e8 alla base del funzionamento dei tubi a raggi catodici, degli acceleratori di particelle e dei tubi a vuoto: un elettrone accelerato attraverso una differenza di potenziale \u0394V acquista energia cinetica |e|\u0394V, ovvero una velocit\u00e0 v = \u221a(2|e|\u0394V/m).","no_ans":false},{"l":55,"n":1,"t":"Il modulo del campo elettrico generato da un filo uniformemente carico di lunghezza indefinita","o":["diminuisce come il quadrato della distanza dal filo","aumenta proporzionalmente alla distanza dal filo","\u00e8 proporzionale a 1/r, con r distanza dal filo","\u00e8 uniforme nello spazio"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":55,"n":2,"t":"Il campo elettrico in un punto dello spazio \u00e8 pari al potenziale elettrico nel punto moltiplicato per il valore di una carica di prova posta in tale punto","o":["\u00e8 pari alla forza che si esercita su una carica di prova posta in tale punto","\u00e8 pari al rapporto tra la forza elettrica esercitata su una carica di prova posta in tale punto diviso per il valore della carica stessa","\u00e8 pari alla forza che si esercita tra due cariche poste uguali poste simmetricamente a tale punto divisa per il valore della carica comune"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":55,"n":3,"t":"Si avvicina un corpo carico A ad un corpo carico B e si nota che essi si attraggono. Avvicinando poi B ad un corpo carico C, si nota che essi si respingono. Si","o":["pu\u00f2 concludere che:","La carica di A ha lo stesso segno di B","La carica di A ha segno opposto a C","Le tre cariche sono dello stesso segno","La carica di A ha lo stesso segno di C"],"is_open":false,"ans_idx":4,"ans_text":null,"no_ans":false},{"l":55,"n":4,"t":"Quale \u00e8 l'unit\u00e0 di misura della costante dielettrica del vuoto?","o":["J","C^2/(N*m^2)","N/ (C^2 * m^2)","C^2/m^2"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":55,"n":5,"t":"Il campo elettrostatico generato da un piano indefinito uniformemente carico","o":["ha modulo che varia come l'inverso della distanza dal piano.","\u00e8 uniforme nello spazio","ha modulo che varia come l'inverso della distanza dal piano al quadrato","ha modulo inversamente proporzionale alla distanza dal piano"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":55,"n":6,"t":"Il campo elettrostatico generato da una carica positiva distribuita uniformemente in un guscio sferico di raggio R e spessore infinitesimo, per r minore di R","o":["\u00e8 nullo","diminuisce come il quadrato della distanza dal centro della sfera","diminuisce come l'inverso della distanza dal centro della sfera","aumenta proporzionalmente alla distanza dal centro dela sfera"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":55,"n":7,"t":"Il campo elettrostatico generato da una carica positiva distribuita uniformemente in una sfera di raggio R, per r minore di R, ovvero all'interno della sfera","o":["stessa:","\u00e8 nullo","\u00e8 costante","aumenta proporzionalmente alla distanza dal centro della sfera","diminuisce come il quadrato della distanza dal centro della sfera"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":55,"n":8,"t":"Il potenziale elettrico, proprio come il campo elettrico, \u00e8 una grandezza vettoriale","o":["Falso","Sono entrambi scalari","Vero","Dipende dai casi"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":55,"n":9,"t":"Si discuta la determinazione del campo elettrostatica in un punto di una regione in cui sia noto il potenziale elettrostatico.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Il campo elettrostatico in un punto di una regione in cui sia noto il potenziale V(x,y,z) si determina attraverso l'operazione di gradiente con segno negativo: E = \u2212\u2207V. Esplicitando nelle tre componenti cartesiane: E\u2093 = \u2212\u2202V/\u2202x, E\u1d67 = \u2212\u2202V/\u2202y, E_z = \u2212\u2202V/\u2202z. Questa relazione deriva direttamente dalla definizione di potenziale: V_A \u2212 V_B = \u222b_A^B E\u00b7ds, che differenziando localmente d\u00e0 dV = \u2212E\u00b7ds, ovvero E = \u2212\u2207V. Il segno negativo indica che il campo punta nella direzione di massima diminuzione del potenziale: le cariche positive si muovono spontaneamente da regioni ad alto potenziale verso regioni a basso potenziale. Le superfici equipotenziali (luoghi geometrici dove V = costante) sono sempre perpendicolari alle linee del campo elettrico, e il campo \u00e8 sempre diretto ortogonalmente a tali superfici nel verso di V decrescente. In una regione dove il potenziale \u00e8 costante (come l'interno di un conduttore in equilibrio), il campo \u00e8 nullo. Questo metodo scalare \u00e8 spesso pi\u00f9 conveniente della sovrapposizione vettoriale dei campi, specialmente per distribuzioni di carica continue.","no_ans":false},{"l":56,"n":1,"t":"In un campo elettrico le superfici equipotenziali","o":["sono sempre perpendicolari tra loro","formano sempre delle regioni chiuse dello spazio","sono sempre parallele alle linee di campo","formano sempre angoli retti con le linee di campo"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":56,"n":2,"t":"In un conduttore carico di forma qualsiasi, la carica","o":["\u00e8 pi\u00f9 densa nelle parti di superficie a maggior raggio di curvatura.","\u00e8 distribuita uniformemente nel volume del conduttore.","\u00e8 pi\u00f9 densa nelle parti di superficie a minor raggio di curvatura.","\u00e8 distribuita uniformemente sulla superficie del conduttore."],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":56,"n":3,"t":"Mettendo una sfera conduttrice carica a contatto con un'altra sfera identica alla prima, che frazione della carica iniziale rimane sulla sfera?","o":["la stessa carica","un quarto","nessuna carica","la met\u00e0"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":56,"n":4,"t":"Come varia il potenziale in un conduttore in condizioni elettrostatiche ?","o":[],"is_open":true,"ans_idx":null,"ans_text":"In un conduttore in condizioni di equilibrio elettrostatico il campo elettrico all'interno \u00e8 rigorosamente nullo: se esistesse un campo, gli elettroni di conduzione subirebbero una forza e si metterebbero in moto, contraddicendo l'ipotesi di equilibrio. Poich\u00e9 il campo interno \u00e8 nullo, la circuitazione di E lungo qualsiasi percorso chiuso interno al conduttore \u00e8 nulla, il che implica per la relazione E = \u2212\u2207V che il gradiente del potenziale \u00e8 ovunque nullo all'interno: il potenziale \u00e8 pertanto costante in tutto il volume del conduttore e sulla sua superficie. Il conduttore \u00e8 quindi una superficie equipotenziale. Questa propriet\u00e0 ha importanti conseguenze pratiche: due punti qualsiasi di un conduttore sono sempre allo stesso potenziale, indipendentemente dalla loro posizione; collegando due conduttori con un filo conduttore si eguagliano i loro potenziali; il campo esterno in prossimit\u00e0 della superficie \u00e8 sempre perpendicolare alla superficie stessa, come si ricava dalla continuit\u00e0 della componente tangenziale di E all'interfaccia.","no_ans":false},{"l":56,"n":5,"t":"Come viene definita la capacit\u00e0 elettrica di un conduttore","o":[],"is_open":true,"ans_idx":null,"ans_text":"La capacit\u00e0 elettrica C di un conduttore isolato \u00e8 definita come il rapporto costante tra la carica Q depositata sul conduttore e il potenziale V che essa genera: C = Q/V. Questa definizione \u00e8 ben posta perch\u00e9, per le equazioni dell'elettrostatica lineare, raddoppiando la carica si raddoppia anche il potenziale, mantenendo costante il loro rapporto. La capacit\u00e0 dipende esclusivamente dalla geometria del conduttore (forma e dimensioni) e dal mezzo in cui \u00e8 immerso, non dalla carica presente. La sua unit\u00e0 di misura \u00e8 il Farad (F = C/V), che rappresenta una capacit\u00e0 molto grande: i condensatori pratici hanno capacit\u00e0 dell'ordine di \u03bcF (10\u207b\u2076 F) o pF (10\u207b\u00b9\u00b2 F). Per una sfera conduttrice isolata di raggio R nel vuoto si ottiene V = kQ/R, quindi C = Q/V = R/(k) = 4\u03c0\u03b5\u2080R: la capacit\u00e0 \u00e8 proporzionale al raggio. Questo spiega perch\u00e9 i fulmini colpiscono preferibilmente le punte: un conduttore appuntito ha piccolo raggio di curvatura, quindi piccola capacit\u00e0, quindi per una data carica ha potenziale molto elevato.","no_ans":false},{"l":56,"n":6,"t":"Si enunci e si dimostri il teorema di Coulomb per il campo elettrostatico in prossimit\u00e0 della superficie di un conduttore carico","o":[],"is_open":true,"ans_idx":null,"ans_text":"Il teorema di Coulomb afferma che il campo elettrostatico in prossimit\u00e0 della superficie esterna di un conduttore carico \u00e8 diretto perpendicolarmente alla superficie e ha modulo E = \u03c3/\u03b5\u2080, dove \u03c3 \u00e8 la densit\u00e0 superficiale di carica locale. Dimostrazione: si considera una superficie gaussiana cilindrica infinitesima con le basi parallele alla superficie del conduttore, una interna e una esterna. Il campo all'interno del conduttore \u00e8 nullo per definizione di equilibrio elettrostatico; quindi solo la base esterna contribuisce al flusso: \u03a6 = E\u00b7\u0394S = (carica interna)/\u03b5\u2080 = \u03c3\u00b7\u0394S/\u03b5\u2080, da cui E = \u03c3/\u03b5\u2080. La perpendicolarit\u00e0 alla superficie deriva invece dalla conservativit\u00e0 del campo: la componente tangenziale di E \u00e8 continua attraverso qualsiasi interfaccia; essendo nulla all'interno, \u00e8 nulla anche all'esterno in prossimit\u00e0 della superficie. Il teorema implica che dove la densit\u00e0 di carica \u03c3 \u00e8 maggiore (nelle zone a minor raggio di curvatura, come le punte) il campo esterno \u00e8 pi\u00f9 intenso: questo \u00e8 il cosiddetto \"potere dispersivo delle punte\", sfruttato nei parafulmini.","no_ans":false},{"l":56,"n":7,"t":"Definire la capacit\u00e0 elettrica","o":[],"is_open":true,"ans_idx":null,"ans_text":"La capacit\u00e0 elettrica C \u00e8 la grandezza fisica che quantifica l'attitudine di un sistema conduttore (o di un condensatore) ad accumulare carica elettrostatica per unit\u00e0 di potenziale: C = Q/V, con unit\u00e0 di misura il Farad [F = C/V]. Dipende solo dalla geometria e dal mezzo dielettrico, non dalla carica. Per un condensatore piano, dove due armature di area S sono separate da una distanza d piccola rispetto alle dimensioni laterali, il campo tra le armature \u00e8 uniforme (E = \u03c3/\u03b5\u2080 = Q/(\u03b5\u2080S)) e la differenza di potenziale \u00e8 \u0394V = E\u00b7d = Qd/(\u03b5\u2080S), quindi C = \u03b5\u2080S/d. Aumentare la superficie S o ridurre la distanza d aumenta la capacit\u00e0. Inserendo un dielettrico di costante \u03b5\u1d63 si ottiene C = \u03b5\u1d63\u03b5\u2080S/d = \u03b5S/d, perch\u00e9 il dielettrico riduce il campo interno generando cariche di polarizzazione che si oppongono al campo esterno.","no_ans":false},{"l":56,"n":8,"t":"Che differenza c'\u00e8 tra conduttori e isolanti?","o":[],"is_open":true,"ans_idx":null,"ans_text":"Conduttori e isolanti si distinguono per la natura del legame degli elettroni con gli atomi. Nei conduttori (tipicamente metalli come rame, alluminio, argento) una parte degli elettroni \u00e8 molto debolmente legata agli atomi e forma una \"nuvola\" di elettroni di conduzione liberi di muoversi in risposta a qualsiasi campo elettrico anche debole. Questa propriet\u00e0 spiega perch\u00e9 in un conduttore in equilibrio il campo interno \u00e8 nullo: gli elettroni si ridistribuiscono finch\u00e9 il campo da essi generato non controbilancia quello esterno. Negli isolanti (o dielettrici: vetro, plastica, gomma, ceramica), invece, tutti gli elettroni sono fortemente legati agli atomi e non possono muoversi a distanze macroscopiche; pertanto una carica depositata su un isolante rimane nella posizione in cui viene posta. I semiconduttori (silicio, germanio) hanno un comportamento intermedio: a temperatura ambiente hanno pochi portatori di carica liberi, la cui densit\u00e0 aumenta esponenzialmente con la temperatura. La distinzione tra conduttori e isolanti \u00e8 alla base di tutta l'elettrotecnica e dell'elettronica.","no_ans":false},{"l":57,"n":1,"t":"Due condensatori uguali vengono connessi in serie ad una pila da 10 V e si misura una energia immagazzinata pari a 120 J. Quanto vale la capacit\u00e0 di ciascun condensatore","o":["9.6 F","4.8 F","2.4 F","48 F"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":57,"n":2,"t":"In un conduttore carico di forma qualsiasi, la carica","o":["\u00e8 pi\u00f9 densa nelle parti di superficie a maggior raggio di curvatura.","\u00e8 pi\u00f9 densa nelle parti di superficie a minor raggio di curvatura.","\u00e8 distribuita uniformemente nel volume del conduttore.","\u00e8 distribuita uniformemente sulla superficie del conduttore."],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":57,"n":3,"t":"Se raddoppiamo la carica posseduta da un condensatore, cosa succede alla sua capacit\u00e0?","o":["rimane la stessa","bisogna conoscere il valore della carica","raddoppia","dimezza"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":57,"n":4,"t":"Un condensatore C1 = 10 microF connesso a un parallelo tra due condensatori C2 = 10 microF e C3 = 2 microF. Quanto vale la capacit\u00e0 equivalente del","o":["circuito.","10.9 microF","6.25 microF","11.7 microF","5.45 microF"],"is_open":false,"ans_idx":4,"ans_text":null,"no_ans":false},{"l":57,"n":5,"t":"Due lastre parallele identiche sono caricate a una differenza di potenziale di 50 V. Se la distanza tra le due lastre \u00e8 di 5.0 cm, quanto vale il campo elettrico tra","o":["le lastre?","E = 1000 V/m","E = 2500 V/m","E = 10 V/m","E = 250 V/m"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":57,"n":6,"t":"Due condensatori in parallelo sono collegati a una batteria. Che cosa cambia se inseriamo un terzo condensatore in parallelo agli altri due?","o":["La d.d.p. su ogni condensatore e la capacit\u00e0 equivalente.","La capacit\u00e0 equivalente e la carica su ogni armatura.","Niente.","Solo la capacit\u00e0 equivalente."],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":57,"n":7,"t":"Si discuta la capacit\u00e0 equivalente di pi\u00f9 condensatori in configurazione in serie e in parallelo.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Quando pi\u00f9 condensatori sono collegati tra loro, il sistema pu\u00f2 essere rappresentato da un singolo condensatore equivalente di capacit\u00e0 C_eq. In configurazione parallelo i condensatori hanno le stesse armature collegate in comune, quindi la stessa differenza di potenziale \u0394V; le cariche si sommano: Q_tot = Q\u2081 + Q\u2082 + ... = C\u2081\u0394V + C\u2082\u0394V + ..., da cui C_eq = \u03a3C\u1d62. La capacit\u00e0 equivalente in parallelo \u00e8 sempre maggiore di ciascuna capacit\u00e0 individuale. In configurazione serie, invece, le armature di ciascun condensatore si inducono reciprocamente: la carica su tutti i condensatori \u00e8 la stessa Q, mentre le differenze di potenziale si sommano: \u0394V_tot = Q/C\u2081 + Q/C\u2082 + ..., da cui 1/C_eq = \u03a3(1/C\u1d62). La capacit\u00e0 equivalente in serie \u00e8 sempre minore del minimo tra le singole capacit\u00e0. Il collegamento in serie \u00e8 usato quando si vuole ridurre la capacit\u00e0 o aumentare la tensione di lavoro massima, ripartendola tra i vari condensatori; il parallelo quando si vuole aumentare la capacit\u00e0.","no_ans":false},{"l":57,"n":8,"t":"Si definiscano il condensatore e la sua capacit\u00e0 elettrica: si discuta quindi il caso specifico di un condensatore piano","o":[],"is_open":true,"ans_idx":null,"ans_text":"Il condensatore \u00e8 un dispositivo elettrico formato da due conduttori (armature) affacciati, separati da un isolante (vuoto, aria o dielettrico), nelle condizioni di induzione completa: tutta la carica di un'armatura induce sulla superficie interna dell'altra una carica uguale e opposta. La capacit\u00e0 del condensatore \u00e8 C = Q/\u0394V, dove Q \u00e8 la carica su ciascuna armatura e \u0394V la differenza di potenziale tra esse. Il caso pi\u00f9 comune \u00e8 il condensatore piano, con due armature piane parallele di area S a distanza d \u226a dimensioni laterali. Trascurando gli effetti di bordo, il campo tra le armature \u00e8 uniforme: E = \u03c3/\u03b5\u2080 = Q/(\u03b5\u2080S). La differenza di potenziale \u00e8 \u0394V = Ed = Qd/(\u03b5\u2080S), quindi la capacit\u00e0 \u00e8 C = \u03b5\u2080S/d. Questa formula mostra che la capacit\u00e0 aumenta aumentando la superficie S (pi\u00f9 carica per lo stesso potenziale) o diminuendo la distanza d (il campo tra le armature \u00e8 pi\u00f9 intenso, quindi serve meno carica per la stessa \u0394V). Inserendo un dielettrico di costante relativa \u03b5\u1d63 la capacit\u00e0 diventa C = \u03b5\u1d63\u03b5\u2080S/d.","no_ans":false},{"l":57,"n":9,"t":"Cosa \u00e8 un condensatore?","o":[],"is_open":true,"ans_idx":null,"ans_text":"Il condensatore \u00e8 un dispositivo elettrico fondamentale nei circuiti, costituito da due conduttori (armature) separati da un isolante. In condizione di induzione completa, la carica +Q sull'armatura positiva induce \u2212Q sull'armatura negativa; la differenza di potenziale tra le armature \u00e8 \u0394V = Q/C, dove C \u00e8 la capacit\u00e0, che dipende solo dalla geometria. Il condensatore immagazzina energia elettrostatica U = \u00bdC\u0394V\u00b2 = Q\u00b2/(2C), distribuita nel campo elettrico tra le armature. Nei circuiti in corrente continua, a regime il condensatore si comporta come un circuito aperto (non lascia passare corrente stazionaria); nei circuiti in corrente alternata \u00e8 un elemento reattivo che lascia passare corrente con sfasamento di 90\u00b0 rispetto alla tensione. Le applicazioni sono vastissime: filtri, livellatori di tensione, circuiti di temporizzazione RC, accumulo di energia nei flash fotografici, memorie nei chip DRAM.","no_ans":false},{"l":57,"n":10,"t":"Come si trovano le capacit\u00e0 equivalenti in caso di condensatori in serie e parallelo?","o":[],"is_open":true,"ans_idx":null,"ans_text":"Per trovare la capacit\u00e0 equivalente di un sistema di condensatori si applicano le seguenti regole. In configurazione serie (condensatori percorsi dalla stessa carica Q): le differenze di potenziale si sommano, per cui \u0394V_tot = \u0394V\u2081 + \u0394V\u2082 + ... = Q/C\u2081 + Q/C\u2082 + ...; dividendo per Q si ottiene 1/C_eq = 1/C\u2081 + 1/C\u2082 + ... + 1/C\u2099. La capacit\u00e0 equivalente \u00e8 sempre minore del minimo tra le singole capacit\u00e0. In configurazione parallelo (condensatori con la stessa differenza di potenziale \u0394V): le cariche si sommano, per cui Q_tot = Q\u2081 + Q\u2082 + ... = C\u2081\u0394V + C\u2082\u0394V + ...; dividendo per \u0394V si ottiene C_eq = C\u2081 + C\u2082 + ... + C\u2099. La capacit\u00e0 equivalente \u00e8 sempre maggiore del massimo tra le singole capacit\u00e0. Per circuiti pi\u00f9 complessi (combinazioni di serie e parallelo) si procede semplificando iterativamente, sostituendo prima i sottogruppi pi\u00f9 semplici con la loro equivalente.","no_ans":false},{"l":58,"n":1,"t":"Due condensatori da 10 microfarad sono posti in parallelo. La loro capacit\u00e0 equivalente \u00e8 pari a","o":["20 microfarad","100 microfarad","10 microfarad","5 microfarad"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":58,"n":2,"t":"Due condensatori da 10 microfarad sono posti in serie. La loro capacit\u00e0 equivalente \u00e8 pari a","o":["10 microfarad","20 microfarad","5 microfarad","100 microfarad"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":58,"n":3,"t":"Due condensatori di capacit\u00e0 diversa sono collegati in parallelo. Il sistema \u00e8 collegato a una pila. Quale delle seguenti affermazioni \u00e8 falsa?","o":["Le d.d.p. fra le armature sono uguali.","Le cariche sulle armature sono diverse.","Le energie sui condensatori sono diverse.","Se la distanza fra le armature \u00e8 diversa, i campi elettrici all'interno dei condensatori sono uguali."],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":58,"n":4,"t":"Due condensatori di capacit\u00e0 pari a 20 microfarad sono in parallelo, la loro capacit\u00e0 equivalente \u00e8:","o":["40 microfarad","80 microfarad","10 microfarad","20 microfarad"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":58,"n":5,"t":"Due condensatori di capacit\u00e0 pari a 20 microfarad sono in serie la loro capacit\u00e0 equivalente \u00e8:","o":["20 microfarad","10 microfarad","80 microfarad","40 microfarad"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":58,"n":6,"t":"Due condensatori hanno capacit\u00e0 C1=1,60 \u00b5F e C2=2,40 \u00b5F, calcola la capacit\u00e0 equivalente quando i condensatori sono collegati in serie","o":["4 microfarad","0,96 microfarad","2 microfarad","0,5 microfarad"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":58,"n":7,"t":"Due condensatori in parallelo sono collegati a una batteria. Che cosa cambia se inseriamo un terzo condensatore in parallelo agli altri due?","o":["Niente.","Solo la capacit\u00e0 equivalente.","La d.d.p. su ogni condensatore e la capacit\u00e0 equivalente.","La capacit\u00e0 equivalente e la carica su ogni armatura."],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":58,"n":8,"t":"Fra le armature di un condensatore piano c'\u00e8 dell'aria. La sua capacit\u00e0 diminuisce se:","o":["allontaniamo le armature;","aumentiamo la superficie delle armature;","avviciniamo le armature;","inseriamo un dielettrico fra le armature."],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":58,"n":9,"t":"Un condensatore da 3 microF \u00e8 caricato a una tensione di 10 V. Quale \u00e8 l'energia accumulata?","o":["1,5*10^-6 J","1,5*10^-4 J","3*10^-4 J","3*10^-6 J"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":58,"n":10,"t":"Due condensatori hanno capacit\u00e0 C1=1,60 \u00b5F e C2=2,40 \u00b5F, calcola la capacit\u00e0 equivalente quando i condensatori sono collegati in parallelo","o":["0,96 microfarad","4 microfarad","12 microfarad","2 microfarad"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":58,"n":11,"t":"Si discuta la densit\u00e0 di energia elettrostatica contenuta in una regione di spazio in cui sia attivo un campo elettrostatico, partendo dal caso di un condensatore","o":["piano."],"is_open":true,"ans_idx":null,"ans_text":"La densit\u00e0 di energia elettrostatica descrive come l'energia immagazzinata in un campo elettrico sia distribuita nello spazio. La derivazione parte dal caso semplice del condensatore piano di area S, distanza d e campo uniforme E tra le armature: l'energia immagazzinata \u00e8 U = \u00bdC\u0394V\u00b2 = \u00bd(\u03b5\u2080S/d)(Ed)\u00b2 = \u00bd\u03b5\u2080E\u00b2\u00b7(Sd). Poich\u00e9 il volume tra le armature \u00e8 V = Sd, la densit\u00e0 volumetrica di energia (energia per unit\u00e0 di volume) \u00e8 u = U/V = \u00bd\u03b5\u2080E\u00b2 [J/m\u00b3]. Questo risultato, ricavato per un campo uniforme, ha validit\u00e0 generale: in qualsiasi regione di spazio in cui sia presente un campo elettrostatico E, l'energia per unit\u00e0 di volume \u00e8 u = \u00bd\u03b5\u2080E\u00b2 (nel vuoto) o u = \u00bd\u03b5E\u00b2 = \u00bd\u03b5\u2080\u03b5\u1d63E\u00b2 (in presenza di un dielettrico). L'energia totale del campo si ottiene integrando sull'intera regione in cui E \u00e8 non nullo: U = \u222b_V \u00bd\u03b5\u2080E\u00b2 dV. Questa interpretazione, in cui l'energia \u00e8 associata al campo piuttosto che alle cariche, \u00e8 concettualmente fondamentale e si estende all'elettromagnetismo: il campo elettromagnetico trasporta e trasferisce energia nello spazio.","no_ans":false},{"l":59,"n":1,"t":"Sia C0 la capacit\u00e0 elettrica di un condensatore vuoto. Se si inserisce nello spazio tra le armature una lastra di dielettrico con costante dielettrica relativa e_r, la capacit\u00e0 del condensatore","o":["diminuisce assumendo il nuovo valore: C = e_r*C0","aumenta assumendo il nuovo valore: C = e_r*C0","aumenta assumendo il nuovo valore: C = e_r*e_0*C0","rimane la stessa"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":59,"n":2,"t":"Il potenziale elettrostatico in una regione di spazio che circonda una carica puntiforme Q: \u00e8 costante","o":["aumenta proporzionalmente alla distanza da Q","diminuisce come l'inverso della distanza da Q","diminuisce come l'inverso del quadrato della distanza da Q"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":59,"n":3,"t":"In una regione di campo elettrico uniforme diretto lungo l'asse x, in x = 2 m il potenziale \u00e8 pari a 150 V, mentre in x = 5 m si ha un potenziale di 450 V.","o":["Quanto vale il campo elettrico?","100 V/m","300 V/m","- 300 V/m","-100 V/m"],"is_open":false,"ans_idx":4,"ans_text":null,"no_ans":false},{"l":59,"n":4,"t":"Come si definisce la capacit\u00e0 elettrica di un conduttore carico? La capacit\u00e0 C di un conduttore \u00e8 data dal rapporto tra la carica accumulata nel conduttore e la differenza di potenziale tra le armature del conduttore stesso. La capacit\u00e0 C di un conduttore \u00e8 pari al rapporto costante tra carica e potenziale del conduttore, C = Q/V La capacit\u00e0 C di un conduttore \u00e8 pari al prodotto tra carica e potenziale del conduttore, C = QV La capacit\u00e0 C di un conduttore \u00e8 pari al prodotto tra carica e campo all'interno del conduttore, C = QE","o":[],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":59,"n":5,"t":"Indicando con PI il pi greco e con e0 la costante dielettrica del vuoto, il campo elettrostatico all'interno di un conduttore sferico di raggio R e carica Q \u00e8 pari a","o":["Q/(4*PI*e0*R^2)","Q/(4*PI*e0*R)","Q/(PI*e0*R)","0"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":59,"n":6,"t":"Indicando con PI il pi greco e con e0 la costante dielettrica del vuoto, il potenziale di un conduttore sferico di raggio R e carica Q \u00e8 pari a","o":["Q/(PI*e0*R)","Q/(4*PI*e0*R)","0","Q/(4*PI*e0*R^2)"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":59,"n":7,"t":"Quale \u00e8 la capacit\u00e0 equivalente di una coppia di condensatori connessi in parallelo?","o":["il prodotto delle capacit\u00e0 dei singoli condensatori","la somma delle capacit\u00e0 dei singoli condensatori","Il rapporto tra le capacit\u00e0 dei singoli condensatori","l'inverso della somma delle capacit\u00e0 inverse dei singoli condensatori"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":59,"n":8,"t":"Quale \u00e8 l'energia elettrostatica di un condensatore di capacit\u00e0 C, caricato con una carica Q?","o":["Q/V","1/2 QV","Q/C","CV"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":59,"n":9,"t":"La rigidit\u00e0 dielettrica di un mezzo \u00e8 il rapporto tra la capacit\u00e0 C di un condensatore riempito riempito con il mezzo e quella nel vuoto. \u00e8 il massimo valore che il campo pu\u00f2 assumere prima che abbia luogo una scarica elettrica.","o":["\u00e8 il rapporto tra la capacit\u00e0 C di un condensatore riempito con il mezzo e quella nel vuoto.","\u00e8 il massimo valore che il campo pu\u00f2 assumere prima che abbia luogo una scarica elettrica.","\u00c8 la densit\u00e0 di carica contenuta nel dielettrico.","\u00e8 la massima carica che pu\u00f2 accumularsi sulle armature di un condensatore riempito con il mezzo."],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":59,"n":10,"t":"La rigidit\u00e0 dielettrica di un mezzo \u00e8 il rapporto tra la capacit\u00e0 C di un condensatore riempito riempito con il mezzo e quella nel vuoto. \u00e8 la massima carica che pu\u00f2 accumularsi sule armature di un condensatore riempito con il mezzo. \u00e8 il massimo valore che il campo pu\u00f2 assumere prima che abbia luogo una scarica elettrica.","o":["\u00e8 il rapporto tra la capacit\u00e0 C di un condensatore riempito con il mezzo e quella nel vuoto.","\u00e8 la massima carica che pu\u00f2 accumularsi sulle armature di un condensatore riempito con il mezzo.","\u00e8 il massimo valore che il campo pu\u00f2 assumere prima che abbia luogo una scarica elettrica.","\u00c8 la densit\u00e0 di carica contenuta nel dielettrico."],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":59,"n":11,"t":"Il campo elettrico esterno a un conduttore carico, in prossimit\u00e0 della sua superficie, \u00e8 diretto ortogonalmente alla superficie del conduttore con modulo pari alla carica contenuta nel conduttore diviso la costante dielettrica nel vuoto diretto ortogonalmente alla superficie del conduttore con modulo pari alla densit\u00e0 di carica superficiale locale diviso la costante dielettrica nel vuoto","o":["nullo","diretto parallelamente alla superficie del conduttore con modulo pari alla densit\u00e0 di carica superficiale locale diviso la costante dielettrica nel vuoto"],"is_open":true,"ans_idx":null,"ans_text":"Il campo elettrico esterno a un conduttore carico, in prossimit\u00e0 della sua superficie, \u00e8 diretto ortogonalmente alla superficie stessa e ha modulo E = \u03c3/\u03b5\u2080, dove \u03c3 \u00e8 la densit\u00e0 superficiale di carica locale. Questo risultato, noto come teorema di Coulomb, si dimostra applicando il teorema di Gauss a un cilindretto gaussiano infinitesimo con una base interna al conduttore (campo nullo) e una base esterna parallela alla superficie: il flusso \u00e8 \u03a6 = E\u00b7\u0394S = \u03c3\u00b7\u0394S/\u03b5\u2080, da cui E = \u03c3/\u03b5\u2080. La perpendicolarit\u00e0 alla superficie discende dalla conservativit\u00e0 del campo: la componente tangenziale \u00e8 nulla dentro il conduttore e, per continuit\u00e0, \u00e8 nulla anche immediatamente all'esterno. La distribuzione della carica sulla superficie non \u00e8 uniforme, ma \u00e8 pi\u00f9 densa nelle regioni a minor raggio di curvatura (punte e spigoli), dove il campo esterno \u00e8 quindi pi\u00f9 intenso. Questo fenomeno, noto come potere dispersivo delle punte, spiega il funzionamento del parafulmine e pu\u00f2 causare la ionizzazione dell'aria nelle punte dei conduttori carichi.","no_ans":false},{"l":59,"n":12,"t":"Si discuta l'effetto dell'inserimento di un dielettrico all'interno di un condensatore carico.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Quando si inserisce un dielettrico isotropo e omogeneo di costante relativa \u03b5\u1d63 > 1 nello spazio tra le armature di un condensatore, le propriet\u00e0 elettriche cambiano in modo significativo. A carica Q fissa sulle armature: le molecole del dielettrico si polarizzano (sviluppano dipoli elettrici allineati con il campo), generando cariche di polarizzazione superficiali che si oppongono al campo esterno; il campo risultante si riduce a E = E\u2080/\u03b5\u1d63, la differenza di potenziale scende a \u0394V = \u0394V\u2080/\u03b5\u1d63, la capacit\u00e0 aumenta a C = \u03b5\u1d63C\u2080, l'energia immagazzinata diminuisce a U = U\u2080/\u03b5\u1d63 (il dielettrico \u00e8 attratto nelle armature compiendo lavoro a spese dell'energia del campo). Se invece il condensatore \u00e8 collegato a una batteria che mantiene costante la differenza di potenziale \u0394V: la carica sulle armature aumenta a Q = \u03b5\u1d63Q\u2080, il campo rimane invariato, la capacit\u00e0 aumenta, l'energia aumenta a U = \u03b5\u1d63U\u2080 (la batteria fornisce l'energia aggiuntiva). In entrambi i casi la costante dielettrica assoluta \u03b5 = \u03b5\u1d63\u03b5\u2080 sostituisce \u03b5\u2080 in tutte le formule elettrostatiche del mezzo.","no_ans":false},{"l":59,"n":13,"t":"Si discutano gli effetti sulla configurazione elettrica di un condensatore quando viene inserito un mezzo dielettrico al suo interno.","o":[],"is_open":true,"ans_idx":null,"ans_text":"L'inserimento di un mezzo dielettrico omogeneo e isotropo all'interno di un condensatore modifica l'intera configurazione elettrica del sistema. A livello microscopico, il campo elettrico orienta i dipoli molecolari del dielettrico (polarizzazione per orientamento nelle molecole polari) o induce dipoli nelle molecole non polari (polarizzazione per deformazione). Macroscopicamente, questo genera un vettore di polarizzazione P = \u03b5\u2080(\u03b5\u1d63\u22121)E che a sua volta crea cariche di polarizzazione superficiali \u03c3_p = \u2212P\u00b7n\u0302 che si oppongono al campo applicato. Il campo risultante si riduce di un fattore \u03b5\u1d63 rispetto al vuoto. La capacit\u00e0 aumenta di un fattore \u03b5\u1d63: C = \u03b5\u1d63C\u2080 = \u03b5S/d, dove \u03b5 = \u03b5\u2080\u03b5\u1d63 \u00e8 la permittivit\u00e0 assoluta del mezzo. Questo incremento di capacit\u00e0 \u00e8 il motivo principale per cui i condensatori reali contengono dielettrico tra le armature: a parit\u00e0 di geometria si ottiene una capacit\u00e0 \u03b5\u1d63 volte maggiore. Inoltre il dielettrico aumenta la rigidit\u00e0 dielettrica (campo massimo sostenibile) rispetto all'aria, permettendo tensioni di lavoro pi\u00f9 elevate.","no_ans":false},{"l":60,"n":1,"t":"Come sono definiti la polarizzazione in un mezzo dielettrico su cui agisca un campo elettrico e il vettore di induzione elettrica?","o":[],"is_open":true,"ans_idx":null,"ans_text":"La polarizzazione di un mezzo dielettrico descrive la risposta del materiale alla presenza di un campo elettrico esterno. Il vettore di polarizzazione P \u00e8 definito come il momento di dipolo elettrico per unit\u00e0 di volume del dielettrico: P = np\u0304_mol, dove n \u00e8 la densit\u00e0 numerica di molecole e p\u0304_mol il momento di dipolo medio per molecola. Per dielettrici lineari isotropi, P \u00e8 proporzionale al campo: P = \u03b5\u2080\u03c7\u2091E, dove \u03c7\u2091 \u00e8 la suscettivit\u00e0 elettrica del mezzo. Il vettore di induzione elettrica (o spostamento elettrico) D \u00e8 definito come D = \u03b5\u2080E + P = \u03b5\u2080(1 + \u03c7\u2091)E = \u03b5E, dove \u03b5 = \u03b5\u2080\u03b5\u1d63 \u00e8 la permittivit\u00e0 assoluta. La grandezza D \u00e8 particolarmente utile perch\u00e9 il teorema di Gauss in presenza di dielettrici si esprime nella forma semplice \u222eD\u00b7dA = Q_libere, dove Q_libere sono le sole cariche libere (escluse quelle di polarizzazione). Questa formulazione \u00e8 molto pi\u00f9 comoda perch\u00e9 evita di dover calcolare esplicitamente le cariche di polarizzazione.","no_ans":false},{"l":61,"n":1,"t":"Una carica di 4 mC e massa 2 mg si trova a una distanza di 3 m da un piano infinito omogeneamente carico e subisce una accelerazione di 4 m/s^2 per effetto","o":["del campo generato dal piano stesso. Quale \u00e8 la densit\u00e0 di carica presente nel piano?","3.54\u00b710^(-11)","1.77\u00b710^(-11)","8.85\u00b710^(-11)","7.1\u00b710^(-11)"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":62,"n":1,"t":"In un filo conduttore scorre una corrente di 16 A.La quantit\u00e0 di carica che attraversa il conduttore in tre minuti \u00e8:","o":["1440 J","2880 C","1440 C","2880 J"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":62,"n":2,"t":"in un filo scorre una corrente di 3 A per u'ora. Quanta carica elettrica \u00e8 transitata?","o":["5600 C","10800 C","5600 J","10800 J"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":62,"n":3,"t":"L'intensit\u00e0 di corrente elettrica \u00e8 per definizione: il prodotto della resistenza di un conduttore per l'intervallo di tempo in cui ci\u00f2 avviene il prodotto della quantit\u00e0 di carica che attraversa la sezione di un conduttore per l'intervallo di tempo in cui ci\u00f2 avviene il rapporto tra la quantit\u00e0 di carica che attraversa la sezione di un conduttore e l'intervallo unitario di tempo il rapporto tra la quantit\u00e0 di carica che attraversa la sezione di un conduttore e l'intervallo di tempo in cui ci\u00f2 avviene.","o":[],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":62,"n":4,"t":"Una corrente continua di 2.5 A scorre in un filo per 4 minuti. Quanta carica passa in ogni punto del circuito durante questo intervallo di tempo?","o":["Q = 10 C","Q = 100 C","Q = 600 C","Q = 0.06 C"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":62,"n":5,"t":"Attraverso la sezione del filo di una lampadina, passano 1,6\u00b710^19 elettroni in un secondo. Qual \u00e8 la corrente che attraversa la lampadina?","o":["2,56 A","1A","1,6\u00b710^19 A","1,6\u00b710^-19 A"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":62,"n":6,"t":"Che corrente occorre per far transitare in un filo 600 C in un minuto?","o":["10 A","20 A","600 A","60 A"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":62,"n":7,"t":"Definire la corrente elettrica","o":[],"is_open":true,"ans_idx":null,"ans_text":"La corrente elettrica \u00e8 il moto ordinato e sistematico di cariche elettriche all'interno di un conduttore, prodotto dall'applicazione di una differenza di potenziale. L'intensit\u00e0 di corrente elettrica i \u00e8 definita come la quantit\u00e0 di carica dQ che attraversa una sezione trasversale del conduttore nell'intervallo di tempo dt: i = dQ/dt. La sua unit\u00e0 di misura \u00e8 l'Ampere (A = C/s), che \u00e8 una delle sette unit\u00e0 fondamentali del Sistema Internazionale; la carica elettrica \u00e8 quindi una grandezza derivata: [Q] = [I\u00b7T]. Per convenzione, il verso della corrente \u00e8 quello in cui si muoverebbero le cariche positive, anche se nei metalli sono gli elettroni (cariche negative) a muoversi in senso opposto. Fisicamente, la corrente \u00e8 generata dal campo elettrico interno al conduttore che imprime agli elettroni una velocit\u00e0 di deriva v_d sovrapposta al moto termico caotico: v_d \u00e8 tipicamente molto piccola (mm/s), ma gli effetti della corrente si propagano alla velocit\u00e0 della luce. Si misura sperimentalmente con un amperometro, collegato in serie nel circuito.","no_ans":false},{"l":62,"n":8,"t":"Si definisca il vettore densit\u00e0 di corrente e si discuta l'equazione di continuit\u00e0 della corrente elettrica.","o":[],"is_open":true,"ans_idx":null,"ans_text":"Per caratterizzare localmente la corrente che scorre in un conduttore si introduce il vettore densit\u00e0 di corrente j = nqv_d, dove n \u00e8 la densit\u00e0 volumetrica di portatori di carica, q \u00e8 la loro carica e v_d la velocit\u00e0 di deriva. Il vettore j ha le dimensioni di A/m\u00b2 e la sua direzione \u00e8 quella del moto delle cariche positive. L'intensit\u00e0 di corrente che attraversa una superficie S \u00e8 il flusso di j attraverso quella superficie: i = \u222b_S j\u00b7dA. L'equazione di continuit\u00e0 della corrente elettrica esprime la conservazione della carica: \u2202\u03c1/\u2202t + \u2207\u00b7j = 0, dove \u03c1 \u00e8 la densit\u00e0 volumetrica di carica. In regime stazionario (\u2202\u03c1/\u2202t = 0) si ottiene \u2207\u00b7j = 0, ovvero div j = 0: il vettore j \u00e8 solenoidale. In termini pratici questo significa che in un circuito in regime stazionario la corrente che entra in ogni nodo \u00e8 uguale a quella che ne esce (prima legge di Kirchhoff), e in un conduttore filare la corrente \u00e8 la stessa in ogni sezione trasversale.","no_ans":false},{"l":62,"n":9,"t":"Come \u00e8 definita l'intensit\u00e0 di corrente in un conduttore e come si misura?","o":[],"is_open":true,"ans_idx":null,"ans_text":"L'intensit\u00e0 di corrente i in un conduttore \u00e8 definita come la quantit\u00e0 di carica che attraversa una sezione trasversale del conduttore nell'unit\u00e0 di tempo: i = dQ/dt [A = C/s]. Per una corrente stazionaria (costante nel tempo), in un intervallo \u0394t passa la carica Q = i\u00b7\u0394t. Sperimentalmente, la corrente si misura con uno strumento detto amperometro, che deve essere inserito in serie nel circuito (cio\u00e8 il circuito va aperto e lo strumento interposto); idealmente l'amperometro ha resistenza interna nulla per non perturbare il circuito. Il verso convenzionale della corrente \u00e8 quello del moto delle cariche positive (da + a \u2212); negli effettivi conduttori metallici, dove i portatori sono elettroni (carica negativa), il verso della corrente convenzionale \u00e8 opposto al moto degli elettroni. Il valore tipico delle correnti varia da pochi microampere (circuiti analogici) a centinaia di ampere (motori elettrici).","no_ans":false},{"l":63,"n":1,"t":"Due resistenze da 10 ohm sono disposte in serie La loro resistenza equivalente \u00e8","o":["10 ohm","non ho elementi sufficienti per rispondere","5 ohm","20 ohm"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":63,"n":2,"t":"Due resistenze da 10 ohm sono disposte in parallelo. La loro resistenza equivalente \u00e8","o":["5 ohm","non ho elementi sufficienti per rispondere","10 ohm","20 ohm"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":63,"n":3,"t":"Quale resistenza posso collegare a un generatore da 9 V per avere una corrente di 2 A?","o":["9 ohm","4,5 ohm","81 ohm","2.25 ohm"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":63,"n":4,"t":"Due resistenze da 20 ohm sono in parallelo tra loro e in serie con una resistenza da 10 ohm. Quanto vale l'equivalente?","o":["60 ohm","40 ohm","10 ohm","20 ohm"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":63,"n":5,"t":"Si hanno tre resistori diversi collegati in serie e percorsi da corrente; quello con resistenza maggiore conduce:","o":["pi\u00f9 corrente degli altri","meno corrente degli altri","la stessa corrente degli altri","dovrei conoscere il valore delle resistenze"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":63,"n":6,"t":"Si vuole far circolare in una resistenza R0 = 400 Ohm una corrente di 10 mA, collegandola ad una pila da 12 V. Che resistenza devo aggiungere al circuito per","o":["ottenere il mio scopo?","R1 = 800 Ohm in parallelo","R1 = 200 Ohm in parallelo","R1 = 200 Ohm in serie","R1 = 800 Ohm in serie"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":63,"n":7,"t":"Quanto vale la corrente che scorre in un circuito formato da una pila da 9 V in serie con due resistenze di valore 5 e 10 ohm rispettivamente?","o":["0.3 A","10 A","0.6 A","1A"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":63,"n":8,"t":"Due resistenze hanno valore di 20 ohm e 40 ohm. Quanto vale la resistenza equivalente quando vengono connesse in parallelo?","o":["60 ohm","13,3 ohm","5 ohm","30 ohm"],"is_open":false,"ans_idx":1,"ans_text":null,"no_ans":false},{"l":63,"n":9,"t":"Si hanno tre resistori diversi collegati in parallelo collegati a una stessa DDP. Quello con resistenza minore conduce: dovrei conoscere il valore delle resistenze","o":["la stessa corrente degli altri","meno corrente degli altri","pi\u00f9 corrente degli altri"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":63,"n":10,"t":"Si hanno tre resistori diversi collegati in parallelo collegati a una stessa DDP. Quello con resistenza maggiore conduce:","o":["meno corrente degli altri","dovrei conoscere il valore delle resistenze","la stessa corrente degli altri","pi\u00f9 corrente degli altri"],"is_open":false,"ans_idx":0,"ans_text":null,"no_ans":false},{"l":63,"n":11,"t":"Si hanno tre resistori diversi collegati in serie e percorsi da corrente; quello con resistenza minore conduce:","o":["meno corrente degli altri","dovrei conoscere il valore delle resistenze","pi\u00f9 corrente degli altri","la stessa corrente degli altri"],"is_open":false,"ans_idx":3,"ans_text":null,"no_ans":false},{"l":63,"n":12,"t":"Si hanno tre resistori uguali collegati in serie e percorsi da corrente; quello posto al centro fra gli altri due dissipa: dovrei conoscere il valore delle resistenze","o":["meno potenza degli altri","pi\u00f9 potenza degli altri","la stessa potenza degli altri"],"is_open":false,"ans_idx":2,"ans_text":null,"no_ans":false},{"l":63,"n":13,"t":"Si hanno tre resistori uguali collegati in serie e percorsi da corrente; quello posto al centro fra gli altri due conduce: dovrei conoscere il valore delle resistenze","o":["pi\u00f9 corrente degli altri","la stessa corrente degli altri","meno corrente degli altri"],"is_open":true,"ans_idx":null,"ans_text":"In una rete di resistori collegati in serie, tutti i resistori sono attraversati dalla stessa corrente (per la legge di conservazione della carica in regime stazionario: la corrente \u00e8 la stessa in ogni sezione di un conduttore). Se i tre resistori sono uguali (resistenza R ciascuno), la potenza dissipata da ciascuno \u00e8 P = Ri\u00b2 (con la stessa corrente i), quindi la potenza \u00e8 identica per tutti e tre. Il resistore al centro dissipa esattamente la stessa potenza degli altri due: non ha nessun privilegio di posizione nella serie. La potenza totale dissipata dall'insieme \u00e8 P_tot = 3Ri\u00b2 = 3P. La differenza di potenziale si ripartisce ugualmente tra i tre resistori: \u0394V\u2081 = \u0394V\u2082 = \u0394V\u2083 = V_tot/3.","no_ans":false},{"l":63,"n":14,"t":"Due resistenze hanno valore di 20 ohm e 40 ohm. Quanto vale la resistenza equivalente quando vengono connesse in serie?","o":["10 ohm","60 ohm","13,3 ohm","30 ohm"],"is_open":true,"ans_idx":null,"ans_text":"Per due resistori da 20\u03a9 e 40\u03a9 in parallelo, si applica la formula 1/R_eq = 1/R\u2081 + 1/R\u2082 = 1/20 + 1/40 = 2/40 + 1/40 = 3/40, da cui R_eq = 40/3 \u2248 13.3 \u03a9. La resistenza equivalente in parallelo \u00e8 sempre minore della minima tra le due resistenze: 13.3 \u03a9 < 20 \u03a9. Fisicamente, il parallelo offre pi\u00f9 percorsi alla corrente, riducendo la resistenza totale. Se i due resistori fossero in serie, invece, R_eq = 20 + 40 = 60 \u03a9.","no_ans":false},{"l":63,"n":15,"t":"La prima legge di Ohm si pu\u00f2 enunciare nella forma:","o":["V*2i = R","V/R=i","R/i=V","V*i=R"],"is_open":true,"ans_idx":null,"ans_text":"La prima legge di Ohm afferma che per un conduttore ohmico la differenza di potenziale V ai capi \u00e8 direttamente proporzionale alla corrente i che lo percorre: V = R\u00b7i, dove R \u00e8 la resistenza elettrica del conduttore in Ohm [\u03a9]. Equivalentemente, la corrente \u00e8 proporzionale alla tensione: i = V/R (cio\u00e8 V/R = i). La legge vale per conduttori metallici a temperatura costante e definisce la classe dei bipoli lineari (ohmici). Il rapporto V/i = R \u00e8 costante e indipendente dalla corrente applicata, il che significa che la curva caratteristica V-i \u00e8 una ret
