e, "ans_idx": null, "ans_text": "Dipolo: +q e −q separati da d. Momento p=qd (da − a +). Campo sull'asse ortogonale a distanza x: E≈−p/(4πε₀x³), decade come 1/x³.", "no_ans": false}, {"l": 52, "n": 1, "t": "La forza che agisce su una particella che ha una data carica elettrica è determinata", "o": ["dal potenziale elettrico.", "dalla somma del campo elettrico e del potenziale elettrico", "dal vettore campo elettrico.", "da nessuno di questi"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 52, "n": 2, "t": "Una particella, con rapporto carica su massa q/m = 2·10^5 C/kg, entra all'istante t = 0 s, all'interno di un condensatore piano, con velocità iniziale v0 = 1·10^6 m/s diretta parallelamente alle armature del condensatore stesso, in un punto equidistante dalle armature. La distanza tra le armature del condensatore è pari a 50 cm e la differenza di potenziale è DV = 1 V. Dopo quanto tempo la particella impatta sull'armatura inferiore (a carica negativa) del condensatore?", "o": ["4.8 ms", "1.1 ms", "4.3 micros", "2.4 ms"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 52, "n": 3, "t": "Un dipolo elettrico è immerso in una campo uniforme di modulo E = 40 N/C; il momento torcente che agisce sul dipolo passa da 0 a 10^(-26) N·m, a seconda dell'angolo theta che il dipolo forma con il campo. Quanto vale il modulo del momento di dipolo ?", "o": ["2.5·10^(-28) C·m", "6.2·10^(-28) C·m", "1·10^(-26) C·m", "4.1·10^(-27) C·m"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 52, "n": 4, "t": "Un elettrone viene posto lungo l'asse di un disco uniformemente carico di raggio R. Se la densità di carica superficiale del disco è 4.0·10^(-6) C/m^2, quanto vale in modulo l'accelerazione iniziale dell'elettrone se è posizionato ad una distanza R, R/100 o R/1000 dal centro del disco?", "o": ["2.61·10^15 m/s^2, 6.13·10^15 m/s^2, 6.15·10^15 m/s^2", "7.93·10^16 m/s^2, 7.93·10^16 m/s^2, 7.93·10^16 m/s^2", "8.23·10^16 m/s^2, 1.45·10^17 m/s^2, 3.97·10^17 m/s^2", "1.16·10^16 m/s^2, 3.93·10^16 m/s^2, 3.97·10^16 m/s^2"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 52, "n": 5, "t": "Fare un esempio di disposizione delle linee di forza del campo elettrico in una distribuzione di cariche", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Per carica puntiforme positiva le linee escono radialmente. Per dipolo (+q,−q) le linee partono da +q e terminano in −q. In campo uniforme le linee sono parallele e uniformemente distribuite.", "no_ans": false}, {"l": 52, "n": 6, "t": "Si discuta l'interazione tra una carica elettrica e un campo elettrico.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "F=qE. In campo uniforme con v∥E: moto rettilineo accelerato (a=qE/m). Con v⊥E: moto parabolico x=v₀t, y=½at².", "no_ans": false}, {"l": 52, "n": 7, "t": "Si discuta l'interazione di un dipolo elettrico con un campo elettrico uniforme in cui sia immerso.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Dipolo p in campo uniforme E: forza netta nulla, momento torcente M=p×E (modulo pE sinθ). Equilibrio stabile con p∥E.", "no_ans": false}, {"l": 53, "n": 1, "t": "Una regione di spazio di forma sferica è soggetta a un campo elettrico, ma non contiene alcuna carica elettrica al proprio interno. Il flusso attraverso la", "o": ["superficie è:", "Il flusso è certamente positivo", "Le informazioni date non sono sufficienti per rispondere", "Il flusso è certamente nullo", "Se c'è un campo elettrico c'è un flusso che può essere positivo o negativo"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 53, "n": 2, "t": "In quali condizioni vale il teorema di Gauss", "o": ["Soltanto se la somma delle cariche è diversa da zero", "Soltanto se la superficie considerata è chiusa", "Per qualsiasi superficie nello spazio", "Soltanto se la superficie considerata è sferica"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 53, "n": 3, "t": "Il campo elettrostatico generato da una carica positiva distribuita uniformemente in un guscio sferico di raggio R e spessore infinitesimo, per una distanza", "o": ["dal centro del guscio r minore di R", "diminuisce come il quadrato della distanza dal centro del guscio", "diminuisce come l'inverso della distanza dal centro della sfera", "aumenta proporzionalmente alla distanza dal centro del guscio", "è nullo"], "is_open": false, "ans_idx": 4, "ans_text": null, "no_ans": false}, {"l": 53, "n": 4, "t": "Un cubo contiene carica uniformemente distribuita nel volume. Si può calcolare il campo elettrostatico generato da tale distribuzione di carica utilizzando la", "o": ["legge di Gauss?", "No: in simmetria cubica la legge di Gauss è falsa", "Sì, ma solo all'interno del cubo", "Sì, ma solo approssimativamente e a grandi distanze", "Si, ovunque"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 53, "n": 5, "t": "Una sfera di raggio R = 30 cm ha una carica di 0.8 microC distribuita uniformemente al suo interno. Quanto vale il campo elettrico in un punto distante r =", "o": ["25 cm dal centro della sfera?", "315 V/m", "66.6 kV/m", "12.4 kV/m", "666 V/m"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 53, "n": 6, "t": "Si enunci il teorema di Gauss, fornendo un esempio esplicativo.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Φ(E) su superficie chiusa S = Q_int/ε₀. Solo cariche interne contribuiscono. Esempio: sfera carica Q con superficie gaussiana sferica r>R → E·4πr²=Q/ε₀ → E=Q/(4πε₀r²).", "no_ans": false}, {"l": 54, "n": 1, "t": "Due cariche puntiformi Q1 = 6 nC e Q2 = -3 nC, distano 80 cm tra esse. Quanto vale il potenziale elettrostatico nel punto P, posto lungo la loro congiungente", "o": ["a un a distanza di 20 cm da Q1?", "354.0 V", "622.4 V", "224.8 V", "161.6 V"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 54, "n": 2, "t": "Una carica puntiforme Q = 0.1 C viene lasciata libera di muoversi dal suo stato di quiete nell'origine di un sistema di riferimento, sotto l'azione di un campo elettrico uniforme diretto come l'asse x, con modulo E = 75 N/C. Quanto è variata l'energia potenziale elettrostatica della carica quando essa si trova nella", "o": ["posizione x = 2 m?", "-15 J", "15 J", "-1.5 J", "1.5 J"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 54, "n": 3, "t": "Quanto lavoro è necessario per spostare una carica di 8 microC da un punto a potenziale zero ad un punto a potenziale 75 V?", "o": ["L = 600 microJ", "L = 400 microJ", "L = 0.8 mJ", "L = 300 microJ"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 54, "n": 4, "t": "Un elettrone viene accelerato da una differenza di potenziale V. Quanto più grande sarebbe la sua velocità finale se fosse accelerato da una differenza di", "o": ["potenziale quattro volte più grande?", "1 volta", "2 volte", "4 volte", "8 volte"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 54, "n": 5, "t": "Una superficie gaussiana sferica di raggio r = 4 cm è concentrica a una sfera carica con densità uniforme di raggio r0 = 1 cm. Il flusso del campo elettrico attraverso la superficie gaussiana vale 5.6·10^4 N·m^2/C. Quale è il potenziale a d = 12 cm di distanza dal centro della sfera carica ?", "o": ["1.74·10^4 V", "7.42·10^4 V", "3.71·10^4 V", "9.2·10^3 V"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 54, "n": 6, "t": "Calcolare la velocità di fuga di un elettrone che si trova inizialmente sulla superficie di una sfera di raggio r0 = 1 cm di carica pari a 1.6·10^(-15) C distribuita", "o": ["uniformemente.", "1.12·10^4 m/s", "2.25·10^4 m/s", "9.22·104", "4.5··10^4 m/s"], "is_open": true, "ans_idx": null, "ans_text": "V_A−V_B=∫E·ds. Con V=0 all'infinito: V(r)=(1/4πε₀)Q/r. Grandezza scalare, sovrapposizione algebrica.", "no_ans": false}, {"l": 54, "n": 7, "t": "Dopo aver introdotto il concetto di differenza di potenziale tra due punti di una regione in cui sia attivo un campo elettrico, si descriva il potenziale", "o": ["elettrostatico generato da una carica elettrica puntiforme."], "is_open": true, "ans_idx": null, "ans_text": "V=U/q [Volt=J/C]. Lavoro per portare unità di carica dall'infinito al punto. Grandezza scalare.", "no_ans": false}, {"l": 54, "n": 8, "t": "Cos'è il potenziale elettrico?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "½mv²+qV=costante. ΔEK=−qΔV=q(V_A−V_B). La variazione di EK è uguale al lavoro della forza elettrica.", "no_ans": false}, {"l": 54, "n": 9, "t": "Si discuta la conservazione dell'energia di una carica elettrica in moto all'interno di un campo elettrico.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "½mv²+qV=costante (campo conservativo). ΔEK=−qΔV=q(V_A−V_B). La variazione di energia cinetica è uguale al lavoro della forza elettrica.", "no_ans": false}, {"l": 55, "n": 1, "t": "Il modulo del campo elettrico generato da un filo uniformemente carico di lunghezza indefinita", "o": ["diminuisce come il quadrato della distanza dal filo", "aumenta proporzionalmente alla distanza dal filo", "è proporzionale a 1/r, con r distanza dal filo", "è uniforme nello spazio"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 55, "n": 2, "t": "Il campo elettrico in un punto dello spazio è pari al potenziale elettrico nel punto moltiplicato per il valore di una carica di prova posta in tale punto", "o": ["è pari alla forza che si esercita su una carica di prova posta in tale punto", "è pari al rapporto tra la forza elettrica esercitata su una carica di prova posta in tale punto diviso per il valore della carica stessa", "è pari alla forza che si esercita tra due cariche poste uguali poste simmetricamente a tale punto divisa per il valore della carica comune"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 55, "n": 3, "t": "Si avvicina un corpo carico A ad un corpo carico B e si nota che essi si attraggono. Avvicinando poi B ad un corpo carico C, si nota che essi si respingono. Si", "o": ["può concludere che:", "La carica di A ha lo stesso segno di B", "La carica di A ha segno opposto a C", "Le tre cariche sono dello stesso segno", "La carica di A ha lo stesso segno di C"], "is_open": false, "ans_idx": 4, "ans_text": null, "no_ans": false}, {"l": 55, "n": 4, "t": "Quale è l'unità di misura della costante dielettrica del vuoto?", "o": ["J", "C^2/(N*m^2)", "N/ (C^2 * m^2)", "C^2/m^2"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 55, "n": 5, "t": "Il campo elettrostatico generato da un piano indefinito uniformemente carico", "o": ["ha modulo che varia come l'inverso della distanza dal piano.", "è uniforme nello spazio", "ha modulo che varia come l'inverso della distanza dal piano al quadrato", "ha modulo inversamente proporzionale alla distanza dal piano"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 55, "n": 6, "t": "Il campo elettrostatico generato da una carica positiva distribuita uniformemente in un guscio sferico di raggio R e spessore infinitesimo, per r minore di R", "o": ["è nullo", "diminuisce come il quadrato della distanza dal centro della sfera", "diminuisce come l'inverso della distanza dal centro della sfera", "aumenta proporzionalmente alla distanza dal centro dela sfera"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 55, "n": 7, "t": "Il campo elettrostatico generato da una carica positiva distribuita uniformemente in una sfera di raggio R, per r minore di R, ovvero all'interno della sfera", "o": ["stessa:", "è nullo", "è costante", "aumenta proporzionalmente alla distanza dal centro della sfera", "diminuisce come il quadrato della distanza dal centro della sfera"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 55, "n": 8, "t": "Il potenziale elettrico, proprio come il campo elettrico, è una grandezza vettoriale", "o": ["Falso", "Sono entrambi scalari", "Vero", "Dipende dai casi"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 55, "n": 9, "t": "Si discuta la determinazione del campo elettrostatica in un punto di una regione in cui sia noto il potenziale elettrostatico.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "E=−∇V: Eₓ=−∂V/∂x, Eᵧ=−∂V/∂y, E_z=−∂V/∂z. Il campo è ⊥ alle superfici equipotenziali, diretto verso V decrescente.", "no_ans": false}, {"l": 56, "n": 1, "t": "In un campo elettrico le superfici equipotenziali", "o": ["sono sempre perpendicolari tra loro", "formano sempre delle regioni chiuse dello spazio", "sono sempre parallele alle linee di campo", "formano sempre angoli retti con le linee di campo"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 56, "n": 2, "t": "In un conduttore carico di forma qualsiasi, la carica", "o": ["è più densa nelle parti di superficie a maggior raggio di curvatura.", "è distribuita uniformemente nel volume del conduttore.", "è più densa nelle parti di superficie a minor raggio di curvatura.", "è distribuita uniformemente sulla superficie del conduttore."], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 56, "n": 3, "t": "Mettendo una sfera conduttrice carica a contatto con un'altra sfera identica alla prima, che frazione della carica iniziale rimane sulla sfera?", "o": ["la stessa carica", "un quarto", "nessuna carica", "la metà"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 56, "n": 4, "t": "Come varia il potenziale in un conduttore in condizioni elettrostatiche ?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Campo interno nullo → circuitazione nulla → V costante nel conduttore. La superficie è equipotenziale.", "no_ans": false}, {"l": 56, "n": 5, "t": "Come viene definita la capacità elettrica di un conduttore", "o": [], "is_open": true, "ans_idx": null, "ans_text": "C=Q/V [F=C/V]. Dipende solo dalla geometria. Per sfera R: C=4πε₀R.", "no_ans": false}, {"l": 56, "n": 6, "t": "Si enunci e si dimostri il teorema di Coulomb per il campo elettrostatico in prossimità della superficie di un conduttore carico", "o": [], "is_open": true, "ans_idx": null, "ans_text": "E_ext=σ/ε₀ perpendicolare alla superficie. Dim: cilindretto gaussiano → E·ΔS=σΔS/ε₀.", "no_ans": false}, {"l": 56, "n": 7, "t": "Definire la capacità elettrica", "o": [], "is_open": true, "ans_idx": null, "ans_text": "C=Q/V [F]. Piano: C=ε₀S/d. Sfera: C=4πε₀R.", "no_ans": false}, {"l": 56, "n": 8, "t": "Che differenza c'è tra conduttori e isolanti?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Conduttori: elettroni liberi (metalli). Isolanti: cariche localizzate. Dielettrici: molecole si polarizzano senza trasporto.", "no_ans": false}, {"l": 57, "n": 1, "t": "Due condensatori uguali vengono connessi in serie ad una pila da 10 V e si misura una energia immagazzinata pari a 120 J. Quanto vale la capacità di ciascun condensatore", "o": ["9.6 F", "4.8 F", "2.4 F", "48 F"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 57, "n": 2, "t": "In un conduttore carico di forma qualsiasi, la carica", "o": ["è più densa nelle parti di superficie a maggior raggio di curvatura.", "è più densa nelle parti di superficie a minor raggio di curvatura.", "è distribuita uniformemente nel volume del conduttore.", "è distribuita uniformemente sulla superficie del conduttore."], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 57, "n": 3, "t": "Se raddoppiamo la carica posseduta da un condensatore, cosa succede alla sua capacità?", "o": ["rimane la stessa", "bisogna conoscere il valore della carica", "raddoppia", "dimezza"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 57, "n": 4, "t": "Un condensatore C1 = 10 microF connesso a un parallelo tra due condensatori C2 = 10 microF e C3 = 2 microF. Quanto vale la capacità equivalente del", "o": ["circuito.", "10.9 microF", "6.25 microF", "11.7 microF", "5.45 microF"], "is_open": false, "ans_idx": 4, "ans_text": null, "no_ans": false}, {"l": 57, "n": 5, "t": "Due lastre parallele identiche sono caricate a una differenza di potenziale di 50 V. Se la distanza tra le due lastre è di 5.0 cm, quanto vale il campo elettrico tra", "o": ["le lastre?", "E = 1000 V/m", "E = 2500 V/m", "E = 10 V/m", "E = 250 V/m"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 57, "n": 6, "t": "Due condensatori in parallelo sono collegati a una batteria. Che cosa cambia se inseriamo un terzo condensatore in parallelo agli altri due?", "o": ["La d.d.p. su ogni condensatore e la capacità equivalente.", "La capacità equivalente e la carica su ogni armatura.", "Niente.", "Solo la capacità equivalente."], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 57, "n": 7, "t": "Si discuta la capacità equivalente di più condensatori in configurazione in serie e in parallelo.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Parallelo: stessa ΔV, C_eq=ΣCᵢ. Serie: stessa Q, 1/C_eq=Σ(1/Cᵢ).", "no_ans": false}, {"l": 57, "n": 8, "t": "Si definiscano il condensatore e la sua capacità elettrica: si discuta quindi il caso specifico di un condensatore piano", "o": [], "is_open": true, "ans_idx": null, "ans_text": "C=Q/ΔV. Piano: C=ε₀S/d. Aumentare S o diminuire d aumenta C.", "no_ans": false}, {"l": 57, "n": 9, "t": "Cosa è un condensatore?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Due armature in induzione completa. C=Q/ΔV. Immagazzina U=½CΔV².", "no_ans": false}, {"l": 57, "n": 10, "t": "Come si trovano le capacità equivalenti in caso di condensatori in serie e parallelo?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Serie: 1/C_eq=Σ1/Cᵢ. Parallelo: C_eq=ΣCᵢ.", "no_ans": false}, {"l": 58, "n": 1, "t": "Due condensatori da 10 microfarad sono posti in parallelo. La loro capacità equivalente è pari a", "o": ["20 microfarad", "100 microfarad", "10 microfarad", "5 microfarad"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 58, "n": 2, "t": "Due condensatori da 10 microfarad sono posti in serie. La loro capacità equivalente è pari a", "o": ["10 microfarad", "20 microfarad", "5 microfarad", "100 microfarad"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 58, "n": 3, "t": "Due condensatori di capacità diversa sono collegati in parallelo. Il sistema è collegato a una pila. Quale delle seguenti affermazioni è falsa?", "o": ["Le d.d.p. fra le armature sono uguali.", "Le cariche sulle armature sono diverse.", "Le energie sui condensatori sono diverse.", "Se la distanza fra le armature è diversa, i campi elettrici all'interno dei condensatori sono uguali."], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 58, "n": 4, "t": "Due condensatori di capacità pari a 20 microfarad sono in parallelo, la loro capacità equivalente è:", "o": ["40 microfarad", "80 microfarad", "10 microfarad", "20 microfarad"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 58, "n": 5, "t": "Due condensatori di capacità pari a 20 microfarad sono in serie la loro capacità equivalente è:", "o": ["20 microfarad", "10 microfarad", "80 microfarad", "40 microfarad"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 58, "n": 6, "t": "Due condensatori hanno capacità C1=1,60 µF e C2=2,40 µF, calcola la capacità equivalente quando i condensatori sono collegati in serie", "o": ["4 microfarad", "0,96 microfarad", "2 microfarad", "0,5 microfarad"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 58, "n": 7, "t": "Due condensatori in parallelo sono collegati a una batteria. Che cosa cambia se inseriamo un terzo condensatore in parallelo agli altri due?", "o": ["Niente.", "Solo la capacità equivalente.", "La d.d.p. su ogni condensatore e la capacità equivalente.", "La capacità equivalente e la carica su ogni armatura."], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 58, "n": 8, "t": "Fra le armature di un condensatore piano c'è dell'aria. La sua capacità diminuisce se:", "o": ["allontaniamo le armature;", "aumentiamo la superficie delle armature;", "avviciniamo le armature;", "inseriamo un dielettrico fra le armature."], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 58, "n": 9, "t": "Un condensatore da 3 microF è caricato a una tensione di 10 V. Quale è l'energia accumulata?", "o": ["1,5*10^-6 J", "1,5*10^-4 J", "3*10^-4 J", "3*10^-6 J"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 58, "n": 10, "t": "Due condensatori hanno capacità C1=1,60 µF e C2=2,40 µF, calcola la capacità equivalente quando i condensatori sono collegati in parallelo", "o": ["0,96 microfarad", "4 microfarad", "12 microfarad", "2 microfarad"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 58, "n": 11, "t": "Si discuta la densità di energia elettrostatica contenuta in una regione di spazio in cui sia attivo un campo elettrostatico, partendo dal caso di un condensatore", "o": ["piano."], "is_open": true, "ans_idx": null, "ans_text": "u=½ε₀E² [J/m³]. Da condensatore piano: U=½(ε₀S/d)(Ed)²=½ε₀E²·(Sd). U_tot=∫½ε₀E²dV.", "no_ans": false}, {"l": 59, "n": 1, "t": "Sia C0 la capacità elettrica di un condensatore vuoto. Se si inserisce nello spazio tra le armature una lastra di dielettrico con costante dielettrica relativa e_r, la capacità del condensatore", "o": ["diminuisce assumendo il nuovo valore: C = e_r*C0", "aumenta assumendo il nuovo valore: C = e_r*C0", "aumenta assumendo il nuovo valore: C = e_r*e_0*C0", "rimane la stessa"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 59, "n": 2, "t": "Il potenziale elettrostatico in una regione di spazio che circonda una carica puntiforme Q: è costante", "o": ["aumenta proporzionalmente alla distanza da Q", "diminuisce come l'inverso della distanza da Q", "diminuisce come l'inverso del quadrato della distanza da Q"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 59, "n": 3, "t": "In una regione di campo elettrico uniforme diretto lungo l'asse x, in x = 2 m il potenziale è pari a 150 V, mentre in x = 5 m si ha un potenziale di 450 V.", "o": ["Quanto vale il campo elettrico?", "100 V/m", "300 V/m", "- 300 V/m", "-100 V/m"], "is_open": false, "ans_idx": 4, "ans_text": null, "no_ans": false}, {"l": 59, "n": 4, "t": "Come si definisce la capacità elettrica di un conduttore carico? La capacità C di un conduttore è data dal rapporto tra la carica accumulata nel conduttore e la differenza di potenziale tra le armature del conduttore stesso. La capacità C di un conduttore è pari al rapporto costante tra carica e potenziale del conduttore, C = Q/V La capacità C di un conduttore è pari al prodotto tra carica e potenziale del conduttore, C = QV La capacità C di un conduttore è pari al prodotto tra carica e campo all'interno del conduttore, C = QE", "o": [], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 59, "n": 5, "t": "Indicando con PI il pi greco e con e0 la costante dielettrica del vuoto, il campo elettrostatico all'interno di un conduttore sferico di raggio R e carica Q è pari a", "o": ["Q/(4*PI*e0*R^2)", "Q/(4*PI*e0*R)", "Q/(PI*e0*R)", "0"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 59, "n": 6, "t": "Indicando con PI il pi greco e con e0 la costante dielettrica del vuoto, il potenziale di un conduttore sferico di raggio R e carica Q è pari a", "o": ["Q/(PI*e0*R)", "Q/(4*PI*e0*R)", "0", "Q/(4*PI*e0*R^2)"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 59, "n": 7, "t": "Quale è la capacità equivalente di una coppia di condensatori connessi in parallelo?", "o": ["il prodotto delle capacità dei singoli condensatori", "la somma delle capacità dei singoli condensatori", "Il rapporto tra le capacità dei singoli condensatori", "l'inverso della somma delle capacità inverse dei singoli condensatori"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 59, "n": 8, "t": "Quale è l'energia elettrostatica di un condensatore di capacità C, caricato con una carica Q?", "o": ["Q/V", "1/2 QV", "Q/C", "CV"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 59, "n": 9, "t": "La rigidità dielettrica di un mezzo è il rapporto tra la capacità C di un condensatore riempito riempito con il mezzo e quella nel vuoto. è il massimo valore che il campo può assumere prima che abbia luogo una scarica elettrica.", "o": ["è il rapporto tra la capacità C di un condensatore riempito con il mezzo e quella nel vuoto.", "è il massimo valore che il campo può assumere prima che abbia luogo una scarica elettrica.", "È la densità di carica contenuta nel dielettrico.", "è la massima carica che può accumularsi sulle armature di un condensatore riempito con il mezzo."], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 59, "n": 10, "t": "La rigidità dielettrica di un mezzo è il rapporto tra la capacità C di un condensatore riempito riempito con il mezzo e quella nel vuoto. è la massima carica che può accumularsi sule armature di un condensatore riempito con il mezzo. è il massimo valore che il campo può assumere prima che abbia luogo una scarica elettrica.", "o": ["è il rapporto tra la capacità C di un condensatore riempito con il mezzo e quella nel vuoto.", "è la massima carica che può accumularsi sulle armature di un condensatore riempito con il mezzo.", "è il massimo valore che il campo può assumere prima che abbia luogo una scarica elettrica.", "È la densità di carica contenuta nel dielettrico."], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 59, "n": 11, "t": "Il campo elettrico esterno a un conduttore carico, in prossimità della sua superficie, è diretto ortogonalmente alla superficie del conduttore con modulo pari alla carica contenuta nel conduttore diviso la costante dielettrica nel vuoto diretto ortogonalmente alla superficie del conduttore con modulo pari alla densità di carica superficiale locale diviso la costante dielettrica nel vuoto", "o": ["nullo", "diretto parallelamente alla superficie del conduttore con modulo pari alla densità di carica superficiale locale diviso la costante dielettrica nel vuoto"], "is_open": true, "ans_idx": null, "ans_text": "A Q fissa: C=εᵣC₀↑, E=E₀/εᵣ↓, ΔV↓, U↓. A ΔV fissa: Q↑, E costante, C↑, U↑.", "no_ans": false}, {"l": 59, "n": 12, "t": "Si discuta l'effetto dell'inserimento di un dielettrico all'interno di un condensatore carico.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Inserendo dielettrico εᵣ: C=εᵣC₀, E=E₀/εᵣ, densità energia u=½εE².", "no_ans": false}, {"l": 59, "n": 13, "t": "Si discutano gli effetti sulla configurazione elettrica di un condensatore quando viene inserito un mezzo dielettrico al suo interno.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Inserendo dielettrico εᵣ: C=εᵣC₀↑, E=E₀/εᵣ↓, ΔV↓, U↓ (a Q fissa). A ΔV fissa (batteria): Q↑, E costante, C↑, U↑.", "no_ans": false}, {"l": 60, "n": 1, "t": "Come sono definiti la polarizzazione in un mezzo dielettrico su cui agisca un campo elettrico e il vettore di induzione elettrica?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "P=n·p_mol [C/m²]. D=ε₀E+P=εE. Teorema di Gauss: ∮D·dS=Q_libere.", "no_ans": false}, {"l": 61, "n": 1, "t": "Una carica di 4 mC e massa 2 mg si trova a una distanza di 3 m da un piano infinito omogeneamente carico e subisce una accelerazione di 4 m/s^2 per effetto", "o": ["del campo generato dal piano stesso. Quale è la densità di carica presente nel piano?", "3.54·10^(-11)", "1.77·10^(-11)", "8.85·10^(-11)", "7.1·10^(-11)"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 62, "n": 1, "t": "In un filo conduttore scorre una corrente di 16 A.La quantità di carica che attraversa il conduttore in tre minuti è:", "o": ["1440 J", "2880 C", "1440 C", "2880 J"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 62, "n": 2, "t": "in un filo scorre una corrente di 3 A per u'ora. Quanta carica elettrica è transitata?", "o": ["5600 C", "10800 C", "5600 J", "10800 J"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 62, "n": 3, "t": "L'intensità di corrente elettrica è per definizione: il prodotto della resistenza di un conduttore per l'intervallo di tempo in cui ciò avviene il prodotto della quantità di carica che attraversa la sezione di un conduttore per l'intervallo di tempo in cui ciò avviene il rapporto tra la quantità di carica che attraversa la sezione di un conduttore e l'intervallo unitario di tempo il rapporto tra la quantità di carica che attraversa la sezione di un conduttore e l'intervallo di tempo in cui ciò avviene.", "o": [], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 62, "n": 4, "t": "Una corrente continua di 2.5 A scorre in un filo per 4 minuti. Quanta carica passa in ogni punto del circuito durante questo intervallo di tempo?", "o": ["Q = 10 C", "Q = 100 C", "Q = 600 C", "Q = 0.06 C"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 62, "n": 5, "t": "Attraverso la sezione del filo di una lampadina, passano 1,6·10^19 elettroni in un secondo. Qual è la corrente che attraversa la lampadina?", "o": ["2,56 A", "1A", "1,6·10^19 A", "1,6·10^-19 A"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 62, "n": 6, "t": "Che corrente occorre per far transitare in un filo 600 C in un minuto?", "o": ["10 A", "20 A", "600 A", "60 A"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 62, "n": 7, "t": "Definire la corrente elettrica", "o": [], "is_open": true, "ans_idx": null, "ans_text": "i=dQ/dt [A=C/s]. Causata da campo elettrico che imprime velocità di deriva. L'Ampere è unità fondamentale SI.", "no_ans": false}, {"l": 62, "n": 8, "t": "Si definisca il vettore densità di corrente e si discuta l'equazione di continuità della corrente elettrica.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "j=nqv_d [A/m²]; i=∫j·dS. Equazione di continuità: ∂ρ/∂t+div j=0; stazionario: div j=0.", "no_ans": false}, {"l": 62, "n": 9, "t": "Come è definita l'intensità di corrente in un conduttore e come si misura?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "i=dQ/dt. Si misura con amperometro in serie. Verso convenzionale: cariche positive (opposto agli elettroni nei metalli).", "no_ans": false}, {"l": 63, "n": 1, "t": "Due resistenze da 10 ohm sono disposte in serie La loro resistenza equivalente è", "o": ["10 ohm", "non ho elementi sufficienti per rispondere", "5 ohm", "20 ohm"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 63, "n": 2, "t": "Due resistenze da 10 ohm sono disposte in parallelo. La loro resistenza equivalente è", "o": ["5 ohm", "non ho elementi sufficienti per rispondere", "10 ohm", "20 ohm"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 63, "n": 3, "t": "Quale resistenza posso collegare a un generatore da 9 V per avere una corrente di 2 A?", "o": ["9 ohm", "4,5 ohm", "81 ohm", "2.25 ohm"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 63, "n": 4, "t": "Due resistenze da 20 ohm sono in parallelo tra loro e in serie con una resistenza da 10 ohm. Quanto vale l'equivalente?", "o": ["60 ohm", "40 ohm", "10 ohm", "20 ohm"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 63, "n": 5, "t": "Si hanno tre resistori diversi collegati in serie e percorsi da corrente; quello con resistenza maggiore conduce:", "o": ["più corrente degli altri", "meno corrente degli altri", "la stessa corrente degli altri", "dovrei conoscere il valore delle resistenze"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 63, "n": 6, "t": "Si vuole far circolare in una resistenza R0 = 400 Ohm una corrente di 10 mA, collegandola ad una pila da 12 V. Che resistenza devo aggiungere al circuito per", "o": ["ottenere il mio scopo?", "R1 = 800 Ohm in parallelo", "R1 = 200 Ohm in parallelo", "R1 = 200 Ohm in serie", "R1 = 800 Ohm in serie"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 63, "n": 7, "t": "Quanto vale la corrente che scorre in un circuito formato da una pila da 9 V in serie con due resistenze di valore 5 e 10 ohm rispettivamente?", "o": ["0.3 A", "10 A", "0.6 A", "1A"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 63, "n": 8, "t": "Due resistenze hanno valore di 20 ohm e 40 ohm. Quanto vale la resistenza equivalente quando vengono connesse in parallelo?", "o": ["60 ohm", "13,3 ohm", "5 ohm", "30 ohm"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 63, "n": 9, "t": "Si hanno tre resistori diversi collegati in parallelo collegati a una stessa DDP. Quello con resistenza minore conduce: dovrei conoscere il valore delle resistenze", "o": ["la stessa corrente degli altri", "meno corrente degli altri", "più corrente degli altri"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 63, "n": 10, "t": "Si hanno tre resistori diversi collegati in parallelo collegati a una stessa DDP. Quello con resistenza maggiore conduce:", "o": ["meno corrente degli altri", "dovrei conoscere il valore delle resistenze", "la stessa corrente degli altri", "più corrente degli altri"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 63, "n": 11, "t": "Si hanno tre resistori diversi collegati in serie e percorsi da corrente; quello con resistenza minore conduce:", "o": ["meno corrente degli altri", "dovrei conoscere il valore delle resistenze", "più corrente degli altri", "la stessa corrente degli altri"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 63, "n": 12, "t": "Si hanno tre resistori uguali collegati in serie e percorsi da corrente; quello posto al centro fra gli altri due dissipa: dovrei conoscere il valore delle resistenze", "o": ["meno potenza degli altri", "più potenza degli altri", "la stessa potenza degli altri"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 63, "n": 13, "t": "Si hanno tre resistori uguali collegati in serie e percorsi da corrente; quello posto al centro fra gli altri due conduce: dovrei conoscere il valore delle resistenze", "o": ["più corrente degli altri", "la stessa corrente degli altri", "meno corrente degli altri"], "is_open": true, "ans_idx": null, "ans_text": "j=σE (microscopica). V=Ri con R=ρL/S (macroscopica). Nei metalli σ=ne²τ/m.", "no_ans": false}, {"l": 63, "n": 14, "t": "Due resistenze hanno valore di 20 ohm e 40 ohm. Quanto vale la resistenza equivalente quando vengono connesse in serie?", "o": ["10 ohm", "60 ohm", "13,3 ohm", "30 ohm"], "is_open": true, "ans_idx": null, "ans_text": "V=Ri, R=ρL/S [Ω]. Serie: R_eq=ΣRᵢ. Parallelo: 1/R_eq=Σ(1/Rᵢ).", "no_ans": false}, {"l": 63, "n": 15, "t": "La prima legge di Ohm si può enunciare nella forma:", "o": ["V*2i = R", "V/R=i", "R/i=V", "V*i=R"], "is_open": true, "ans_idx": null, "ans_text": "V=Ri. La d.d.p. è proporzionale alla corrente. Vale per conduttori ohmici a T costante.", "no_ans": false}, {"l": 63, "n": 16, "t": "Si enunci la legge di Ohm generalizzata per la conduzione elettrica e se ne descriva poi la forma specifica nel caso di conduttori metallici.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "j=σE (microscopica). V=Ri con R=ρL/S (macroscopica, prima legge di Ohm). Nei metalli σ=ne²τ/m.", "no_ans": false}, {"l": 63, "n": 17, "t": "Si definisca la resistenza elettrica di un conduttore e si discutano le resistenze equivalenti di una serie di resistori e di un sistema di resistori in parallelo.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "R=ρL/S [Ω]. Serie: R_eq=R₁+R₂+…+Rₙ (stessa i). Parallelo: 1/R_eq=1/R₁+…+1/Rₙ (stessa V).", "no_ans": false}, {"l": 63, "n": 18, "t": "Come si trovano le resistenze equivalenti in caso di resistenze in serie e parallelo?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Serie: 1/R_eq=Σ1/Rᵢ — SBAGLIATO. CORRETTO: Serie R_eq=ΣRᵢ. Parallelo: 1/R_eq=Σ(1/Rᵢ).", "no_ans": false}, {"l": 63, "n": 19, "t": "Esporre la prima legge di ohm", "o": [], "is_open": true, "ans_idx": null, "ans_text": "V=Ri. La d.d.p. ai capi di un resistore è proporzionale alla corrente che lo percorre. R dipende solo dalla geometria e dal materiale.", "no_ans": false}, {"l": 64, "n": 1, "t": "Una tensione di 220V viene applicata a una stufa elettrica che durante il suo funzionamento dissipa 500W. Qual è la sua resistenza della stufa?", "o": ["circa 100 ohm", "circa 1 ohm", "circa 10 ohm", "circa 1000 ohm"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 64, "n": 2, "t": "Una lampada ad incandescenza da 120 watt ed uno scaldabagno elettrico da 1500 watt sono alimentati dalla stessa tensione. Segue che:", "o": ["non si può rispondere senza conoscere le correnti", "è più elevata la resistenza della lampada ad incandescenza", "le resistenze elettriche dei due apparecchi sono le stesse", "è più elevata la resistenza dello scaldabagno elettrico"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 64, "n": 3, "t": "Qualunque conduttore ohmico percorso da corrente dissipa energia per effetto Joule", "o": ["è vero solo se la corrente è costante nel tempo", "è sempre falso", "è sempre vero", "qualche volta è falso"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 64, "n": 4, "t": "Per scaldare di 1 °C un litro di acqua sono necessari 4180 J di calore. Una corrente di 2 A che passa dentro una resistenza di 10 OHM per due minuti riesce a", "o": ["produrre questo calore?", "No.", "Dipende dalla temperatura iniziale dell'acqua.", "Non ci sono elementi sufficienti per rispondere.", "Sì."], "is_open": false, "ans_idx": 4, "ans_text": null, "no_ans": false}, {"l": 64, "n": 5, "t": "Calcolate la resistenza di un faro d'automobile da 40 W se la batteria è da 12 V.", "o": ["R = 3.6 ohm", "R = 4.8 ohm", "R = 1.2 ohm", "R = 2.4 ohm"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 64, "n": 6, "t": "Una resistenza da 10 ohm di potenza massima pari a 5 W è collegata a una pila da 9 V.", "o": ["La resistenza riesce a dissipare la potenza", "La resistenza brucia", "Non ho elementi sufficienti per rispondere", "La resistenza si espande"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 64, "n": 7, "t": "Una serpentina di 30 Ohm è immersa in 40 l di acqua a temperatura di 15 °C. Si vuole scaldare l'acqua a 45 °C in 30 minuti. Sapendo che il calore specifico", "o": ["dell'acqua è 4186 J/(kg·K), quale tensione bisogna applicare alla serpentina?", "4.5 V", "12 V", "420 V", "290 V"], "is_open": false, "ans_idx": 4, "ans_text": null, "no_ans": false}, {"l": 64, "n": 8, "t": "Agli estremi di due conduttori ohmici di resistenza R1 = 1000 OHM e R2 = 2000 OHM, è applicata la stessa d.d.p. Quale dei due assorbe una potenza", "o": ["maggiore?", "R2, perché è più grande di R1.", "La potenza è la stessa perché la d.d.p. è uguale.", "R1, perché è attraversato da una corrente maggiore.", "Dipende dal valore della d.d.p."], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 64, "n": 9, "t": "Una centrale elettrica sviluppa una potenza di 5 MW. Che cosa significa?", "o": ["Può compiere un lavoro di 5 milioni di joule in unsecondo.", "Può compiere un lavoro di 5 milioni di joule inun'ora.", "Può compiere un lavoro di 1000 J in 5000 s.", "Può compiere un lavoro di 5000 J in 1000 s."], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 64, "n": 10, "t": "Su un trapano elettrico c'è scritto 500 W. Che cosa significa?", "o": ["Riceve dagli elettroni che l'attraversano 500 J di energia ogni secondo.", "La corrente massima che può sopportare è 500 A.", "Per farlo funzionare, sono necessari 500 J.", "Può essere collegato a una pila che fornisce 500 V."], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 64, "n": 11, "t": "Quanto tempo impiega una lampadina da 100 W a dissipare 30 kJ?", "o": ["cinque minuti", "dieci minuti", "un'ora", "un minuto"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 64, "n": 12, "t": "Quanto calore eroga una sorgente da 500 W in 10 minuti?", "o": ["500 kJ", "5000 kJ", "300 kJ", "1,3 kJ"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 64, "n": 13, "t": "Quale potenza è erogata da una resistenza di 1 kohm alimentata da una tensione di 50 V?", "o": ["25 W", "2,5 W", "25 J", "2,5 J"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 64, "n": 14, "t": "La potenza elettrica P è data dall'espressione:", "o": ["P=i·V", "P=i/R", "P=iR", "P=i/V"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 64, "n": 15, "t": "La potenza disponibile in un circuito domestico è 3 kW, la tensione 220 V. Che cosa significa?", "o": ["Nel circuito possono passare 3000 C in un'ora.", "Non possono funzionare contemporaneamente 3 elettrodomestici da 1 kW.", "Nel circuito può passare al massimo una corrente di circa 13,6 A.", "Nel circuito passano 3 A in 1000 ore."], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 64, "n": 16, "t": "Una resistenza da 22 ohm è attaccata alla rete elettrica a 220 V; la corrente che percorre la resistenza è:", "o": ["2200 A", "220 A", "110 A", "10 A"], "is_open": true, "ans_idx": null, "ans_text": "Conversione di energia elettrica in calore: Q=Ri²t. Densità di potenza locale: p=j·E=σE².", "no_ans": false}, {"l": 64, "n": 17, "t": "Ho a disposizione un generatore da 24 V e una bobina di filo in bronzo fosforoso (resistività = 0.12 mOhm·cm) di diametro 0.24 mm. Quanto filo devo", "o": ["avvolgere attorno ad un dispositivo che voglio tenere caldo fornendogli 60W?", "1.15 cm", "8m", "36.2 cm", "44.2 cm"], "is_open": true, "ans_idx": null, "ans_text": "P=V·i [W=J/s]. Per resistore: P=Ri²=V²/R. Energia in tempo t: W=Pt.", "no_ans": false}, {"l": 64, "n": 18, "t": "Un dispositivo elettrico produce calore con una potenza di 2,5 W per 10 minuti. Quanto calore viene prodotto?", "o": ["25 J", "1500 cal", "1500 J", "25 cal"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 64, "n": 19, "t": "Una resistenza da 10 ohm è collegata a una pila da 9 V. La potenza dissipata dalla resistenza è:", "o": ["8.1 W", "81 J", "81 W", "8,1 J"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 64, "n": 20, "t": "In un filo di resistenza pari a 5 ohm scorre una corrente di 16 A. La potenza erogata è:", "o": ["1560 W", "1280 W", "160 W", "80 W"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 64, "n": 21, "t": "Quale tensione massima posso applicare a una resistenza da 10 ohm con potenza massima di 10 W?", "o": ["3,3 V", "100 V", "1V", "10 V"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 64, "n": 22, "t": "Una serpentina di 30 Ohm è immersa in 40 l di acqua a temperatura di 15 °C. Si vuole scaldare l'acqua a 45 °C in 30 minuti. Sapendo che il calore specifico", "o": ["dell'acqua è 4186 J/(kg·K), quale tensione bisogna applicare alla serpentina?", "290 V", "12 V", "4.5 V", "420 V"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 64, "n": 23, "t": "In un resistore attraversato dalla corrente i si produce una quantità di calore Q. Quanto calore si produce nello stesso intervallo di tempo se la corrente è", "o": ["0.5·i?", "0.5·Q", "Non si può rispondere.", "2·Q", "0.25·Q"], "is_open": false, "ans_idx": 4, "ans_text": null, "no_ans": false}, {"l": 64, "n": 24, "t": "Una resistenza alimentata da una batteria da 12V eroga 40 W di potenza, quanto vale la resistenza?", "o": ["0,8 ohm", "3,3 ohm", "36 ohm", "3,6 ohm"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 64, "n": 25, "t": "Cos'è l'effetto Joule?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "L'effetto Joule è la conversione irreversibile di energia elettrica in calore: Q=Ri²t=Pt. Causata dagli urti degli elettroni con il reticolo cristallino.", "no_ans": false}, {"l": 64, "n": 26, "t": "In cosa consiste l'effetto Joule in un conduttore e che forma assume l'effetto Joule se lo si considera localmente?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "L'effetto Joule in forma locale: densità di potenza p=j·E=σE²=j²/σ [W/m³]. Totale: P=∫p dV=Ri².", "no_ans": false}, {"l": 64, "n": 27, "t": "Definire la potenza elettrica", "o": [], "is_open": true, "ans_idx": null, "ans_text": "P=V·i [W=J/s]. Per resistore: P=Ri²=V²/R=Vi. Energia dissipata in tempo t: W=Pt.", "no_ans": false}, {"l": 65, "n": 1, "t": "Due lampade hanno resistenza rispettivamente di 100 e 200 ohm, e vengono connesse ad un generatore di forza elettromotrice di 100 V. Calcolare la corrente", "o": ["che circola nel generatore quando le due resistenze sono connesse in serie.", "I = 0.22 A", "I = 0.11 A", "I = 0.33 A", "I = 0.44 A"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 65, "n": 2, "t": "Due lampade hanno resistenza rispettivamente di 100 e 200 ohm, e vengono connesse ad un generatore di forza elettromotrice di 100 V. Calcolare la corrente", "o": ["che circola nel generatore quando le due resistenze sono connesse in parallelo", "I = 1.0 A", "I = 2.0 A", "I = 0.5 A", "I = 1.5 A"], "is_open": false, "ans_idx": 4, "ans_text": null, "no_ans": false}, {"l": 65, "n": 3, "t": "Sulla batteria di un veicolo c'è scritto 12 V e 50 Ah (si legge ampere-ora). Il primo dato è la d.d.p. che la batteria fornisce. Che cosa rappresenta il secondo", "o": ["dato?", "La possibile durata della batteria.", "La corrente massima che la batteria fa circolare.", "La quantità di carica che la batteria può fornire.", "La capacità termica della batteria."], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 65, "n": 4, "t": "Ad una batteria ideale di 1.5 V sono collegate in parallelo due resistenze. La batteria eroga una corrente di 50 mA. Se una delle resistenze è di 60 OHM, qual'è", "o": ["il valore dell'altra?", "R = 100 ohm", "R = 80 ohm", "R = 20 ohm", "R = 60 ohm"], "is_open": false, "ans_idx": 4, "ans_text": null, "no_ans": false}, {"l": 65, "n": 5, "t": "Se avete a disposizione un generatore di tensione di 120 V e tante lampadine da 6V, come fate per accenderle senza bruciarle? Colleghiamo 10 lampadine in serie", "o": ["Colleghiamo 10 lampadine in parallelo", "Colleghiamo 20 lampadine in serie", "Colleghiamo 20 lampadine in parallelo"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 65, "n": 6, "t": "Una piccola lampadina assorbe 300 mA da una batteria di 1.5 V. Qual è la resistenza della lampadina?", "o": ["R = 0.45 ohm", "R = 4.0 ohm", "R = 5.0 ohm", "R = 4.5 ohm"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 65, "n": 7, "t": "Si definisca la forza elettromotrice di un generatore elettrico e si descriva il circuito equivalente che schematizza un generatore reale connesso ad un carico", "o": ["esterno."], "is_open": true, "ans_idx": null, "ans_text": "ε=∮E_em·ds. Circuito equivalente: generatore ideale ε + resistenza interna r. V_morsetti=ε−ri.", "no_ans": false}, {"l": 66, "n": 1, "t": "Si enuncino le leggi di Kirchhoff per i circuiti elettrici lineari", "o": [], "is_open": true, "ans_idx": null, "ans_text": "I (nodi): Σiᵢ=0 — conservazione della carica. II (maglie): Σεₖ=ΣRⱼiⱼ — conservatività del campo.", "no_ans": false}, {"l": 66, "n": 2, "t": "Esporre le leggi dei circuiti elettrici", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Legge dei nodi: correnti entranti = uscenti. Legge delle maglie: Σε=ΣiR per ogni maglia.", "no_ans": false}, {"l": 67, "n": 1, "t": "Un condensatore dimezza la sua carica iniziale scaricando in 20 ms attraverso una resistenza da 40 Ohm. Quale è la sua capacità?", "o": ["0.14 mF", "0.08 mF", "1 mF", "0.72 mF"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 67, "n": 2, "t": "Una pila da f = 12 V è connessa ad una serie formata da una resistenza R = 1.4 MOhm e un condensatore con C = 1.8 microF. Collegando al tempo t0 = 0s il", "o": ["circuito, dopo quanto tempo la carica accumulata sul condensatore sarà pari a 16 microC?", "6.2 s", "13 ms", "3.4 s", "2.1 s"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 67, "n": 3, "t": "Si descriva il processo di carica in un circuito RC", "o": [], "is_open": true, "ans_idx": null, "ans_text": "q(t)=Cε(1−e^(−t/τ)), i(t)=(ε/R)e^(−t/τ), τ=RC. A regime: q=Cε, i=0.", "no_ans": false}, {"l": 67, "n": 4, "t": "Si discuta il bilancio energetico del processo di scarica in un circuito RC", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Scarica: q(t)=q₀e^(−t/τ). Tutta l'energia U₀=½CV₀² si dissipa su R. In carica: metà al condensatore, metà su R.", "no_ans": false}, {"l": 67, "n": 5, "t": "Si verifichi tramite analisi dimensionale che il prodotto RC rappresenti effettivamente un tempo", "o": [], "is_open": true, "ans_idx": null, "ans_text": "[R]=[V/A]=[V·s/C]; [C]=[C/V]; [RC]=[s]. τ=RC è un tempo: dopo 5τ la carica è al 99% del regime.", "no_ans": false}, {"l": 68, "n": 1, "t": "Quando un ago magnetico si trova in una zona in cui è presente un campo magnetico, risulta sottoposto:", "o": ["a una forza che agisce sul polo nord;", "a una coppia di forze;", "a una forza e a una coppia di forze.", "a una forza che agisce sul polo sud;"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 68, "n": 2, "t": "Perché il polo Nord della bussola è attratto dal polo Nord magnetico della Terra? Due poli magnetici dello stesso nome non dovrebbero respingersi? Se si considerasse la Terra come una grande calamita, il polo Nord geografico sarebbe in realtà un polo Sud magnetico Il polo Nord della bussola è attratto dal polo Sud del sole La ragione sta nel fatto che l'intensità del campo magnetico terrestre è molto debole", "o": ["Se si considerasse la Terra come una grande calamita, il polo Nord geografico sarebbe in realtà un polo Sud magnetico", "Il polo Nord della bussola è attratto dal polo Sud del sole", "La ragione sta nel fatto che l'intensità del campo magnetico terrestre è molto debole", "Non è sempre vero che due poli omologhi si respingono"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 68, "n": 3, "t": "Quante calamite è possibile creare, in linea di principio, frammentando un magnete? Infinite", "o": ["Nessuna, perché se si spezza un magnete esso perde la sua magnetizzazione.", "Finchè la magnetizzazione non si esaurisce", "Un numero qualsiasi, purché sia pari"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 68, "n": 4, "t": "Del campo magnetico e del campo elettrostatico si può dire che:", "o": ["il primo non è conservativo, mentre il secondo lo è", "il primo è conservativo, mentre il secondo non lo è", "entrambi sono conservativi", "entrambi non sono conservativi"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 68, "n": 5, "t": "Si descriva la forza di Lorentz e si discuta qualche esempio applicativo", "o": [], "is_open": true, "ans_idx": null, "ans_text": "F=qv×B, ⊥ a v e B. Non compie lavoro, non cambia |v|. Con v⊥B: moto circolare r=mv/(qB).", "no_ans": false}, {"l": 69, "n": 1, "t": "In quale delle seguenti situazioni fisiche un campo magnetico uniforme esercita una forza su una carica puntiforme?", "o": ["la carica si muove con velocità ortogonale al campo", "la carica è ferma", "Nessuna delle precedenti", "la carica si muove con velocità parallela al campo"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 69, "n": 2, "t": "Quando un ago magnetico si trova in una zona in cui è presente un campo magnetico, risulta sottoposto:", "o": ["a una coppia di forze;", "a una forza che agisce sul polo nord;", "a una forza e a una coppia di forze.", "a una forza che agisce sul polo sud;"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 69, "n": 3, "t": "Una particella carica si muove lungo una retta attraverso una particolare regione dello spazio. Vi può essere un campo magnetico non nullo in questa regione?", "o": ["Assolutamente no, altrimenti la particella verrebbe deviata", "Si, ma il campo deve essere parallelo alla direzione della velocità", "Si, ma il campo deve essere ortogonale alla direzione della velocità", "Si, ma deve anche esserci un campo elettrico parallelo al campo magnetico"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 69, "n": 4, "t": "Un protone ed una particella alpha (nucleo di elio, m_al = 4·m_P q_al = 2·q_P) hanno la stessa energia cinetica quando entrano in una regione dove è presente un campo magnetico ortogonale alla loro velocità. Qual'è il rapporto dei raggi dei loro cammini circolari espresso come Rp/Ra?", "o": ["Rp/Ra = 2", "Rp/Ra = 1/2", "Rp/Ra = 1/4", "Rp/Ra = 1"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 69, "n": 5, "t": "Un protone con una velocità di 5.0·10^6 m/s avverte, attraversando un campo magnetico, una forza massima di 8.0·10^(-14) N. Quanto vale il modulo del", "o": ["campo magnetico?", "B = 0.50 T", "B = 0.30 T", "B = 0.20 T", "B = 0.10 T"], "is_open": false, "ans_idx": 4, "ans_text": null, "no_ans": false}, {"l": 69, "n": 6, "t": "Un protone con una velocità di 5.0·10^6 m/s avverte, attraversando un campo magnetico le cui linee di forza formano un angolo di 30° con la direzione della velocità, una forza di 8·10^(-14) N. Quanto vale il modulo del campo magnetico? (La carica del protone è 1.6·10^(-19) C).", "o": ["B = 0.2 T", "B = 0.3 T", "B = 0.4 T", "B = 0.1 T"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 69, "n": 7, "t": "La forza magnetica che agisce su una carica elettrica", "o": ["E' parallela alla velocità della carica", "È parallela alla direzione del campo magnetico", "Può modificarne l'energia cinetica", "Non può modificarne il modulo della velocità"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 69, "n": 8, "t": "Una particella carica attraversa una regione dello spazio, senza subire deviazione. Possiamo affermare che in quella regione non è presente un campo", "o": ["magnetico?", "Non si può rispondere, perché non è noto il segno della carica.", "Sì, perché, se ci fosse un qualunque campo magne-tico, la particella cambierebbe direzione.", "No, perché ci potrebbe essere un campo parallelo alla direzione della velocità.", "Sì, perché non agisce nessuna forza sulla carica."], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 69, "n": 9, "t": "Una particella, con rapporto carica su massa q/m = 2·10^5 C/kg, entra in una regione di campo magnetico omogeneo di modulo B = 0.5 T, con velocità iniziale v0= 1·10^6m/s diretta ortogonalmente al campo stesso. Quale sarà il raggio della sua traiettoria?", "o": ["10 cm", "10 m", "4m", "1m"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 69, "n": 10, "t": "Un protone si muove con velocità di 5·10^6 m/s nella stessa direzione di un campo magnetico B di modulo 1.5 T. Quanto vale la forza di Lorentz che subisce il", "o": ["protone?", "F = 2·10^(-13) N", "F = 12·10^(-11) N", "F=0N", "F = 12·10^(-13) N"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 69, "n": 11, "t": "Una carica percorre una traiettoria circolare di raggio 0.024 mm sotto l'effetto di un campo magnetico diretto ortogonalmente al piano della traiettoria. Il campo esercita una forza di modulo 3·10^(-6) N sulla carica. Quanto vale l'energia cinetica della carica?", "o": ["3.6·10^(-11) J", "7.2·10^(-11) J", "1.4·10^(-10) J", "6.5·10^(-12) J"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 69, "n": 12, "t": "Nell'espressione della forza di Lorentz sono presenti tre vettori: forza, velocità, campo. Quali sono sempre perpendicolari fra loro?", "o": ["Ogni vettore è sempre perpendicolare agli altri due.", "La velocità è perpendicolare al campo.", "La forza è perpendicolare alla velocità.", "Non ci sono due vettori sempre perpendicolari."], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 69, "n": 13, "t": "In quale delle seguenti situazioni fisiche un campo magnetico uniforme esercita una forza su una carica puntiforme?", "o": ["la carica si muove con velocità parallela al campo", "la carica è ferma", "Nessuna delle precedenti", "la carica si muove con velocità ortogonale al campo"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 69, "n": 14, "t": "Due cariche elettriche q1 e q2 = 4q1, aventi velocità di modulo v1 e v2 = 2 v1, entrano in un campo magnetico omogeneo con velocità perpendicolare al campo stesso. Calcolare il rapporto F1/F2 dei moduli delle forze agenti sulle due cariche", "o": ["2", "1/2", "4", "1/8"], "is_open": true, "ans_idx": null, "ans_text": "Ioni accelerati da ΔV → v=√(2qΔV/m). In campo B⊥v: r=mv/(qB). Misurando r: m/q=r²B²/(2ΔV). Isotopi separati per r diverso.", "no_ans": false}, {"l": 69, "n": 15, "t": "Un campo elettrico di 1.5 kV/m ed un campo magnetico di 0.30 T, ortogonale al campo elettrico, agiscono su un elettrone in moto lungo una retta ortogonale sia al campo elettrico che al campo magnetico, in modo che sull'elettrone agisca una forza risultante nulla. Qual'è la velocità dell'elettrone?", "o": ["v = 8000 m/s", "v = 5000 m/s", "v = 2000 m/s", "v = 11000 m/s"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 69, "n": 16, "t": "Una particella carica in un campo magnetico uniforme una particella carica in un campo magnetico uniforme Non subisce forze", "o": ["Si mette in movimento per effetto del campo", "Se era ferma inizia a ruotare", "Subisce una forza se è in movimento"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 69, "n": 17, "t": "Cosa succede se si posiziona una carica elettrica ferma in un campo elettrico? E in un campo magnetico?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "In campo elettrico E: subisce forza F=qE anche se ferma. In campo magnetico B: subisce forza F=qv×B solo se in moto (v≠0). Se ferma in campo B: F=0.", "no_ans": false}, {"l": 69, "n": 18, "t": "Si discuta il principio di funzionamento di uno spettrometro di massa.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Ioni accelerati da ΔV → v=√(2qΔV/m). In campo B⊥v: r=mv/(qB). Misurando r: m/q=r²B²/(2ΔV). Isotopi con massa diversa percorrono raggi diversi → separazione.", "no_ans": false}, {"l": 69, "n": 19, "t": "Cosa succede a una carica elettrica in movimento in un campo magnetico?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "F=qv×B ⊥ v → non compie lavoro, non cambia |v|. Con v⊥B: moto circolare r=mv/(qB), f_c=qB/(2πm). Con v generica: moto elicoidale. Con v∥B: F=0.", "no_ans": false}, {"l": 69, "n": 20, "t": "Si descriva il moto di una carica che entra con velocità orientata in direzione generica all'interno di una regione di campo magnetico uniforme.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "v si decompone in v∥ (parallela a B, non deviata) e v⊥ (⊥ a B, produce moto circolare con r=mv⊥/(qB)). La combinazione dà moto elicoidale: circonferenza nel piano ⊥B + traslazione uniforme lungo B. Passo: p=v∥·T=2πmv cosθ/(qB).", "no_ans": false}, {"l": 69, "n": 21, "t": "Si discuta il principio di funzionamento di uno spettrometro di massa.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Ioni accelerati da ΔV → v=√(2qΔV/m). In campo B⊥v: traiettoria circolare r=mv/(qB). Da r: m/q=r²B²/(2ΔV). Isotopi con m diversa → r diversi → separazione spaziale sul rivelatore.", "no_ans": false}, {"l": 70, "n": 1, "t": "Due fili indefiniti paralleli, distanti 1 mm sono attraversati dalla stessa corrente I con stesso verso. Tra di essi si misura una forza attrattiva per unità di", "o": ["lunghezza pari a 0.5 N/m. Quanto vale I?", "25 A", "50 A", "10 A", "80 A"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 70, "n": 2, "t": "Una spira quadrata di lato L = 20 cm è percorsa da una corrente di 2 mA. Essa è immersa in un campo magnetico uniforme di 0.5 T diretto ortogonalmente alla superficie della spira. Quale è il valore del momento della forza applicata sulla spira?", "o": ["6·10^(-5) N·m", "0 N·m", "2*10^(-4) N*m", "4·10^(-4) N·m"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 70, "n": 3, "t": "La forza che si esercita tra due fili conduttori rettilinei e paralleli percorsi da correnti uguali ed equiverse:", "o": ["è ortogonale ai fili e repulsiva", "è nulla", "è ortogonale ai fili e attrattiva", "è parallela ai fili"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 70, "n": 4, "t": "Una spira quadrata di lato L = 20 cm è immersa in una regione di campo magnetico B = 4 T diretto ortogonalmente alla superficie della spira stessa. Quanto vale il momento della forza magnetica agente sulla spira quando in essa circola una corrente pari a 2 A", "o": ["0.32 N·m", "0 N·m", "160 N·m", "16 N·m"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 70, "n": 5, "t": "Un filo rettilineo è percorso da corrente. Possiamo accorgercene con", "o": ["una cellula fotoelettrica", "una bussola", "un metronomo", "uno stetoscopio"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 70, "n": 6, "t": "Il momento torcente su una spira percorsa da corrente, immersa dentro un campo magnetico, dipende: dalla corrente, dalla superficie della spira, dal campo e da come la spira è orientata nel campo.", "o": ["dalla corrente, dalla superficie della spira, dal campo e da come la spira è orientata nel campo.", "solo dalla corrente e dall'angolo che la spira forma con la direzione del campo;", "solo dall'area della spira e dal campo;", "solo dalla corrente e dal campo;"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 70, "n": 7, "t": "Una spira quadrata di lato L = 20 cm è percorsa da una corrente di 2 mA. Essa è immersa in un campo magnetico uniforme di 0.5 T diretto ortogonalmente alla superficie della spira. Quale è il valore del momento della forza applicata sulla spira?", "o": ["4*10^(-4) N*m", "6*10^(-5) N*m", "0 N*m", "2*10^(-4) N*m"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 70, "n": 8, "t": "Si definisca il momento magnetico di una spira piana e l'azione di un campo magnetico su di essa.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "m=iAn̂ [A·m²]. Torque: M=m×B=iAB sinθ. Equilibrio stabile: m∥B. Principio di motore elettrico e galvanometro.", "no_ans": false}, {"l": 70, "n": 9, "t": "Si descriva la forza che un campo magnetico esercita su un tratto di filo rettilineo e su un circuito chiuso percorsi da corrente.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "dF=i·ds×B. Su filo rettilineo L: F=iLB sinθ. Su circuito chiuso piano in campo uniforme: F_tot=0, ma M=iA×B≠0.", "no_ans": false}, {"l": 71, "n": 1, "t": "Un filo indefinitamente lungo è percorso da una corrente i, in un punto distante r dal filo, il campo magnetico è", "o": ["diretto sullo stesso piano individuato dal filo e dal punto e proporzionale a i/r^2", "diretto ortogonalemnte al piano individuato dal filo e dal punto e proporzionale a i/r", "nullo", "diretto sullo stesso piano individuato dal filo e dal punto e proporzionale a i/r"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 71, "n": 2, "t": "Una carica puntiforme positiva, viaggia a velocità costante parallelamente a un filo infinitamente lungo a distanza d da esso. Ad un certo istante nel filo è attivata una corrente stazionaria i con verso concorde a quello della carica, che a questo punto", "o": ["Viene deflessa verso il filo", "Permane nel suo stato di moto rettilineo uniforme", "Viene deflessa ortogonalmente al piano sotteso dal filo e dalla sua traiettoria iniziale", "Viene deflessa lontano dal filo"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 71, "n": 3, "t": "Il campo magnetico lungo l'asse di una spira circolare percorsa da corrente", "o": ["E' diretto come la corrente nella spira", "E' minimo al centro della spira", "E' proporzionale al quadrato della corrente", "È massimo al centro della spira"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 71, "n": 4, "t": "Le linee di forza del campo magnetico intorno ad un filo rettilineo molto lungo percorso da una corrente I sono:", "o": ["delle circonferenze parallele al filo", "delle circonferenze concentriche con il filo", "delle rette parallele al filo", "delle rette uscenti dal filo"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 71, "n": 5, "t": "Ad una distanza di 2.4 cm da un filo conduttore rettilineo molto lungo, il campo magnetico ha modulo 16 microT. Quanto vale l'intensità di corrente nel filo?", "o": ["B = 2.82 A", "B = 4.07 A", "B = 1.92 A", "B = 1.64 A"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 71, "n": 6, "t": "Si enunci e descriva la legge di Biot-Savart", "o": [], "is_open": true, "ans_idx": null, "ans_text": "dB=(μ₀/4π)·i·ds×r̂/r². Filo infinito: B=μ₀i/(2πr), linee circolari. μ₀=4π×10⁻⁷ T·m/A.", "no_ans": false}, {"l": 72, "n": 1, "t": "Il campo magnetico presente in un solenoide ideale di lunghezza infinita non dipende da dal materiale all'interno del solenoide dal raggio del solenoide dalla corrente che scorre nel solenoide", "o": ["dal materiale all'interno del solenoide", "dal raggio del solenoide", "dalla corrente che scorre nel solenoide", "dal numero delle spire per unità di lunghezza"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 72, "n": 2, "t": "Il campo magnetico generato dalla corrente che scorre in un filo rettilineo indefinito è diretto", "o": ["Su un piano parallelo al filo", "Su una superficie sferica concatenata col filo", "Su un piano ortogonale al filo", "Parallelamente al filo"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 72, "n": 3, "t": "Cosa afferma il teorema di Ampere? La corrente che circola in una resistenza è pari al rapporto tra la differenza di potenziale ai capi delle resistenza diviso la resistenza stessa Due fili paralleli indefinitamente lunghi, attraversati da una corrente di 1 A, esercitano tra loro una forza per unità di lunghezza pari a mu_0/(2*PI_greco) la circuitazione del campo magnetico lungo una linea chiusa è uguale alla somma algebrica delle correnti, con segno opportunamente definito, concatenate alla linea chiusa", "o": ["La corrente che circola in una resistenza è pari al rapporto tra la differenza di potenziale ai capi della resistenza diviso la resistenza stessa (Legge di Ohm)", "La circuitazione del campo magnetico su una linea chiusa è uguale alla somma algebrica delle correnti concatenate, moltiplicata per la permeabilità magnetica del vuoto", "La forza esercitata da un campo magnetico B su una carica q che si muove a velocità v è data da q·(v×B)", "Due fili paralleli percorsi da correnti uguali si attraggono con forza F/L = μ₀I²/(2πd)"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 72, "n": 4, "t": "La legge di Ampère afferma che:", "o": ["La circuitazione del campo elettrostatico è sempre nulla", "La circuitazione del campo magnetico è sempre nulla", "Nessuna delle altre risposte", "La circuitazione del campo elettrico è nulla"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 72, "n": 5, "t": "Una carica con q/m = 1.27·10^6 C/kg, si muove di moto circolare uniforme con una velocità di 400 m/s, all'interno e intorno all'asse di un lungo solenoide rettilineo, in cui circola una corrente di 0.25 A. Il raggio della traiettoria della carica è 10 cm. Il solenoide avrà quindi", "o": ["Circa 100 spire/cm", "Circa 1000 spire/cm", "Circa 20000 spire/cm", "Circa 10000 spire/cm"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 72, "n": 6, "t": "Un solenoide lungo 10 cm, con 600 spire, è percorso da una corrente di 20 A. Quanto vale il campo magnetico al suo interno?", "o": ["B = 6 microT", "B = 23 mT", "B = 151 mT", "B = 226 mT"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 72, "n": 7, "t": "Si descriva il campo magnetico all'interno di un solenoide rettilineo percorso da corrente.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "B=μ₀ni all'interno (uniforme, ∥ asse). Fuori B=0. Da Ampere: B·L=μ₀·nL·i → B=μ₀ni.", "no_ans": false}, {"l": 72, "n": 8, "t": "Si enunci e si descriva il teorema di Ampere", "o": [], "is_open": true, "ans_idx": null, "ans_text": "∮B·dl=μ₀Σi_conc. Locale: rotB=μ₀j. Applicazioni: filo (B=μ₀i/(2πr)), solenoide (B=μ₀ni).", "no_ans": false}]; i=∫j·dS. Equazione di continuità: ∂ρ/∂t+div j=0; stazionario: div j=0.", "no_ans": false}, {"l": 62, "n": 9, "t": "Come è definita l'intensità di corrente in un conduttore e come si misura?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "i=dQ/dt. Si misura con amperometro in serie. Verso convenzionale: cariche positive (opposto agli elettroni nei metalli).", "no_ans": false}, {"l": 63, "n": 1, "t": "Due resistenze da 10 ohm sono disposte in serie La loro resistenza equivalente è", "o": ["10 ohm", "non ho elementi sufficienti per rispondere", "5 ohm", "20 ohm"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 63, "n": 2, "t": "Due resistenze da 10 ohm sono disposte in parallelo. La loro resistenza equivalente è", "o": ["5 ohm", "non ho elementi sufficienti per rispondere", "10 ohm", "20 ohm"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 63, "n": 3, "t": "Quale resistenza posso collegare a un generatore da 9 V per avere una corrente di 2 A?", "o": ["9 ohm", "4,5 ohm", "81 ohm", "2.25 ohm"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 63, "n": 4, "t": "Due resistenze da 20 ohm sono in parallelo tra loro e in serie con una resistenza da 10 ohm. Quanto vale l'equivalente?", "o": ["60 ohm", "40 ohm", "10 ohm", "20 ohm"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 63, "n": 5, "t": "Si hanno tre resistori diversi collegati in serie e percorsi da corrente; quello con resistenza maggiore conduce:", "o": ["più corrente degli altri", "meno corrente degli altri", "la stessa corrente degli altri", "dovrei conoscere il valore delle resistenze"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 63, "n": 6, "t": "Si vuole far circolare in una resistenza R0 = 400 Ohm una corrente di 10 mA, collegandola ad una pila da 12 V. Che resistenza devo aggiungere al circuito per", "o": ["ottenere il mio scopo?", "R1 = 800 Ohm in parallelo", "R1 = 200 Ohm in parallelo", "R1 = 200 Ohm in serie", "R1 = 800 Ohm in serie"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 63, "n": 7, "t": "Quanto vale la corrente che scorre in un circuito formato da una pila da 9 V in serie con due resistenze di valore 5 e 10 ohm rispettivamente?", "o": ["0.3 A", "10 A", "0.6 A", "1A"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 63, "n": 8, "t": "Due resistenze hanno valore di 20 ohm e 40 ohm. Quanto vale la resistenza equivalente quando vengono connesse in parallelo?", "o": ["60 ohm", "13,3 ohm", "5 ohm", "30 ohm"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 63, "n": 9, "t": "Si hanno tre resistori diversi collegati in parallelo collegati a una stessa DDP. Quello con resistenza minore conduce: dovrei conoscere il valore delle resistenze", "o": ["la stessa corrente degli altri", "meno corrente degli altri", "più corrente degli altri"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 63, "n": 10, "t": "Si hanno tre resistori diversi collegati in parallelo collegati a una stessa DDP. Quello con resistenza maggiore conduce:", "o": ["meno corrente degli altri", "dovrei conoscere il valore delle resistenze", "la stessa corrente degli altri", "più corrente degli altri"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 63, "n": 11, "t": "Si hanno tre resistori diversi collegati in serie e percorsi da corrente; quello con resistenza minore conduce:", "o": ["meno corrente degli altri", "dovrei conoscere il valore delle resistenze", "più corrente degli altri", "la stessa corrente degli altri"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 63, "n": 12, "t": "Si hanno tre resistori uguali collegati in serie e percorsi da corrente; quello posto al centro fra gli altri due dissipa: dovrei conoscere il valore delle resistenze", "o": ["meno potenza degli altri", "più potenza degli altri", "la stessa potenza degli altri"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 63, "n": 13, "t": "Si hanno tre resistori uguali collegati in serie e percorsi da corrente; quello posto al centro fra gli altri due conduce: dovrei conoscere il valore delle resistenze", "o": ["più corrente degli altri", "la stessa corrente degli altri", "meno corrente degli altri"], "is_open": true, "ans_idx": null, "ans_text": "j=σE (microscopica). V=Ri con R=ρL/S (macroscopica). Nei metalli σ=ne²τ/m.", "no_ans": false}, {"l": 63, "n": 14, "t": "Due resistenze hanno valore di 20 ohm e 40 ohm. Quanto vale la resistenza equivalente quando vengono connesse in serie?", "o": ["10 ohm", "60 ohm", "13,3 ohm", "30 ohm"], "is_open": true, "ans_idx": null, "ans_text": "V=Ri, R=ρL/S [Ω]. Serie: R_eq=ΣRᵢ. Parallelo: 1/R_eq=Σ(1/Rᵢ).", "no_ans": false}, {"l": 63, "n": 15, "t": "La prima legge di Ohm si può enunciare nella forma:", "o": ["V*2i = R", "V/R=i", "R/i=V", "V*i=R"], "is_open": true, "ans_idx": null, "ans_text": "V=Ri. La d.d.p. è proporzionale alla corrente. Vale per conduttori ohmici a T costante.", "no_ans": false}, {"l": 63, "n": 16, "t": "Si enunci la legge di Ohm generalizzata per la conduzione elettrica e se ne descriva poi la forma specifica nel caso di conduttori metallici.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "j=σE (microscopica). V=Ri con R=ρL/S (macroscopica, prima legge di Ohm). Nei metalli σ=ne²τ/m.", "no_ans": false}, {"l": 63, "n": 17, "t": "Si definisca la resistenza elettrica di un conduttore e si discutano le resistenze equivalenti di una serie di resistori e di un sistema di resistori in parallelo.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "R=ρL/S [Ω]. Serie: R_eq=R₁+R₂+…+Rₙ (stessa i). Parallelo: 1/R_eq=1/R₁+…+1/Rₙ (stessa V).", "no_ans": false}, {"l": 63, "n": 18, "t": "Come si trovano le resistenze equivalenti in caso di resistenze in serie e parallelo?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Serie: 1/R_eq=Σ1/Rᵢ — SBAGLIATO. CORRETTO: Serie R_eq=ΣRᵢ. Parallelo: 1/R_eq=Σ(1/Rᵢ).", "no_ans": false}, {"l": 63, "n": 19, "t": "Esporre la prima legge di ohm", "o": [], "is_open": true, "ans_idx": null, "ans_text": "V=Ri. La d.d.p. ai capi di un resistore è proporzionale alla corrente che lo percorre. R dipende solo dalla geometria e dal materiale.", "no_ans": false}, {"l": 64, "n": 1, "t": "Una tensione di 220V viene applicata a una stufa elettrica che durante il suo funzionamento dissipa 500W. Qual è la sua resistenza della stufa?", "o": ["circa 100 ohm", "circa 1 ohm", "circa 10 ohm", "circa 1000 ohm"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 64, "n": 2, "t": "Una lampada ad incandescenza da 120 watt ed uno scaldabagno elettrico da 1500 watt sono alimentati dalla stessa tensione. Segue che:", "o": ["non si può rispondere senza conoscere le correnti", "è più elevata la resistenza della lampada ad incandescenza", "le resistenze elettriche dei due apparecchi sono le stesse", "è più elevata la resistenza dello scaldabagno elettrico"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 64, "n": 3, "t": "Qualunque conduttore ohmico percorso da corrente dissipa energia per effetto Joule", "o": ["è vero solo se la corrente è costante nel tempo", "è sempre falso", "è sempre vero", "qualche volta è falso"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 64, "n": 4, "t": "Per scaldare di 1 °C un litro di acqua sono necessari 4180 J di calore. Una corrente di 2 A che passa dentro una resistenza di 10 OHM per due minuti riesce a", "o": ["produrre questo calore?", "No.", "Dipende dalla temperatura iniziale dell'acqua.", "Non ci sono elementi sufficienti per rispondere.", "Sì."], "is_open": false, "ans_idx": 4, "ans_text": null, "no_ans": false}, {"l": 64, "n": 5, "t": "Calcolate la resistenza di un faro d'automobile da 40 W se la batteria è da 12 V.", "o": ["R = 3.6 ohm", "R = 4.8 ohm", "R = 1.2 ohm", "R = 2.4 ohm"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 64, "n": 6, "t": "Una resistenza da 10 ohm di potenza massima pari a 5 W è collegata a una pila da 9 V.", "o": ["La resistenza riesce a dissipare la potenza", "La resistenza brucia", "Non ho elementi sufficienti per rispondere", "La resistenza si espande"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 64, "n": 7, "t": "Una serpentina di 30 Ohm è immersa in 40 l di acqua a temperatura di 15 °C. Si vuole scaldare
