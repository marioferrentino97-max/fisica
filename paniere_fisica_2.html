<style>
:root{--bg:#0f0e0c;--surf:#1a1814;--surf2:#212019;--border:#2e2b24;--border2:#3d3a30;
--accent:#c8a96e;--adim:rgba(200,169,110,0.12);--green:#27ae60;--gdim:rgba(39,174,96,0.1);
--blue:#5dade2;--bdim:rgba(93,173,226,0.10);--red:#c0392b;--rdim:rgba(192,57,43,0.1);

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Georgia,'Source Serif 4',serif;min-height:100vh;line-height:1.65}

header{background:rgba(15,14,12,.97);border-bottom:1px solid var(--border);padding:14px 24px;
position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.logo{font-family:'Palatino Linotype',Palatino,serif;font-size:17px;font-weight:700;color:var(--accent);white-space:nowrap}
.logo span{font-size:10px;color:var(--dim);display:block;font-weight:normal;font-family:monospace;letter-spacing:1px}
.search-wrap{flex:1;position:relative;min-width:180px}
#search{width:100%;background:var(--surf2);border:1.5px solid var(--border);border-radius:8px;
color:var(--text);font-size:14px;font-family:Georgia,serif;padding:8px 12px 8px 36px;outline:none;transition:border-color .15s;}
#search:focus{border-color:var(--accent)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;pointer-events:none}
.stats{font-family:monospace;font-size:11px;color:var(--dim);white-space:nowrap}
.stats b{color:var(--accent)}

.layout{display:flex;min-height:calc(100vh - 59px)}
aside{width:210px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--border);
padding:10px 0;overflow-y:auto;position:sticky;top:59px;height:calc(100vh - 59px);}
.lb{display:flex;align-items:center;gap:7px;width:100%;padding:7px 14px;background:none;border:none;
cursor:pointer;color:var(--muted);font-size:11px;font-family:monospace;text-align:left;transition:all .15s;border-left:3px solid transparent;}
.lb:hover{background:var(--surf2);color:var(--text)}
.lb.active{background:var(--adim);color:var(--accent);border-left-color:var(--accent)}
.lb .ln{font-size:12px;font-weight:700;min-width:26px}
.lb .lname{font-size:9px;opacity:.7;line-height:1.3}
.lb .lc{margin-left:auto;font-size:9px;background:var(--border);padding:1px 5px;border-radius:8px;flex-shrink:0}

main{flex:1;padding:22px;max-width:880px}

.filters{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.pill{font-family:monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;
padding:4px 13px;border-radius:20px;cursor:pointer;border:1.5px solid var(--border);
background:transparent;color:var(--dim);transition:all .15s;}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--adim);border-color:var(--accent);color:var(--accent)}
.pill.mc-pill.active{background:var(--gdim);border-color:var(--green);color:var(--green)}
.pill.op-pill.active{background:var(--bdim);border-color:var(--blue);color:var(--blue)}

.qcard{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);

.qhead{display:flex;align-items:flex-start;gap:11px;padding:13px 17px;cursor:pointer;}
.qhead:hover{background:rgba(255,255,255,.02)}
.qbadge{font-family:monospace;font-size:9px;padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:3px;white-space:nowrap;}
.qbadge.mc{background:var(--gdim);color:var(--green);border:1px solid rgba(39,174,96,.2)}
.qbadge.op{background:var(--bdim);color:var(--blue);border:1px solid rgba(93,173,226,.2)}
.qt{font-size:13.5px;line-height:1.6;color:var(--text);flex:1}
.qarrow{color:var(--dim);font-size:10px;margin-top:4px;flex-shrink:0;transition:transform .2s}
.qcard.open .qarrow{transform:rotate(180deg);color:var(--accent)}
.qans{display:none;padding:0 17px 15px 48px}
.qcard.open .qans{display:block}

.opts{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.opt{font-size:12.5px;padding:7px 11px;border-radius:6px;border:1px solid var(--border);
color:var(--muted);background:var(--surf2);}
.opt.correct{background:var(--gdim);border-color:rgba(39,174,96,.35);color:var(--green)}
.opt.correct::before{content:"✓  ";font-weight:700}

.open-ans{background:var(--bdim);border:1px solid rgba(93,173,226,.2);border-radius:7px;
padding:11px 15px;font-size:12.5px;color:#7fb3d3;line-height:1.65;}
.open-ans strong{display:block;font-family:monospace;font-size:8px;text-transform:uppercase;
letter-spacing:1.5px;color:var(--blue);margin-bottom:5px}

.no-ans{font-family:monospace;font-size:11px;color:var(--dim);padding:7px 11px;
border:1px dashed var(--border);border-radius:6px;background:rgba(90,82,72,.1);}

.sec{font-family:monospace;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);
margin:22px 0 11px;display:flex;align-items:center;gap:10px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

.empty{text-align:center;padding:60px 20px;color:var(--dim);font-family:monospace}
.empty .big{font-size:32px;margin-bottom:12px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

@media(max-width:640px){aside{display:none}main{padding:12px}header{gap:8px}}
</style>
</head>
