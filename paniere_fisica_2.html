 50 V?", "o": ["25 W", "2,5 W", "25 J", "2,5 J"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 64, "n": 14, "t": "La potenza elettrica P è data dall'espressione:", "o": ["P=i·V", "P=i/R", "P=iR", "P=i/V"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 64, "n": 15, "t": "La potenza disponibile in un circuito domestico è 3 kW, la tensione 220 V. Che cosa significa?", "o": ["Nel circuito possono passare 3000 C in un'ora.", "Non possono funzionare contemporaneamente 3 elettrodomestici da 1 kW.", "Nel circuito può passare al massimo una corrente di circa 13,6 A.", "Nel circuito passano 3 A in 1000 ore."], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 64, "n": 16, "t": "Una resistenza da 22 ohm è attaccata alla rete elettrica a 220 V; la corrente che percorre la resistenza è:", "o": ["2200 A", "220 A", "110 A", "10 A"], "is_open": true, "ans_idx": null, "ans_text": "Conversione di energia elettrica in calore: Q=Ri²t. Densità di potenza locale: p=j·E=σE².", "no_ans": false}, {"l": 64, "n": 17, "t": "Ho a disposizione un generatore da 24 V e una bobina di filo in bronzo fosforoso (resistività = 0.12 mOhm·cm) di diametro 0.24 mm. Quanto filo devo", "o": ["avvolgere attorno ad un dispositivo che voglio tenere caldo fornendogli 60W?", "1.15 cm", "8m", "36.2 cm", "44.2 cm"], "is_open": true, "ans_idx": null, "ans_text": "P=V·i [W=J/s]. Per resistore: P=Ri²=V²/R. Energia in tempo t: W=Pt.", "no_ans": false}, {"l": 64, "n": 18, "t": "Un dispositivo elettrico produce calore con una potenza di 2,5 W per 10 minuti. Quanto calore viene prodotto?", "o": ["25 J", "1500 cal", "1500 J", "25 cal"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 64, "n": 19, "t": "Una resistenza da 10 ohm è collegata a una pila da 9 V. La potenza dissipata dalla resistenza è:", "o": ["8.1 W", "81 J", "81 W", "8,1 J"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 64, "n": 20, "t": "In un filo di resistenza pari a 5 ohm scorre una corrente di 16 A. La potenza erogata è:", "o": ["1560 W", "1280 W", "160 W", "80 W"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 64, "n": 21, "t": "Quale tensione massima posso applicare a una resistenza da 10 ohm con potenza massima di 10 W?", "o": ["3,3 V", "100 V", "1V", "10 V"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 64, "n": 22, "t": "Una serpentina di 30 Ohm è immersa in 40 l di acqua a temperatura di 15 °C. Si vuole scaldare l'acqua a 45 °C in 30 minuti. Sapendo che il calore specifico", "o": ["dell'acqua è 4186 J/(kg·K), quale tensione bisogna applicare alla serpentina?", "290 V", "12 V", "4.5 V", "420 V"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 64, "n": 23, "t": "In un resistore attraversato dalla corrente i si produce una quantità di calore Q. Quanto calore si produce nello stesso intervallo di tempo se la corrente è", "o": ["0.5·i?", "0.5·Q", "Non si può rispondere.", "2·Q", "0.25·Q"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 64, "n": 24, "t": "Una resistenza alimentata da una batteria da 12V eroga 40 W di potenza, quanto vale la resistenza?", "o": ["0,8 ohm", "3,3 ohm", "36 ohm", "3,6 ohm"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 64, "n": 25, "t": "Cos'è l'effetto Joule?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "L'effetto Joule è la conversione irreversibile di energia elettrica in calore: Q=Ri²t=Pt. Causata dagli urti degli elettroni con il reticolo cristallino.", "no_ans": false}, {"l": 64, "n": 26, "t": "In cosa consiste l'effetto Joule in un conduttore e che forma assume l'effetto Joule se lo si considera localmente?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "L'effetto Joule in forma locale: densità di potenza p=j·E=σE²=j²/σ [W/m³]. Totale: P=∫p dV=Ri².", "no_ans": false}, {"l": 64, "n": 27, "t": "Definire la potenza elettrica", "o": [], "is_open": true, "ans_idx": null, "ans_text": "P=V·i [W=J/s]. Per resistore: P=Ri²=V²/R=Vi. Energia dissipata in tempo t: W=Pt.", "no_ans": false}, {"l": 65, "n": 1, "t": "Due lampade hanno resistenza rispettivamente di 100 e 200 ohm, e vengono connesse ad un generatore di forza elettromotrice di 100 V. Calcolare la corrente", "o": ["che circola nel generatore quando le due resistenze sono connesse in serie.", "I = 0.22 A", "I = 0.11 A", "I = 0.33 A", "I = 0.44 A"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 65, "n": 2, "t": "Due lampade hanno resistenza rispettivamente di 100 e 200 ohm, e vengono connesse ad un generatore di forza elettromotrice di 100 V. Calcolare la corrente", "o": ["che circola nel generatore quando le due resistenze sono connesse in parallelo", "I = 1.0 A", "I = 2.0 A", "I = 0.5 A", "I = 1.5 A"], "is_open": false, "ans_idx": 4, "ans_text": null, "no_ans": false}, {"l": 65, "n": 3, "t": "Sulla batteria di un veicolo c'è scritto 12 V e 50 Ah (si legge ampere-ora). Il primo dato è la d.d.p. che la batteria fornisce. Che cosa rappresenta il secondo", "o": ["dato?", "La possibile durata della batteria.", "La corrente massima che la batteria fa circolare.", "La quantità di carica che la batteria può fornire.", "La capacità termica della batteria."], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 65, "n": 4, "t": "Ad una batteria ideale di 1.5 V sono collegate in parallelo due resistenze. La batteria eroga una corrente di 50 mA. Se una delle resistenze è di 60 OHM, qual'è", "o": ["il valore dell'altra?", "R = 100 ohm", "R = 80 ohm", "R = 20 ohm", "R = 60 ohm"], "is_open": false, "ans_idx": 4, "ans_text": null, "no_ans": false}, {"l": 65, "n": 5, "t": "Se avete a disposizione un generatore di tensione di 120 V e tante lampadine da 6V, come fate per accenderle senza bruciarle? Colleghiamo 10 lampadine in serie", "o": ["Colleghiamo 10 lampadine in parallelo", "Colleghiamo 20 lampadine in serie", "Colleghiamo 20 lampadine in parallelo"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 65, "n": 6, "t": "Una piccola lampadina assorbe 300 mA da una batteria di 1.5 V. Qual è la resistenza della lampadina?", "o": ["R = 0.45 ohm", "R = 4.0 ohm", "R = 5.0 ohm", "R = 4.5 ohm"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 65, "n": 7, "t": "Si definisca la forza elettromotrice di un generatore elettrico e si descriva il circuito equivalente che schematizza un generatore reale connesso ad un carico", "o": ["esterno."], "is_open": true, "ans_idx": null, "ans_text": "ε=∮E_em·ds. Circuito equivalente: generatore ideale ε + resistenza interna r. V_morsetti=ε−ri.", "no_ans": false}, {"l": 66, "n": 1, "t": "Si enuncino le leggi di Kirchhoff per i circuiti elettrici lineari", "o": [], "is_open": true, "ans_idx": null, "ans_text": "I (nodi): Σiᵢ=0 — conservazione della carica. II (maglie): Σεₖ=ΣRⱼiⱼ — conservatività del campo.", "no_ans": false}, {"l": 66, "n": 2, "t": "Esporre le leggi dei circuiti elettrici", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Legge dei nodi: correnti entranti = uscenti. Legge delle maglie: Σε=ΣiR per ogni maglia.", "no_ans": false}, {"l": 67, "n": 1, "t": "Un condensatore dimezza la sua carica iniziale scaricando in 20 ms attraverso una resistenza da 40 Ohm. Quale è la sua capacità?", "o": ["0.14 mF", "0.08 mF", "1 mF", "0.72 mF"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 67, "n": 2, "t": "Una pila da f = 12 V è connessa ad una serie formata da una resistenza R = 1.4 MOhm e un condensatore con C = 1.8 microF. Collegando al tempo t0 = 0s il", "o": ["circuito, dopo quanto tempo la carica accumulata sul condensatore sarà pari a 16 microC?", "6.2 s", "13 ms", "3.4 s", "2.1 s"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 67, "n": 3, "t": "Si descriva il processo di carica in un circuito RC", "o": [], "is_open": true, "ans_idx": null, "ans_text": "q(t)=Cε(1−e^(−t/τ)), i(t)=(ε/R)e^(−t/τ), τ=RC. A regime: q=Cε, i=0.", "no_ans": false}, {"l": 67, "n": 4, "t": "Si discuta il bilancio energetico del processo di scarica in un circuito RC", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Scarica: q(t)=q₀e^(−t/τ). Tutta l'energia U₀=½CV₀² si dissipa su R. In carica: metà al condensatore, metà su R.", "no_ans": false}, {"l": 67, "n": 5, "t": "Si verifichi tramite analisi dimensionale che il prodotto RC rappresenti effettivamente un tempo", "o": [], "is_open": true, "ans_idx": null, "ans_text": "[R]=[V/A]=[V·s/C]; [C]=[C/V]; [RC]=[s]. τ=RC è un tempo: dopo 5τ la carica è al 99% del regime.", "no_ans": false}, {"l": 68, "n": 1, "t": "Quando un ago magnetico si trova in una zona in cui è presente un campo magnetico, risulta sottoposto:", "o": ["a una forza che agisce sul polo nord;", "a una coppia di forze;", "a una forza e a una coppia di forze.", "a una forza che agisce sul polo sud;"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 68, "n": 2, "t": "Perché il polo Nord della bussola è attratto dal polo Nord magnetico della Terra? Due poli magnetici dello stesso nome non dovrebbero respingersi? Se si considerasse la Terra come una grande calamita, il polo Nord geografico sarebbe in realtà un polo Sud magnetico Il polo Nord della bussola è attratto dal polo Sud del sole La ragione sta nel fatto che l'intensità del campo magnetico terrestre è molto debole", "o": ["Non è sempre vero che due poli omologhi si respingono"], "is_open": false, "ans_idx": null, "ans_text": null, "no_ans": true}, {"l": 68, "n": 3, "t": "Quante calamite è possibile creare, in linea di principio, frammentando un magnete? Infinite", "o": ["Nessuna, perché se si spezza un magnete esso perde la sua magnetizzazione.", "Finchè la magnetizzazione non si esaurisce", "Un numero qualsiasi, purché sia pari"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 68, "n": 4, "t": "Del campo magnetico e del campo elettrostatico si può dire che:", "o": ["il primo non è conservativo, mentre il secondo lo è", "il primo è conservativo, mentre il secondo non lo è", "entrambi sono conservativi", "entrambi non sono conservativi"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 68, "n": 5, "t": "Si descriva la forza di Lorentz e si discuta qualche esempio applicativo", "o": [], "is_open": true, "ans_idx": null, "ans_text": "F=qv×B, ⊥ a v e B. Non compie lavoro, non cambia |v|. Con v⊥B: moto circolare r=mv/(qB).", "no_ans": false}, {"l": 69, "n": 1, "t": "In quale delle seguenti situazioni fisiche un campo magnetico uniforme esercita una forza su una carica puntiforme?", "o": ["la carica si muove con velocità ortogonale al campo", "la carica è ferma", "Nessuna delle precedenti", "la carica si muove con velocità parallela al campo"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 69, "n": 2, "t": "Quando un ago magnetico si trova in una zona in cui è presente un campo magnetico, risulta sottoposto:", "o": ["a una coppia di forze;", "a una forza che agisce sul polo nord;", "a una forza e a una coppia di forze.", "a una forza che agisce sul polo sud;"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 69, "n": 3, "t": "Una particella carica si muove lungo una retta attraverso una particolare regione dello spazio. Vi può essere un campo magnetico non nullo in questa regione?", "o": ["Assolutamente no, altrimenti la particella verrebbe deviata", "Si, ma il campo deve essere parallelo alla direzione della velocità", "Si, ma il campo deve essere ortogonale alla direzione della velocità", "Si, ma deve anche esserci un campo elettrico parallelo al campo magnetico"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 69, "n": 4, "t": "Un protone ed una particella alpha (nucleo di elio, m_al = 4·m_P q_al = 2·q_P) hanno la stessa energia cinetica quando entrano in una regione dove è presente un campo magnetico ortogonale alla loro velocità. Qual'è il rapporto dei raggi dei loro cammini circolari espresso come Rp/Ra?", "o": ["Rp/Ra = 2", "Rp/Ra = 1/2", "Rp/Ra = 1/4", "Rp/Ra = 1"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 69, "n": 5, "t": "Un protone con una velocità di 5.0·10^6 m/s avverte, attraversando un campo magnetico, una forza massima di 8.0·10^(-14) N. Quanto vale il modulo del", "o": ["campo magnetico?", "B = 0.50 T", "B = 0.30 T", "B = 0.20 T", "B = 0.10 T"], "is_open": false, "ans_idx": 4, "ans_text": null, "no_ans": false}, {"l": 69, "n": 6, "t": "Un protone con una velocità di 5.0·10^6 m/s avverte, attraversando un campo magnetico le cui linee di forza formano un angolo di 30° con la direzione della velocità, una forza di 8·10^(-14) N. Quanto vale il modulo del campo magnetico? (La carica del protone è 1.6·10^(-19) C).", "o": ["B = 0.2 T", "B = 0.3 T", "B = 0.4 T", "B = 0.1 T"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 69, "n": 7, "t": "La forza magnetica che agisce su una carica elettrica", "o": ["E' parallela alla velocità della carica", "È parallela alla direzione del campo magnetico", "Può modificarne l'energia cinetica", "Non può modificarne il modulo della velocità"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 69, "n": 8, "t": "Una particella carica attraversa una regione dello spazio, senza subire deviazione. Possiamo affermare che in quella regione non è presente un campo", "o": ["magnetico?", "Non si può rispondere, perché non è noto il segno della carica.", "Sì, perché, se ci fosse un qualunque campo magne-tico, la particella cambierebbe direzione.", "No, perché ci potrebbe essere un campo parallelo alla direzione della velocità.", "Sì, perché non agisce nessuna forza sulla carica."], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 69, "n": 9, "t": "Una particella, con rapporto carica su massa q/m = 2·10^5 C/kg, entra in una regione di campo magnetico omogeneo di modulo B = 0.5 T, con velocità iniziale v0= 1·10^6m/s diretta ortogonalmente al campo stesso. Quale sarà il raggio della sua traiettoria?", "o": ["10 cm", "10 m", "4m", "1m"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 69, "n": 10, "t": "Un protone si muove con velocità di 5·10^6 m/s nella stessa direzione di un campo magnetico B di modulo 1.5 T. Quanto vale la forza di Lorentz che subisce il", "o": ["protone?", "F = 2·10^(-13) N", "F = 12·10^(-11) N", "F=0N", "F = 12·10^(-13) N"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 69, "n": 11, "t": "Una carica percorre una traiettoria circolare di raggio 0.024 mm sotto l'effetto di un campo magnetico diretto ortogonalmente al piano della traiettoria. Il campo esercita una forza di modulo 3·10^(-6) N sulla carica. Quanto vale l'energia cinetica della carica?", "o": ["3.6·10^(-11) J", "7.2·10^(-11) J", "1.4·10^(-10) J", "6.5·10^(-12) J"], "is_open": false, "ans_idx": 0, "ans_text": null, "no_ans": false}, {"l": 69, "n": 12, "t": "Nell'espressione della forza di Lorentz sono presenti tre vettori: forza, velocità, campo. Quali sono sempre perpendicolari fra loro?", "o": ["Ogni vettore è sempre perpendicolare agli altri due.", "La velocità è perpendicolare al campo.", "La forza è perpendicolare alla velocità.", "Non ci sono due vettori sempre perpendicolari."], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 69, "n": 13, "t": "In quale delle seguenti situazioni fisiche un campo magnetico uniforme esercita una forza su una carica puntiforme?", "o": ["la carica si muove con velocità parallela al campo", "la carica è ferma", "Nessuna delle precedenti", "la carica si muove con velocità ortogonale al campo"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 69, "n": 14, "t": "Due cariche elettriche q1 e q2 = 4q1, aventi velocità di modulo v1 e v2 = 2 v1, entrano in un campo magnetico omogeneo con velocità perpendicolare al campo stesso. Calcolare il rapporto F1/F2 dei moduli delle forze agenti sulle due cariche", "o": ["2", "1/2", "4", "1/8"], "is_open": true, "ans_idx": null, "ans_text": "Ioni accelerati da ΔV → v=√(2qΔV/m). In campo B⊥v: r=mv/(qB). Misurando r: m/q=r²B²/(2ΔV). Isotopi separati per r diverso.", "no_ans": false}, {"l": 69, "n": 15, "t": "Un campo elettrico di 1.5 kV/m ed un campo magnetico di 0.30 T, ortogonale al campo elettrico, agiscono su un elettrone in moto lungo una retta ortogonale sia al campo elettrico che al campo magnetico, in modo che sull'elettrone agisca una forza risultante nulla. Qual'è la velocità dell'elettrone?", "o": ["v = 8000 m/s", "v = 5000 m/s", "v = 2000 m/s", "v = 11000 m/s"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 69, "n": 16, "t": "Una particella carica in un campo magnetico uniforme una particella carica in un campo magnetico uniforme Non subisce forze", "o": ["Si mette in movimento per effetto del campo", "Se era ferma inizia a ruotare", "Subisce una forza se è in movimento"], "is_open": false, "ans_idx": 3, "ans_text": null, "no_ans": false}, {"l": 69, "n": 17, "t": "Cosa succede se si posiziona una carica elettrica ferma in un campo elettrico? E in un campo magnetico?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "In campo elettrico E: subisce forza F=qE anche se ferma. In campo magnetico B: subisce forza F=qv×B solo se in moto (v≠0). Se ferma in campo B: F=0.", "no_ans": false}, {"l": 69, "n": 18, "t": "Si discuta il principio di funzionamento di uno spettrometro di massa.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Ioni accelerati da ΔV → v=√(2qΔV/m). In campo B⊥v: r=mv/(qB). Misurando r: m/q=r²B²/(2ΔV). Isotopi con massa diversa percorrono raggi diversi → separazione.", "no_ans": false}, {"l": 69, "n": 19, "t": "Cosa succede a una carica elettrica in movimento in un campo magnetico?", "o": [], "is_open": true, "ans_idx": null, "ans_text": "F=qv×B ⊥ v → non compie lavoro, non cambia |v|. Con v⊥B: moto circolare r=mv/(qB), f_c=qB/(2πm). Con v generica: moto elicoidale. Con v∥B: F=0.", "no_ans": false}, {"l": 69, "n": 20, "t": "Si descriva il moto di una carica che entra con velocità orientata in direzione generica all'interno di una regione di campo magnetico uniforme.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "v si decompone in v∥ (parallela a B, non deviata) e v⊥ (⊥ a B, produce moto circolare con r=mv⊥/(qB)). La combinazione dà moto elicoidale: circonferenza nel piano ⊥B + traslazione uniforme lungo B. Passo: p=v∥·T=2πmv cosθ/(qB).", "no_ans": false}, {"l": 69, "n": 21, "t": "Si discuta il principio di funzionamento di uno spettrometro di massa.", "o": [], "is_open": true, "ans_idx": null, "ans_text": "Ioni accelerati da ΔV → v=√(2qΔV/m). In campo B⊥v: traiettoria circolare r=mv/(qB). Da r: m/q=r²B²/(2ΔV). Isotopi con m diversa → r diversi → separazione spaziale sul rivelatore.", "no_ans": false}, {"l": 70, "n": 1, "t": "Due fili indefiniti paralleli, distanti 1 mm sono attraversati dalla stessa corrente I con stesso verso. Tra di essi si misura una forza attrattiva per unità di", "o": ["lunghezza pari a 0.5 N/m. Quanto vale I?", "25 A", "50 A", "10 A", "80 A"], "is_open": false, "ans_idx": 2, "ans_text": null, "no_ans": false}, {"l": 70, "n": 2, "t": "Una spira quadrata di lato L = 20 cm è percorsa da una corrente di 2 mA. Essa è immersa in un campo magnetico uniforme di 0.5 T diretto ortogonalmente alla superficie della spira. Quale è il valore del momento della forza applicata sulla spira?", "o": ["6·10^(-5) N·m", "0 N·m", "2*10^(-4) N*m", "4·10^(-4) N·m"], "is_open": false, "ans_idx": 1, "ans_text": null, "no_ans": false}, {"l": 70, "n": 3, "t": "La forza che si esercita tra due fili conduttori rettilinei e paralleli percorsi da correnti uguali ed equiverse:", "o": ["è ortogonale ai fi let filter='all', lesson=null, term='';
const lc={};Q.forEach(q=>{lc[q.l]=(lc[q.l]||0)+1;});

function buildSB(){
  const sb=document.getElementById('sb');
  let h='<button class="lb active" id="lb-all" onclick="setL(null)"><span class="ln">📚</span><span class="lname">Tutte le lezioni</span><span class="lc">215</span></button>';
  [...new Set(Q.map(q=>q.l))].sort((a,b)=>a-b).forEach(l=>{
    h+=`<button class="lb" id="lb-${l}" onclick="setL(${l})"><span class="ln">L${String(l).padStart(3,'0')}</span><span class="lname">${LN[l]||l}</span><span class="lc">${lc[l]||0}</span></button>`;
  });
  sb.innerHTML=h;
}

function setL(l){lesson=l;document.querySelectorAll('.lb').forEach(b=>b.classList.remove('active'));
  (document.getElementById(l?'lb-'+l:'lb-all')||{}).classList?.add('active');render();}
function setF(f,btn){filter=f;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));btn.classList.add('active');render();}

function getFilt(){
  const t=document.getElementById('search').value.toLowerCase().trim();
  term=t;
  return Q.filter(q=>{
    if(lesson&&q.l!==lesson)return false;
    if(filter==='mc'&&q.is_open)return false;
    if(filter==='open'&&!q.is_open)return false;
    if(t){const h=(q.t+' '+(q.o||[]).join(' ')).toLowerCase();return t.split(/\s+/).filter(Boolean).every(w=>h.includes(w));}
    return true;
  });
}

function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function buildAns(q){
  if(q.no_ans) return '<div class="no-ans">⚠️ Opzioni non estratte correttamente dal paniere PDF — risposta non disponibile.</div>';
  if(q.is_open&&q.ans_text) return `<div class="open-ans"><strong>📖 Risposta</strong>${esc(q.ans_text)}</div>`;
  if(!q.o||!q.o.length) return '<div class="no-ans">Opzioni non disponibili.</div>';
  let h='<div class="opts">';
  q.o.forEach((o,i)=>{
    const cls=(i===q.ans_idx)?'opt correct':'opt';
    h+=`<div class="${cls}">${esc(o)}</div>`;
  });
  h+='</div>';
  return h;
}

function render(){
  const f=getFilt();
  document.getElementById('vc').textContent=f.length;
  const c=document.getElementById('qc');
  if(!f.length){c.innerHTML='<div class="empty"><div class="big">🔍</div>Nessuna domanda trovata</div>';return;}
  let h='',last=null;
  f.forEach(q=>{
    if(q.l!==last){
      h+=`<div class="sec">L${q.l} — ${LN[q.l]||q.l}</div>`;last=q.l;
    }
    const id=`q${q.l}-${q.n}`;
    const badge=q.is_open?'<span class="qbadge op">APERTA</span>':'<span class="qbadge mc">CHIUSA</span>';
    h+=`<div class="qcard" id="${id}">
      <div class="qhead" onclick="tog('${id}')">
        ${badge}
        <span class="qt"><strong>Q${String(q.n).padStart(2,'0')}</strong> — ${esc(q.t)}</span>
        <span class="qarrow">▼</span>
      </div>
      <div class="qans">${buildAns(q)}</div>
    </div>`;
  });
  c.innerHTML=h;
}

function tog(id){document.getElementById(id)?.classList.toggle('open');}

buildSB();render();
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();document.getElementById('search').focus();document.getElementById('search').select();}});
</script>
